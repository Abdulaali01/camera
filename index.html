<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء + الرسم البياني</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<!-- مكتبة تصوير الخريطة -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:tahoma;
background:#f5f7fb
}

#map{
height:100vh;
width:100%
}

/* الشريط العلوي */
.topPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.18);
padding:10px 12px;
z-index:10;
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
min-width:320px;
max-width:95%
}

.topPanel .group{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap
}

.topPanel .titleMini{
font-size:12px;
font-weight:bold;
color:#333;
margin-inline:2px
}

#searchBox{
width:240px;
padding:10px 12px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
outline:none;
font-size:14px
}

.fileInput{
padding:8px;
border:1px solid #ddd;
border-radius:10px;
background:#fff;
font-size:13px;
max-width:180px
}

select{
padding:9px 10px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
font-size:13px;
min-width:150px;
outline:none
}

button{
padding:9px 14px;
border:none;
border-radius:10px;
background:#2d6cff;
color:#fff;
cursor:pointer;
font-size:13px;
font-weight:bold
}

button:hover{
opacity:.92
}

.countBox{
background:#000;
color:#fff;
padding:6px 12px;
border-radius:8px;
font-weight:bold;
font-size:16px;
text-align:center;
line-height:1.3;
min-width:110px;
box-shadow:0 2px 8px rgba(0,0,0,.25)
}

.countNumber{
font-size:18px;
font-weight:bold
}

.countDistrict{
font-size:13px;
margin-top:2px
}

.stats{
font-size:12px;
margin-top:6px;
line-height:1.2
}

.statRow{
display:flex;
align-items:center;
gap:4px;
margin-top:2px;
justify-content:center
}

.bar{
display:flex;
gap:1px
}

.bar span{
width:6px;
height:6px;
background:#fff;
display:inline-block
}

.label{
min-width:45px;
text-align:right;
font-size:11px
}

.count{
font-size:11px
}

/* للجوال */
@media (max-width:900px){

.topPanel{
width:95%;
padding:10px
}

#searchBox{
width:100%
}

.topPanel .group{
width:100%
}

.fileInput,
select,
button{
width:100%
}

}

</style>
</head>

<body>

<div class="topPanel">

<div class="group">
<input id="searchBox" placeholder="ابحث عن حي أو شارع">
</div>

<div class="group">
<span class="titleMini">الملف</span>
<input type="file" id="excelFile" class="fileInput" accept=".xlsx,.xls">
<button onclick="importExcel()">استيراد Excel</button>
</div>

<div class="group">
<span class="titleMini">الفلترة</span>
<select id="filterSelect" onchange="setFilter(this.value)">
<option value="all">عرض الكل</option>
<option value="top3">أعلى 3</option>
<option value="top3_2">ثاني أعلى 3</option>
<option value="top3_3">ثالث أعلى 3</option>
<option value="top3_4">رابع أعلى 3</option>
<option value="200">أكثر من 200</option>
<option value="100_200">من 100 إلى 200</option>
<option value="100">أقل من 100</option>
</select>
</div>

<div class="group">
<span class="titleMini">الأحياء</span>
<select id="districtList" onchange="selectDistrict(this.value)">
<option value="">كل الأحياء</option>
</select>
</div>

<div class="group">
<button onclick="exportHDImage()">تصدير صورة HD</button>
</div>

</div>

<div id="map"></div>

<script>

let map
let districts={}
let polygons=[]
let markers=[]
let overlays=[]
let currentFilter="all"
let selectedDistrict=""
let rankedDistricts=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid"
})

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

if(place.geometry.viewport){
map.fitBounds(place.geometry.viewport)
}else{
map.setCenter(place.geometry.location)
map.setZoom(16)
}

})

}

function setFilter(type){

currentFilter=type
selectedDistrict=document.getElementById("districtList").value || ""

clearMap()
drawDistricts()

}

function selectDistrict(name){

selectedDistrict=name || ""

clearMap()
drawDistricts()

}

function clearMap(){

polygons.forEach(p=>p.setMap(null))
markers.forEach(m=>m.setMap(null))
overlays.forEach(o=>o.setMap(null))

polygons=[]
markers=[]
overlays=[]

}

function convexHull(points){

points=points.slice()

points.sort((a,b)=>a.lng-b.lng||a.lat-b.lat)

const cross=(o,a,b)=>(
(a.lng-o.lng)*(b.lat-o.lat)-
(a.lat-o.lat)*(b.lng-o.lng)
)

let lower=[]

for(let p of points){

while(lower.length>=2 &&
cross(lower[lower.length-2],lower[lower.length-1],p)<=0){

lower.pop()

}

lower.push(p)

}

let upper=[]

for(let i=points.length-1;i>=0;i--){

let p=points[i]

while(upper.length>=2 &&
cross(upper[upper.length-2],upper[upper.length-1],p)<=0){

upper.pop()

}

upper.push(p)

}

upper.pop()
lower.pop()

return lower.concat(upper)

}

function exportHDImage(){

let bounds=new google.maps.LatLngBounds()

for(let district in districts){

districts[district].points.forEach(p=>{
bounds.extend(p)
})

}

map.fitBounds(bounds)

setTimeout(function(){

html2canvas(document.getElementById("map"),{
scale:4,
useCORS:true
}).then(canvas=>{

let link=document.createElement("a")

link.download="map_report_hd.png"

link.href=canvas.toDataURL("image/png")

link.click()

})

},1200)

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
