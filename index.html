<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تحليل الأحياء + الأعمدة على الخريطة</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>
body{margin:0;font-family:tahoma;background:#f5f7fb;overflow:hidden}
.mainLayout{display:flex;width:100%;height:100vh}

/* ===== اللوحة ===== */
.sidePanel{
width:360px;
background:#fff;
border-left:1px solid #e3e8f0;
display:flex;
flex-direction:column
}

.sideBody{padding:12px;overflow:auto}

.statCard{background:#f8fbff;padding:10px;border-radius:10px;margin-bottom:8px}

/* ===== الخريطة ===== */
.mapSection{flex:1;position:relative}
#map{width:100%;height:100%}

/* ===== الشريط ===== */
.topPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:10px;
border-radius:12px;
display:flex;
gap:8px;
z-index:10;
flex-wrap:wrap
}

input,select,button{
padding:8px;
border-radius:8px;
border:1px solid #ccc
}

button{
background:#2d6cff;
color:#fff;
border:none;
cursor:pointer
}

/* ===== الرسم اليدوي ===== */
.manualLabel{
position:absolute;
transform:translate(-50%,-50%);
display:flex;
gap:5px;
align-items:center;
cursor:grab;
z-index:5000
}

.manualCount{
background:#111;
color:#fff;
padding:5px 10px;
border-radius:20px;
font-weight:bold
}

.manualName{
background:#fff;
border:2px solid #2563eb;
padding:5px 10px;
border-radius:20px;
font-weight:bold
}
</style>
</head>

<body>

<div class="mainLayout">

<div class="sidePanel">
<div class="sideBody">
<div class="statCard">
عدد البلاغات: <span id="totalCount">0</span>
</div>
<canvas id="sideChart"></canvas>
</div>
</div>

<div class="mapSection">

<div class="topPanel">
<input type="file" id="excelFile">
<button onclick="importExcel()">استيراد</button>

<select id="filterSelect" onchange="setFilter(this.value)">
<option value="all">عرض الكل</option>
<option value="top3">أعلى 3</option>
<option value="200">أكثر من 200</option>
<option value="100">أقل من 100</option>
</select>

<button onclick="exportExcel()">Excel</button>
</div>

<div id="map"></div>

</div>
</div>

<script>
let map
let districts={}
let currentFilter="all"
let polygons=[]
let drawingManager
let manualZones=[]
let sideChart=null

/* ===== الخريطة ===== */
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid"
})

initDrawing()
}

/* ===== الرسم اليدوي ===== */
function initDrawing(){

drawingManager=new google.maps.drawing.DrawingManager({
drawingControl:false,
drawingModes:['polygon'],
polygonOptions:{
fillColor:'#2196f3',
fillOpacity:0.3,
strokeColor:'#1a73e8',
strokeWeight:3,
editable:true,
draggable:true
}
})

drawingManager.setMap(map)

google.maps.event.addListener(drawingManager,'overlaycomplete',function(e){

let poly=e.overlay
let center=getCenter(poly.getPath())

let label=new ManualLabel(center,"حي جديد",manualZones.length+1)
label.setMap(map)

manualZones.push({poly,label})
drawingManager.setDrawingMode(null)
})
}

function getCenter(path){
let b=new google.maps.LatLngBounds()
for(let i=0;i<path.getLength();i++){
b.extend(path.getAt(i))
}
return b.getCenter()
}

/* ===== Label ===== */
class ManualLabel extends google.maps.OverlayView{
constructor(pos,name,count){
super()
this.pos=pos
this.name=name
this.count=count
}

onAdd(){
this.div=document.createElement("div")
this.div.className="manualLabel"

this.div.innerHTML=`
<div class="manualCount">${this.count}</div>
<div class="manualName">${this.name}</div>
`

this.getPanes().overlayMouseTarget.appendChild(this.div)
}

draw(){
let p=this.getProjection().fromLatLngToDivPixel(this.pos)
this.div.style.left=p.x+"px"
this.div.style.top=p.y+"px"
}

onRemove(){
this.div.remove()
}
}

/* ===== Excel ===== */
function importExcel(){

let file=document.getElementById("excelFile").files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:"array"})
let sheet=wb.Sheets[wb.SheetNames[0]]
let rows=XLSX.utils.sheet_to_json(sheet)

districts={}

rows.forEach(r=>{
let d=r["الحي"]||"غير معروف"
if(!districts[d])districts[d]=0
districts[d]++
})

drawAll()
}

reader.readAsArrayBuffer(file)
}

/* ===== فلترة ===== */
function setFilter(f){
currentFilter=f
drawAll()
}

function pass(name,count){

if(currentFilter==="all") return true

let sorted=Object.entries(districts)
.sort((a,b)=>b[1]-a[1])
.map(x=>x[0])

if(currentFilter==="top3") return sorted.slice(0,3).includes(name)
if(currentFilter==="200") return count>200
if(currentFilter==="100") return count<100

return true
}

/* ===== رسم ===== */
function drawAll(){

polygons.forEach(p=>p.setMap(null))
polygons=[]

let total=0
let labels=[]
let values=[]

Object.entries(districts).forEach(([name,count])=>{

if(!pass(name,count)) return

total+=count
labels.push(name)
values.push(count)

})

document.getElementById("totalCount").innerText=total

drawChart(labels,values)
}

/* ===== رسم بياني ===== */
function drawChart(labels,values){

if(sideChart) sideChart.destroy()

sideChart=new Chart(
document.getElementById("sideChart"),
{
type:"bar",
data:{labels:labels,datasets:[{data:values}]},
options:{plugins:{legend:{display:false}}}
}
)
}

/* ===== Excel تصدير ===== */
function exportExcel(){

let data=[["الحي","عدد"]]

Object.entries(districts).forEach(([k,v])=>{
if(pass(k,v)) data.push([k,v])
})

let ws=XLSX.utils.aoa_to_sheet(data)
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"data")
XLSX.writeFile(wb,"data.xlsx")
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=drawing&callback=initMap">
</script>

</body>
</html>
