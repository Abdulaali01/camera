<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تقرير تحليل الأحياء</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
@page {
  size: A4 portrait;
  margin: 15mm;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  background: #f0f2f5;
  min-height: 100vh;
  padding: 20px;
}

.reportContainer {
  max-width: 210mm;
  margin: 0 auto;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  overflow: hidden;
}

.reportHeader {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: white;
  padding: 20px;
  text-align: center;
}

.reportHeader h1 {
  font-size: 24px;
  margin-bottom: 8px;
}

.reportHeader .subtitle {
  font-size: 14px;
  opacity: 0.9;
}

.reportDate {
  margin-top: 10px;
  font-size: 12px;
  background: rgba(255,255,255,0.2);
  display: inline-block;
  padding: 5px 15px;
  border-radius: 15px;
}

.controlPanel {
  background: #f8fafc;
  padding: 15px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.controlPanel input, .controlPanel select {
  padding: 8px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
}

.controlPanel button {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.controlPanel button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}

.controlPanel button.secondary {
  background: linear-gradient(135deg, #0b8f55 0%, #0a7a48 100%);
}

.controlPanel button.accent {
  background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
}

.reportContent {
  padding: 20px;
}

.mapSection {
  width: 180mm;
  height: 250mm;
  margin: 0 auto 20px;
  page-break-after: always;
  break-after: page;
  display: flex;
  flex-direction: column;
  background: white;
  padding: 10px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
}

.sectionTitle {
  font-size: 16px;
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sectionTitle::before {
  content: "";
  width: 3px;
  height: 18px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 2px;
}

#map {
  flex: 1;
  width: 100%;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
}

.statsGrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

.statCard {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.statCard h3 {
  font-size: 11px;
  opacity: 0.9;
  margin-bottom: 5px;
}

.statCard .number {
  font-size: 24px;
  font-weight: 800;
}

.chartContainer {
  width: 180mm;
  height: 250mm;
  margin: 0 auto 20px;
  page-break-after: always;
  break-after: page;
  background: white;
  padding: 20px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.chartWrapper {
  width: 100%;
  max-width: 500px;
  position: relative;
}

.chartCenterText {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}

.chartCenterText .total {
  font-size: 36px;
  font-weight: 800;
  color: #1e293b;
}

.chartCenterText .label {
  font-size: 14px;
  color: #64748b;
}

.chartPrintHeader {
  text-align: center;
  margin-bottom: 20px;
}

.chartPrintHeader h2 {
  font-size: 18px;
  color: #1e293b;
  margin-bottom: 5px;
}

.chartPrintHeader p {
  color: #64748b;
  font-size: 12px;
}

.barChartContainer {
  width: 180mm;
  height: 250mm;
  margin: 0 auto 20px;
  page-break-after: always;
  break-after: page;
  background: white;
  padding: 20px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.barChartWrapper {
  width: 100%;
  height: 100%;
  max-height: 200mm;
  position: relative;
}

.tableSection {
  width: 180mm;
  margin: 0 auto;
}

.tablePage {
  width: 180mm;
  height: 250mm;
  margin: 0 auto 20px;
  page-break-after: always;
  break-after: page;
  background: white;
  padding: 15px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
}

.tablePage:last-child {
  page-break-after: auto;
}

.dataTable {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

.dataTable thead {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: white;
}

.dataTable th {
  padding: 10px 8px;
  text-align: center;
  font-weight: 700;
  font-size: 11px;
  border: 1px solid #1e3c72;
}

.dataTable td {
  padding: 8px;
  text-align: center;
  border: 1px solid #e2e8f0;
  font-size: 11px;
}

.dataTable tr:nth-child(even) {
  background: #f8fafc;
}

.dataTable tr:hover {
  background: #e0e7ff;
}

.rank {
  display: inline-block;
  width: 24px;
  height: 24px;
  line-height: 24px;
  border-radius: 50%;
  font-weight: 700;
  color: white;
  font-size: 11px;
}

.rank.gold { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
.rank.silver { background: linear-gradient(135deg, #64748b 0%, #475569 100%); }
.rank.bronze { background: linear-gradient(135deg, #b45309 0%, #92400e 100%); }
.rank.normal { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

.countBadge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  font-size: 10px;
}

.countBadge.high { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); }
.countBadge.medium { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }

.filterContainer {
  display: flex;
  gap: 8px;
  align-items: center;
  flex: 1;
}

.filterContainer input, .filterContainer select {
  flex: 1;
  min-width: 120px;
}

.exportButtons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

@media print {
  @page {
    size: A4 portrait;
    margin: 10mm;
  }

  body { 
    background: white; 
    padding: 0;
    margin: 0;
  }

  .reportContainer { 
    box-shadow: none; 
    border-radius: 0;
    max-width: 100%;
  }

  .controlPanel { display: none; }
  .reportHeader { border-radius: 0; }

  .mapSection, .chartContainer, .barChartContainer, .tablePage {
    width: 190mm;
    height: 277mm;
    margin: 0;
    border: none;
    page-break-after: always;
    break-after: page;
  }

  .mapSection:last-child, .chartContainer:last-child, .barChartContainer:last-child, .tablePage:last-child {
    page-break-after: auto;
  }

  #map { height: 250mm; }

  .statsGrid { display: none; }
}

.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  font-size: 16px;
  color: #667eea;
  font-weight: 700;
}

.spinner {
  width: 30px;
  height: 30px;
  border: 3px solid #e0e7ff;
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-left: 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.pageNumber {
  text-align: center;
  font-size: 10px;
  color: #64748b;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #e2e8f0;
}
</style>
</head>

<body>

<div id="loading" class="loading" style="display: none;">جاري التحميل...<div class="spinner"></div></div>

<div class="reportContainer">
  <div class="reportHeader">
    <h1>📊 تقرير تحليل الأحياء</h1>
    <div class="subtitle">تقرير شامل يوضح توزيع البلاغات حسب الأحياء والتصنيفات</div>
    <div class="reportDate" id="reportDate"></div>
  </div>

  <div class="controlPanel">
    <input type="file" id="excelFile" accept=".xlsx,.xls" style="flex: 1; min-width: 150px;">
    <button onclick="importExcel()">📥 استيراد</button>

    <select id="filterCount" onchange="updateReport()">
      <option value="5">أعلى 5</option>
      <option value="10">أعلى 10</option>
      <option value="15">أعلى 15</option>
      <option value="20">أعلى 20</option>
      <option value="all" selected>الكل</option>
    </select>

    <div class="filterContainer">
      <select id="municipalityFilter" onchange="updateReport()">
        <option value="">جميع البلديات</option>
      </select>
      <input type="text" id="districtFilter" placeholder="🔍 البحث في الأحياء..." oninput="updateReport()">
    </div>

    <div class="exportButtons">
      <button onclick="exportMap()" class="accent">🗺️ خريطة</button>
      <button onclick="exportChart()" class="accent">📊 الأحياء</button>
      <button onclick="exportBarChart()" class="accent">📊 التصنيفات</button>
      <button onclick="exportTable()" class="accent">📋 جدول</button>
      <button onclick="exportFullReport()" class="secondary">📑 الكل</button>
      <button onclick="window.print()">🖨️ طباعة</button>
    </div>
  </div>

  <div class="reportContent">
    <div class="statsGrid">
      <div class="statCard">
        <h3>إجمالي البلاغات</h3>
        <div class="number" id="totalReports">0</div>
      </div>
      <div class="statCard">
        <h3>عدد الأحياء</h3>
        <div class="number" id="totalDistricts">0</div>
      </div>
      <div class="statCard">
        <h3>أعلى حي</h3>
        <div class="number" id="topDistrict">-</div>
      </div>
    </div>

    <div class="mapSection" id="mapSection">
      <h2 class="sectionTitle">الخريطة التفاعلية</h2>
      <div id="map"></div>
    </div>

    <!-- رسم الأحياء (الدونات) -->
    <div class="chartContainer" id="chartContainer">
      <div class="chartPrintHeader">
        <h2>توزيع البلاغات حسب الأحياء</h2>
        <p id="chartSubtitle">إجمالي البلاغات: 0</p>
      </div>
      <div class="chartWrapper">
        <canvas id="chartCanvas" width="500" height="500"></canvas>
        <div class="chartCenterText" id="chartCenterText">
          <div class="total" id="centerTotal">0</div>
          <div class="label">بلاغ</div>
        </div>
      </div>
    </div>

    <!-- رسم التصنيفات (البار) -->
    <div class="barChartContainer" id="barChartContainer">
      <div class="chartPrintHeader">
        <h2>توزيع البلاغات حسب التصنيف/التخصص</h2>
        <p id="barChartSubtitle">إجمالي التصنيفات: 0</p>
      </div>
      <div class="barChartWrapper">
        <canvas id="barChartCanvas"></canvas>
      </div>
    </div>

    <div class="tableSection" id="tableSection">
    </div>
  </div>
</div>

<script>
let map, districts = [], chart = null, barChart = null, allDistricts = [];
let categoryStats = {}; // لتخزين إحصائيات التصنيفات
const COLORS = [
  "#667eea", "#764ba2", "#f093fb", "#f5576c", "#4facfe", 
  "#00f2fe", "#43e97b", "#38f9d7", "#fa709a", "#fee140",
  "#ff6b6b", "#4ecdc4", "#45b7d1", "#96ceb4", "#ffeaa7",
  "#dfe6e9", "#fd79a8", "#a29bfe", "#6c5ce7", "#00b894"
];

const ITEMS_PER_PAGE = 20;

const today = new Date();
document.getElementById("reportDate").textContent = today.toLocaleDateString("ar-SA", { year: 'numeric', month: 'long', day: 'numeric' });

let markers = [];

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 24.7136, lng: 46.6753 },
    zoom: 11,
    mapTypeId: "hybrid",
    mapTypeControl: true,
    fullscreenControl: false,
    streetViewControl: false,
    zoomControl: true
  });
}

function clearMarkers() {
  markers.forEach(m => {
    if (m.circle) m.circle.setMap(null);
    if (m.label) m.label.setMap(null);
  });
  markers = [];
}

function importExcel() {
  const file = document.getElementById("excelFile").files[0];
  if (!file) { alert("اختر ملف Excel أولاً"); return; }

  document.getElementById("loading").style.display = "flex";

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

      processData(rows);
      document.getElementById("loading").style.display = "none";
      alert("تم استيراد البيانات بنجاح!");
    } catch (err) {
      document.getElementById("loading").style.display = "none";
      alert("خطأ في قراءة الملف");
    }
  };
  reader.readAsArrayBuffer(file);
}

function processData(rows) {
  districts = [];
  allDistricts = [];
  categoryStats = {}; // إعادة تعيين إحصائيات التصنيفات

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 4) continue;

    const lat = parseFloat(row[0]);
    const lng = parseFloat(row[1]);
    const name = String(row[2] || "").trim();
    const category = String(row[3] || "غير مصنف").trim(); // العمود الرابع = التصنيف
    const municipality = String(row[4] || "غير محددة").trim();

    if (isNaN(lat) || isNaN(lng) || !name) continue;

    // إحصائيات الأحياء
    const existing = allDistricts.find(d => d.name === name && d.municipality === municipality);
    if (existing) {
      existing.count++;
      existing.points.push({ lat, lng });
    } else {
      allDistricts.push({
        name: name,
        municipality: municipality,
        count: 1,
        points: [{ lat, lng }],
        lat: lat,
        lng: lng
      });
    }

    // إحصائيات التصنيفات (العمود الرابع)
    if (categoryStats[category]) {
      categoryStats[category]++;
    } else {
      categoryStats[category] = 1;
    }
  }

  allDistricts.sort((a, b) => b.count - a.count);

  updateMunicipalityFilter();
  updateReport();
}

function updateMunicipalityFilter() {
  const select = document.getElementById("municipalityFilter");
  const municipalities = [...new Set(allDistricts.map(d => d.municipality))].sort();

  select.innerHTML = '<option value="">جميع البلديات</option>';
  municipalities.forEach(m => {
    select.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

function updateReport() {
  const filterCount = document.getElementById("filterCount").value;
  const searchTerm = document.getElementById("districtFilter").value.toLowerCase().trim();
  const municipalityFilter = document.getElementById("municipalityFilter").value;

  let filtered = allDistricts;

  if (municipalityFilter) {
    filtered = filtered.filter(d => d.municipality === municipalityFilter);
  }

  if (searchTerm) {
    filtered = filtered.filter(d => 
      d.name.toLowerCase().includes(searchTerm) || 
      d.municipality.toLowerCase().includes(searchTerm)
    );
  }

  if (filterCount !== "all") {
    filtered = filtered.slice(0, parseInt(filterCount));
  }

  districts = filtered;

  const total = filtered.reduce((sum, d) => sum + d.count, 0);
  document.getElementById("totalReports").textContent = total.toLocaleString();
  document.getElementById("totalDistricts").textContent = filtered.length;
  document.getElementById("topDistrict").textContent = filtered[0] ? filtered[0].name : "-";
  document.getElementById("chartSubtitle").textContent = `إجمالي البلاغات: ${total.toLocaleString()}`;
  document.getElementById("centerTotal").textContent = total.toLocaleString();

  updateMap(filtered);
  updateTable(filtered, total);
  updateChart(filtered);
  updateBarChart(); // تحديث رسم التصنيفات
}

function updateMap(data) {
  clearMarkers();

  const bounds = new google.maps.LatLngBounds();

  data.forEach((d, index) => {
    const color = COLORS[index % COLORS.length];

    const circle = new google.maps.Circle({
      center: { lat: d.lat, lng: d.lng },
      radius: 500 + (d.count * 50),
      fillColor: color,
      fillOpacity: 0.6,
      strokeColor: color,
      strokeWeight: 2,
      map: map
    });

    const label = new google.maps.Marker({
      position: { lat: d.lat, lng: d.lng },
      map: map,
      label: {
        text: d.count.toString(),
        color: 'white',
        fontSize: '12px',
        fontWeight: 'bold'
      },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 0
      }
    });

    const info = new google.maps.InfoWindow({
      content: `<div style="text-align:center;padding:8px;direction:rtl;font-size:12px;"><h3 style="margin:0 0 5px;">${d.name}</h3><p style="margin:0 0 5px;">البلدية: ${d.municipality}</p><p style="font-size:18px;font-weight:bold;color:${color};margin:0;">${d.count} بلاغ</p></div>`
    });

    circle.addListener('click', () => info.open(map, circle));
    label.addListener('click', () => info.open(map, label));

    markers.push({ circle, label });
    bounds.extend({ lat: d.lat, lng: d.lng });
  });

  if (data.length > 0) map.fitBounds(bounds);
}

function updateTable(data, total) {
  const container = document.getElementById("tableSection");
  container.innerHTML = "";

  const totalPages = Math.ceil(data.length / ITEMS_PER_PAGE);

  for (let page = 0; page < totalPages; page++) {
    const start = page * ITEMS_PER_PAGE;
    const end = Math.min(start + ITEMS_PER_PAGE, data.length);
    const pageData = data.slice(start, end);

    const tablePage = document.createElement('div');
    tablePage.className = 'tablePage';

    let rowsHtml = '';
    pageData.forEach((d, index) => {
      const globalIndex = start + index;
      const percentage = total > 0 ? ((d.count / total) * 100).toFixed(1) : 0;
      const rankClass = globalIndex === 0 ? 'gold' : globalIndex === 1 ? 'silver' : globalIndex === 2 ? 'bronze' : 'normal';
      const countClass = d.count > 100 ? 'high' : d.count > 50 ? 'medium' : '';

      rowsHtml += `
        <tr>
          <td><span class="rank ${rankClass}">${globalIndex + 1}</span></td>
          <td>${d.name}</td>
          <td>${d.municipality}</td>
          <td><span class="countBadge ${countClass}">${d.count}</span></td>
          <td>${percentage}%</td>
        </tr>
      `;
    });

    tablePage.innerHTML = `
      <h2 class="sectionTitle">تفاصيل الأحياء - صفحة ${page + 1} من ${totalPages}</h2>
      <div style="flex: 1; overflow: auto;">
        <table class="dataTable">
          <thead>
            <tr>
              <th>الترتيب</th>
              <th>الحي</th>
              <th>البلدية</th>
              <th>عدد البلاغات</th>
              <th>النسبة</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml}
          </tbody>
        </table>
      </div>
      <div class="pageNumber">صفحة ${page + 1} من ${totalPages} - إجمالي البلاغات: ${total.toLocaleString()}</div>
    `;

    container.appendChild(tablePage);
  }
}

// ✅ رسم الأحياء (الدونات)
function updateChart(data) {
  const ctx = document.getElementById("chartCanvas").getContext("2d");

  if (chart) chart.destroy();

  Chart.register(ChartDataLabels);

  const total = data.reduce((sum, d) => sum + d.count, 0);

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: data.map(d => d.name),
      datasets: [{
        data: data.map(d => d.count),
        backgroundColor: COLORS.slice(0, data.length),
        borderWidth: 2,
        borderColor: '#fff',
        hoverOffset: 10
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: '45%',
      layout: {
        padding: 80
      },
      plugins: {
        legend: { 
          display: false
        },
        datalabels: {
          color: '#1e293b',
          font: {
            size: 11,
            weight: 'bold',
            family: 'Segoe UI'
          },
          formatter: (value, ctx) => {
            const label = ctx.chart.data.labels[ctx.dataIndex];
            const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
            return `${label}\n${percentage}%`;
          },
          anchor: 'end',
          align: 'end',
          offset: 8,
          textAlign: 'center',
          clamp: true
        },
        tooltip: {
          backgroundColor: 'rgba(30, 41, 59, 0.9)',
          titleFont: { size: 13 },
          bodyFont: { size: 12 },
          padding: 10,
          cornerRadius: 6,
          callbacks: {
            label: function(context) {
              const percentage = ((context.parsed / total) * 100).toFixed(1);
              return ` ${context.label}: ${context.parsed} بلاغ (${percentage}%)`;
            }
          }
        }
      },
      animation: {
        animateRotate: true,
        animateScale: true,
        duration: 800,
        easing: 'easeOutQuart'
      }
    }
  });
}

// ✅ رسم التصنيفات (البار) - يعرض بيانات العمود الرابع
function updateBarChart() {
  const ctx = document.getElementById("barChartCanvas").getContext("2d");

  if (barChart) barChart.destroy();

  // تحويل إحصائيات التصنيفات إلى مصفوفة مرتبة
  const categories = Object.entries(categoryStats)
    .map(([name, count]) => ({ name, count }))
    .sort((a, b) => b.count - a.count);

  const totalCategories = categories.reduce((sum, c) => sum + c.count, 0);
  document.getElementById("barChartSubtitle").textContent = `إجمالي التصنيفات: ${categories.length} - إجمالي البلاغات: ${totalCategories.toLocaleString()}`;

  // عكس الترتيب لعرض الأعلى في الأعلى
  const reversedData = [...categories].reverse();

  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: reversedData.map(c => c.name),
      datasets: [{
        label: 'عدد البلاغات',
        data: reversedData.map(c => c.count),
        backgroundColor: reversedData.map((c, i) => COLORS[(categories.length - 1 - i) % COLORS.length]),
        borderWidth: 0,
        borderRadius: 6,
        barPercentage: 0.6
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: {
          left: 10,
          right: 60,
          top: 10,
          bottom: 10
        }
      },
      plugins: {
        legend: {
          display: false
        },
        datalabels: {
          color: '#1e293b',
          font: {
            size: 12,
            weight: 'bold',
            family: 'Segoe UI'
          },
          formatter: (value) => {
            return value.toLocaleString();
          },
          anchor: 'end',
          align: 'end',
          offset: 5
        },
        tooltip: {
          backgroundColor: 'rgba(30, 41, 59, 0.9)',
          titleFont: { size: 13 },
          bodyFont: { size: 12 },
          padding: 10,
          cornerRadius: 6,
          callbacks: {
            label: function(context) {
              const percentage = ((context.parsed.x / totalCategories) * 100).toFixed(1);
              return ` ${context.parsed.x} بلاغ (${percentage}%)`;
            }
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          grid: {
            color: '#e2e8f0',
            drawBorder: false
          },
          ticks: {
            font: { size: 10 },
            color: '#64748b'
          }
        },
        y: {
          grid: {
            display: false,
            drawBorder: false
          },
          ticks: {
            font: { size: 11, weight: 'bold' },
            color: '#1e293b'
          }
        }
      },
      animation: {
        duration: 800,
        easing: 'easeOutQuart'
      }
    }
  });
}

function exportTable() {
  document.getElementById("loading").style.display = "flex";
  const tablePages = document.querySelectorAll('.tablePage');
  let currentPage = 0;

  function exportNextPage() {
    if (currentPage >= tablePages.length) {
      document.getElementById("loading").style.display = "none";
      return;
    }

    html2canvas(tablePages[currentPage], {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      width: 794,
      height: 1123
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = `الجدول_صفحة_${currentPage + 1}_A4_${new Date().toLocaleDateString('ar-SA')}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();

      currentPage++;
      setTimeout(exportNextPage, 300);
    }).catch(err => {
      console.error(err);
      document.getElementById("loading").style.display = "none";
      alert("حدث خطأ أثناء تصدير الجدول");
    });
  }

  exportNextPage();
}

function exportFullReport() {
  document.getElementById("loading").style.display = "flex";
  const controlPanel = document.querySelector('.controlPanel');
  const originalDisplay = controlPanel.style.display;
  controlPanel.style.display = 'none';

  const sections = [
    document.getElementById("mapSection"),
    document.getElementById("chartContainer"),
    document.getElementById("barChartContainer"),
    ...document.querySelectorAll('.tablePage')
  ];

  let currentIndex = 0;

  function exportNextSection() {
    if (currentIndex >= sections.length) {
      controlPanel.style.display = originalDisplay;
      document.getElementById("loading").style.display = "none";
      return;
    }

    const section = sections[currentIndex];
    if (!section) {
      currentIndex++;
      exportNextSection();
      return;
    }

    html2canvas(section, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      width: 794,
      height: 1123
    }).then(canvas => {
      const link = document.createElement("a");
      let sectionName;
      if (currentIndex === 0) sectionName = "خريطة";
      else if (currentIndex === 1) sectionName = "أحياء_دونات";
      else if (currentIndex === 2) sectionName = "تصنيفات_بار";
      else sectionName = `جدول_صفحة_${currentIndex - 2}`;
      
      link.download = `${sectionName}_A4_${new Date().toLocaleDateString('ar-SA')}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();

      currentIndex++;
      setTimeout(exportNextSection, 500);
    }).catch(err => {
      console.error(err);
      controlPanel.style.display = originalDisplay;
      document.getElementById("loading").style.display = "none";
      alert("حدث خطأ أثناء تصدير التقرير");
    });
  }

  exportNextSection();
}
