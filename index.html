<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل المواقع</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<style>

body{
margin:0;
font-family:tahoma
}

#map{
height:100vh;
width:100%
}

.panel{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<div class="panel">

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br>

<button onclick="importExcel()">استيراد Excel</button>
<button onclick="exportExcel()">تصدير Excel</button>

</div>

<div id="map"></div>

<script>

let map
let markers=[]
let polygon=null
let allPoints=[]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:13,
mapTypeId:"hybrid"
})

}

/* خوارزمية الحدود الخارجية */

function convexHull(points){

points=points.slice()

points.sort((a,b)=>a.lng-b.lng||a.lat-b.lat)

const cross=(o,a,b)=>(
(a.lng-o.lng)*(b.lat-o.lat)-
(a.lat-o.lat)*(b.lng-o.lng)
)

let lower=[]

for(let p of points){

while(lower.length>=2 &&
cross(lower[lower.length-2],
lower[lower.length-1],
p)<=0){
lower.pop()
}

lower.push(p)

}

let upper=[]

for(let i=points.length-1;i>=0;i--){

let p=points[i]

while(upper.length>=2 &&
cross(upper[upper.length-2],
upper[upper.length-1],
p)<=0){
upper.pop()
}

upper.push(p)

}

upper.pop()
lower.pop()

return lower.concat(upper)

}

/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

allPoints=[]

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])

if(!isNaN(lat)&&!isNaN(lng)){
allPoints.push({lat:lat,lng:lng})
}

}

drawPoints()
drawHull()

}

reader.readAsArrayBuffer(file)

}

/* رسم النقاط */

function drawPoints(){

markers.forEach(m=>m.setMap(null))
markers=[]

allPoints.forEach(p=>{

let marker=new google.maps.Marker({
position:p,
map:map
})

markers.push(marker)

})

}

/* رسم الشكل الخارجي */

function drawHull(){

if(polygon){
polygon.setMap(null)
}

let hull=convexHull(allPoints)

polygon=new google.maps.Polygon({

paths:hull,
strokeColor:"#ff0000",
strokeOpacity:1,
strokeWeight:4,
fillColor:"#ff0000",
fillOpacity:0.25,
map:map

})

let bounds=new google.maps.LatLngBounds()

allPoints.forEach(p=>bounds.extend(p))

map.fitBounds(bounds)

}

/* تصدير Excel */

async function exportExcel(){

let workbook=new ExcelJS.Workbook()

let sheet=workbook.addWorksheet("Points")

sheet.columns=[

{header:"Latitude",key:"lat",width:18},
{header:"Longitude",key:"lng",width:18}

]

allPoints.forEach(p=>{

sheet.addRow({
lat:p.lat,
lng:p.lng
})

})

const buffer=await workbook.xlsx.writeBuffer()

let link=document.createElement("a")

link.href=URL.createObjectURL(new Blob([buffer]))

link.download="points.xlsx"

link.click()

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&callback=initMap">
</script>

</body>
</html>
