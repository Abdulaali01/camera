<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>خريطة الطائف</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:tahoma;
background:#f5f5f5;
text-align:center;
padding:15px;
}

#map{
height:520px;
border-radius:10px;
margin-top:10px;
}

.box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:170px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
margin:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h3>البحث عن حي أو شارع</h3>

<input id="district" placeholder="اسم الحي">
<input id="street" placeholder="اسم الشارع">

<button onclick="searchLocation()">بحث</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map=L.map('map').setView([21.27,40.41],13);

/* صور الأقمار الصناعية */

var satellite=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
).addTo(map);

/* أسماء الشوارع والأحياء */

var labels=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
opacity:0.6
}
).addTo(map);

/* البحث */

function searchLocation(){

var district=document.getElementById("district").value;
var street=document.getElementById("street").value;

var query=street+" "+district+" الطائف السعودية";

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(query))

.then(res=>res.json())

.then(data=>{

if(data.length==0){

alert("لم يتم العثور على الموقع");

return;

}

var lat=data[0].lat;
var lon=data[0].lon;

map.setView([lat,lon],17);

});

}

</script>

</body>
</html>
