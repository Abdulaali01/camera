<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل المواقع</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:tahoma
}

#map{
height:100vh;
width:100%;
}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
z-index:5;
background:#fff;
font-size:16px
}

.box{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="box">

<input type="file" id="excelFile">

<button onclick="importExcel()">استيراد Excel</button>

<button onclick="exportPDF()">تصدير PDF</button>

</div>

<div id="map"></div>

<script>

let map;
let groups=[];

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{

center:{lat:21.4373,lng:40.5127},
zoom:13,
mapTypeId:"hybrid"

});


/* البحث */

const input=document.getElementById("searchBox");

const autocomplete=new google.maps.places.Autocomplete(input,{
componentRestrictions:{country:"sa"}
});

autocomplete.bindTo("bounds",map);

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace();

if(!place.geometry) return;

map.panTo(place.geometry.location);
map.setZoom(17);

});

}



/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0];

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:"array"});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let json=XLSX.utils.sheet_to_json(sheet);

let points=[];

json.forEach(r=>{

points.push({

lat:parseFloat(r.Latitude),
lng:parseFloat(r.Longitude)

});

});

groups=groupPoints(points);

drawGroups(groups);

};

reader.readAsArrayBuffer(file);

}



/* حساب المسافة */

function distance(a,b){

let R=6371000;

let dLat=(b.lat-a.lat)*Math.PI/180;

let dLng=(b.lng-a.lng)*Math.PI/180;

let lat1=a.lat*Math.PI/180;

let lat2=b.lat*Math.PI/180;

let x=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.sin(dLng/2)*Math.sin(dLng/2)*Math.cos(lat1)*Math.cos(lat2);

let d=2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));

return R*d;

}



/* تجميع النقاط 100 متر */

function groupPoints(points){

let groups=[];

points.forEach(p=>{

let added=false;

groups.forEach(g=>{

if(distance(p,g[0])<=100){

g.push(p);

added=true;

}

});

if(!added) groups.push([p]);

});

return groups;

}



/* رسم المجموعات */

function drawGroups(groups){

let colors=[

"#00ff00",
"#ff0000",
"#0000ff",
"#ff9900",
"#ff00ff",
"#00ffff",
"#9900ff",
"#009933"

];

groups.forEach((g,i)=>{

let path=g.map(p=>({lat:p.lat,lng:p.lng}));

let color=colors[i % colors.length];

new google.maps.Polygon({

paths:path,

fillColor:color,
fillOpacity:0.35,

strokeColor:color,
strokeWeight:2,

map:map

});

});

}



/* تصدير PDF */

async function exportPDF(){

const {jsPDF}=window.jspdf;

let pdf=new jsPDF('p','mm','a4');

let canvas=await html2canvas(document.getElementById("map"));

let img=canvas.toDataURL("image/png");

pdf.addImage(img,'PNG',0,0,210,297);

pdf.save("map_report.pdf");

}

</script>


<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
