<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>البحث عن حي أو شارع + حساب المساحة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:tahoma;
background:#f5f5f5;
text-align:center;
padding:15px;
}

#map{
height:520px;
border-radius:10px;
margin-top:10px;
}

.box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:180px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
margin:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h3>البحث عن حي أو شارع</h3>

<input id="district" placeholder="اسم الحي">
<input id="street" placeholder="اسم الشارع">

<button onclick="searchLocation()">بحث</button>

<br><br>

اسم الموقع
<input id="name">

<br><br>

<button onclick="save()">حفظ</button>
<button onclick="clearMap()">مسح</button>
<button onclick="exportExcel()">تصدير Excel</button>

<h3 id="area">المساحة: 0</h3>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

var map=L.map('map').setView([21.27,40.41],13);

/* خريطة تضاريس واضحة */

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
maxZoom:17
}).addTo(map);

var points=[];
var polygon;
var markers=[];
var data=[];

/* إضافة نقاط عند الضغط */

map.on('click',function(e){

var lat=e.latlng.lat;
var lng=e.latlng.lng;

var marker=L.marker([lat,lng],{draggable:true}).addTo(map);

marker.on('drag',update);

markers.push(marker);

update();

});

function update(){

points=[];

markers.forEach(m=>{

var p=m.getLatLng();

points.push([p.lng,p.lat]);

});

if(polygon){
map.removeLayer(polygon);
}

if(points.length>2){

polygon=L.polygon(points.map(p=>[p[1],p[0]]),{color:'red'}).addTo(map);

var poly=turf.polygon([[...points,points[0]]]);

var area=turf.area(poly);

document.getElementById("area").innerHTML=
"المساحة: "+area.toFixed(0)+" متر مربع";

}

}

/* مسح */

function clearMap(){

markers.forEach(m=>map.removeLayer(m));

markers=[];

points=[];

if(polygon){
map.removeLayer(polygon);
}

document.getElementById("area").innerHTML="المساحة: 0";

}

/* حفظ */

function save(){

var name=document.getElementById("name").value;

if(!name){
alert("اكتب اسم الموقع");
return;
}

var poly=turf.polygon([[...points,points[0]]]);

var area=turf.area(poly);

data.push({
"الموقع":name,
"المساحة م2":area.toFixed(0)
});

alert("تم الحفظ");

}

/* تصدير Excel */

function exportExcel(){

var ws=XLSX.utils.json_to_sheet(data);

var wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"المساحات");

XLSX.writeFile(wb,"مساحات.xlsx");

}

/* البحث */

function searchLocation(){

var district=document.getElementById("district").value;
var street=document.getElementById("street").value;

var query=street+" "+district+" الطائف";

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+query)

.then(r=>r.json())

.then(res=>{

if(res.length==0){

alert("لم يتم العثور على الموقع");

return;

}

var lat=res[0].lat;
var lon=res[0].lon;

map.setView([lat,lon],17);

});

}

</script>

</body>
</html>
