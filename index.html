<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تحليل الأحياء - نظام ربع سنوي</title>

<!-- المكتبات -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- Leaflet CSS & JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; }
.top-bar { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); padding: 12px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 100000; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 3px solid #1e3c72; }
.top-bar input, .top-bar select, .top-bar button { padding: 8px 14px; border-radius: 10px; border: 2px solid #e0e0e0; font-size: 13px; }
.top-bar button { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border: none; cursor: pointer; font-weight: 600; transition: all 0.3s; }
.top-bar button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(30,60,114,0.4); }
.btn-export { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%) !important; }
.btn-compare { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important; }
.main-container { margin-top: 80px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

/* الخريطة - إصلاح مهم */
.map-wrapper { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; height: 70vh; width: 100%; z-index: 1; }
#map { height: 100%; width: 100%; z-index: 1; }

/* تخصيص Cluster */
.marker-cluster-small { background-color: rgba(30,60,114,0.6) !important; }
.marker-cluster-small div { background-color: #1e3c72 !important; color: white !important; font-weight: bold !important; }
.marker-cluster-medium { background-color: rgba(42,82,152,0.6) !important; }
.marker-cluster-medium div { background-color: #2a5298 !important; color: white !important; font-weight: bold !important; }
.marker-cluster-large { background-color: rgba(245,87,108,0.6) !important; }
.marker-cluster-large div { background-color: #f5576c !important; color: white !important; font-weight: bold !important; }

/* النقاط الدائرية */
.custom-circle-marker { border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); transition: all 0.3s; }
.custom-circle-marker:hover { transform: scale(1.2); z-index: 1000 !important; }

/* أزرار التكبير */
.custom-zoom { position: absolute; bottom: 30px; right: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; z-index: 1000; border: 2px solid #1e3c72; }
.zoom-btn { width: 48px; height: 48px; border: none; background: white; font-size: 24px; cursor: pointer; color: #1e3c72; font-weight: bold; transition: all 0.3s; }
.zoom-btn:hover { background: #1e3c72; color: white; }
.zoom-btn:first-child { border-bottom: 1px solid #e0e0e0; }

/* الإحصائيات */
.stats-section { display: grid; grid-template-columns: 250px 1fr 1fr; gap: 20px; }
.card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
.card-title { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 3px solid #1e3c72; display: flex; align-items: center; gap: 8px; }
.stat-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 10px; font-size: 13px; }
.stat-value { font-weight: 700; color: #1e3c72; font-size: 18px; }
.quarter-badge { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }

/* الدليل */
.legend-container { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.legend-item { display: flex; align-items: center; gap: 8px; padding: 10px; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 12px; border-right: 4px solid transparent; }
.legend-item:hover { background: #e9ecef; transform: translateX(-5px); border-right-color: #1e3c72; }
.legend-color-box { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.legend-text { flex: 1; text-align: right; font-weight: 500; }
.legend-count { background: #333; color: white; padding: 3px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; }

/* المخطط */
.chart-scroll-container { position: relative; height: 350px; overflow-y: auto; overflow-x: hidden; border-radius: 10px; background: #f8f9fa; padding: 10px; }
.chart-canvas-wrapper { position: relative; height: max-content; min-height: 100%; }

/* مقارنة الأرباع */
.compare-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
.quarter-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 4px solid; transition: all 0.3s; }
.quarter-card:hover { transform: translateY(-5px); }
.quarter-card.q1 { border-top-color: #e74c3c; } .quarter-card.q2 { border-top-color: #f39c12; } .quarter-card.q3 { border-top-color: #27ae60; } .quarter-card.q4 { border-top-color: #3498db; }
.quarter-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 10px; }
.quarter-value { font-size: 32px; font-weight: bold; color: #1e3c72; margin: 10px 0; }
.quarter-trend { font-size: 12px; padding: 5px 10px; border-radius: 20px; display: inline-block; font-weight: 600; }
.trend-up { background: #d4edda; color: #155724; } .trend-down { background: #f8d7da; color: #721c24; }

/* نافذة التفاصيل */
.district-popup { min-width: 250px; }
.popup-header { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 15px; border-radius: 10px 10px 0 0; margin: -13px -13px 10px -13px; font-weight: bold; font-size: 16px; }
.popup-stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
.popup-stat:last-child { border-bottom: none; } .popup-label { color: #666; } .popup-value { font-weight: bold; color: #1e3c72; }

/* Responsive */
@media (max-width: 1200px) { .stats-section { grid-template-columns: 1fr 1fr; } .compare-section { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .stats-section { grid-template-columns: 1fr; } .compare-section { grid-template-columns: 1fr; } }
</style>
</head>

<body>

<div class="top-bar">
    <input type="file" id="file" accept=".xlsx,.xls">
    <button onclick="loadExcel()">📁 رفع ملف Excel</button>
    <select id="quarterFilter" onchange="applyCurrentFilter()">
        <option value="all">📅 كل الأرباع</option>
        <option value="Q1">الربع الأول</option>
        <option value="Q2">الربع الثاني</option>
        <option value="Q3">الربع الثالث</option>
        <option value="Q4">الربع الرابع</option>
    </select>
    <select id="municipalityFilter" onchange="applyCurrentFilter()"><option value="all">🏛️ كل البلديات</option></select>
    <select id="filterSelect" onchange="applyCurrentFilter()">
        <option value="all">📊 كل الأحياء</option>
        <option value="50">🔥 أعلى 50</option>
        <option value="100">🔥 أعلى 100</option>
        <option value="200">🔥 أعلى 200</option>
    </select>
    <input id="searchBox" placeholder="🔍 بحث عن حي..." oninput="applyCurrentFilter()">
    <button onclick="fitAll()">🌍 إظهار الكل</button>
    <button class="btn-export" onclick="exportFullPage()">📸 تصدير التقرير</button>
    <button class="btn-compare" onclick="showQuarterComparison()">📊 مقارنة الأرباع</button>
    <button onclick="exportExcel()">📊 Excel</button>
    <button onclick="clearAllData()" style="background: #ff4757 !important;">🗑️ مسح</button>
</div>

<div class="main-container" id="captureArea">
    <div class="map-wrapper" id="mapSection">
        <div id="map"></div>
        <div class="custom-zoom">
            <button class="zoom-btn" onclick="map.zoomIn()">+</button>
            <button class="zoom-btn" onclick="map.zoomOut()">−</button>
        </div>
    </div>

    <div class="stats-section" id="statsSection">
        <div class="card">
            <div class="card-title">🎨 دليل الأحياء</div>
            <div id="legendBox" class="legend-container"></div>
        </div>

        <div class="card">
            <div class="card-title">📊 توزيع التقارير <span class="quarter-badge" id="currentQuarterBadge">الكل</span></div>
            <div class="chart-scroll-container">
                <div class="chart-canvas-wrapper" id="chartWrapper">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📈 إحصائيات عامة</div>
            <div class="stat-item"><span>إجمالي التقارير</span><span class="stat-value" id="totalReports">0</span></div>
            <div class="stat-item"><span>عدد الأحياء</span><span class="stat-value" id="totalDistricts">0</span></div>
            <div class="stat-item"><span>متوسط التقارير/حي</span><span class="stat-value" id="avgReports">0</span></div>
            <div class="stat-item"><span>الأعلى تقارير</span><span class="stat-value" id="topDistrict" style="font-size:14px;">-</span></div>
        </div>
    </div>

    <div id="compareSection" style="display:none;">
        <div class="card" style="margin-top:20px;">
            <div class="card-title">📊 مقارنة الأداء الربع سنوي</div>
            <div class="compare-section" id="quarterComparison"></div>
        </div>
    </div>
</div>

<script>
// تسجيل البلجن
Chart.register(ChartDataLabels);

// المتغيرات العامة
let map = null;
let markersCluster = null;
let rawData = [];
let visibleDistricts = [];
let chart = null;
let allMunicipalities = new Set();

// ألوان حسب القيمة
const getColorByValue = (value, max) => {
    const ratio = value / max;
    if (ratio > 0.8) return '#e74c3c';
    if (ratio > 0.6) return '#e67e22';
    if (ratio > 0.4) return '#f39c12';
    if (ratio > 0.2) return '#27ae60';
    return '#3498db';
};

// استخراج الربع من التاريخ
const getQuarterFromDate = (dateStr) => {
    if (!dateStr || dateStr === 'غير معروف') return 'غير محدد';
    let month = null;
    if (dateStr.includes('/')) {
        const parts = dateStr.split('/');
        if (parts.length >= 2) month = parseInt(parts[0]) || parseInt(parts[1]);
    } else if (dateStr.includes('-')) {
        const parts = dateStr.split('-');
        if (parts.length >= 2) month = parseInt(parts[1]);
    }
    if (!month || isNaN(month)) return 'غير محدد';
    if (month >= 1 && month <= 3) return 'Q1';
    if (month >= 4 && month <= 6) return 'Q2';
    if (month >= 7 && month <= 9) return 'Q3';
    if (month >= 10 && month <= 12) return 'Q4';
    return 'غير محدد';
};

// تهيئة الخريطة - إصلاح مهم
function initMap() {
    // التأكد من أن العنصر موجود
    const mapElement = document.getElementById('map');
    if (!mapElement) {
        console.error('عنصر الخريطة غير موجود!');
        return;
    }

    // إنشاء الخريطة
    map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        preferCanvas: true
    }).setView([24.7136, 46.6753], 6); // مركز السعودية

    // إضافة طبقة الخريطة
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // إنشاء مجموعة التجميع
    markersCluster = L.markerClusterGroup({
        chunkedLoading: true,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        maxClusterRadius: 80,
        disableClusteringAtZoom: 16,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            let size = count > 100 ? 'large' : count > 50 ? 'medium' : 'small';
            return L.divIcon({
                html: '<div><span>' + count + '</span></div>',
                className: 'marker-cluster marker-cluster-' + size,
                iconSize: L.point(40, 40)
            });
        }
    });

    map.addLayer(markersCluster);
    console.log('✅ تم تهيئة الخريطة بنجاح');
}

// تحميل Excel
function loadExcel() {
    const file = document.getElementById("file").files[0];
    if (!file) { alert('الرجاء اختيار ملف'); return; }

    const reader = new FileReader();
    reader.onload = e => {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
        processRows(rows);
    };
    reader.readAsArrayBuffer(file);
}

// معالجة البيانات
function processRows(rows) {
    rawData = [];
    allMunicipalities.clear();
    const districtMap = {};

    for (let i = 1; i < rows.length; i++) {
        let r = rows[i];
        if (!r || r.length < 3) continue;

        let lng = parseFloat(r[0]);
        let lat = parseFloat(r[1]);
        let name = String(r[2] || "غير معروف").trim();
        let muni = String(r[3] || "غير محدد").trim();
        let date = String(r[4] || "غير معروف").trim();
        let category = String(r[5] || "غير محدد").trim();

        if (isNaN(lat) || isNaN(lng)) continue;

        allMunicipalities.add(muni);
        const quarter = getQuarterFromDate(date);
        const key = name + "||" + muni;

        if (!districtMap[key]) {
            districtMap[key] = {
                name: name,
                municipality: muni,
                centerLat: lat,
                centerLng: lng,
                totalCount: 0,
                quarters: { Q1: 0, Q2: 0, Q3: 0, Q4: 0 },
                categories: new Set()
            };
        }

        districtMap[key].totalCount++;
        if (districtMap[key].quarters[quarter] !== undefined) {
            districtMap[key].quarters[quarter]++;
        }
        districtMap[key].categories.add(category);
    }

    const maxCount = Math.max(...Object.values(districtMap).map(x => x.totalCount), 1);

    rawData = Object.values(districtMap).map((d, i) => ({
        ...d,
        uniqueId: i,
        color: getColorByValue(d.totalCount, maxCount)
    })).sort((a, b) => b.totalCount - a.totalCount);

    fillSelect("municipalityFilter", allMunicipalities);

    document.getElementById("totalReports").textContent = rawData.reduce((s, d) => s + d.totalCount, 0).toLocaleString();
    document.getElementById("totalDistricts").textContent = rawData.length.toLocaleString();
    document.getElementById("avgReports").textContent = Math.round(rawData.reduce((s, d) => s + d.totalCount, 0) / rawData.length).toLocaleString();
    document.getElementById("topDistrict").textContent = rawData[0]?.name || "-";

    showNotification(`✅ تم تحميل ${rawData.length} حي`);
    applyCurrentFilter();
}

// ملء القائمة المنسدلة
function fillSelect(id, set) {
    let el = document.getElementById(id);
    el.innerHTML = '<option value="all">' + (id === 'municipalityFilter' ? '🏛️ كل البلديات' : '📅 كل الأشهر') + '</option>';
    [...set].sort().forEach(v => {
        el.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

// تطبيق الفلتر
function applyCurrentFilter() {
    const quarter = document.getElementById("quarterFilter").value;
    const muni = document.getElementById("municipalityFilter").value;
    const top = document.getElementById("filterSelect").value;
    const search = document.getElementById("searchBox").value.toLowerCase();

    const quarterNames = { 'all': 'الكل', 'Q1': 'الربع الأول', 'Q2': 'الربع الثاني', 'Q3': 'الربع الثالث', 'Q4': 'الربع الرابع' };
    document.getElementById("currentQuarterBadge").textContent = quarterNames[quarter] || quarter;

    let filtered = rawData.filter(d =>
        (muni === "all" || d.municipality === muni) &&
        d.name.toLowerCase().includes(search) &&
        (quarter === "all" || d.quarters[quarter] > 0)
    );

    if (quarter !== "all") {
        filtered.sort((a, b) => b.quarters[quarter] - a.quarters[quarter]);
    }

    visibleDistricts = filtered.slice(0, top === "all" ? Infinity : parseInt(top));

    drawMap();
    drawChart();
    buildLegend();
    buildExport();
}

// رسم الخريطة
function drawMap() {
    if (!markersCluster) {
        console.error('markersCluster غير مهيأ!');
        return;
    }

    markersCluster.clearLayers();

    if (visibleDistricts.length === 0) return;

    const maxCount = Math.max(...visibleDistricts.map(d => d.totalCount), 1);
    const quarter = document.getElementById("quarterFilter").value;

    visibleDistricts.forEach(d => {
        const count = quarter === "all" ? d.totalCount : d.quarters[quarter];
        if (count === 0) return;

        const radius = Math.max(15, Math.min(60, count / maxCount * 50));
        const color = getColorByValue(count, maxCount);

        const marker = L.marker([d.centerLat, d.centerLng], {
            icon: L.divIcon({
                className: 'custom-circle-marker',
                html: count > 99 ? '99+' : count,
                iconSize: [radius, radius],
                iconAnchor: [radius / 2, radius / 2]
            })
        });

        // تخصيص العنصر بعد إضافته
        marker.on('add', function() {
            const el = this.getElement();
            if (el) {
                el.style.backgroundColor = color;
                el.style.width = radius + 'px';
                el.style.height = radius + 'px';
            }
        });

        const popupContent = `
            <div class="district-popup">
                <div class="popup-header">${d.name}</div>
                <div class="popup-stat"><span class="popup-label">البلدية:</span><span class="popup-value">${d.municipality}</span></div>
                <div class="popup-stat"><span class="popup-label">إجمالي التقارير:</span><span class="popup-value">${d.totalCount}</span></div>
                <div class="popup-stat"><span class="popup-label">Q1:</span><span class="popup-value">${d.quarters.Q1}</span></div>
                <div class="popup-stat"><span class="popup-label">Q2:</span><span class="popup-value">${d.quarters.Q2}</span></div>
                <div class="popup-stat"><span class="popup-label">Q3:</span><span class="popup-value">${d.quarters.Q3}</span></div>
                <div class="popup-stat"><span class="popup-label">Q4:</span><span class="popup-value">${d.quarters.Q4}</span></div>
            </div>
        `;

        marker.bindPopup(popupContent);
        markersCluster.addLayer(marker);
    });

    // تكبير لإظهار جميع النقاط
    const bounds = visibleDistricts.map(d => [d.centerLat, d.centerLng]);
    if (bounds.length > 0 && map) {
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
    }
}

// رسم المخطط
function drawChart() {
    if (chart) chart.destroy();

    const ctx = document.getElementById("chart").getContext("2d");
    const quarter = document.getElementById("quarterFilter").value;

    const labels = visibleDistricts.map(d => d.name);
    const data = visibleDistricts.map(d => quarter === "all" ? d.totalCount : d.quarters[quarter]);
    const colors = visibleDistricts.map(d => d.color);

    const canvasHeight = Math.max(350, labels.length * 40);
    document.getElementById("chart").height = canvasHeight;
    document.getElementById("chartWrapper").style.height = canvasHeight + 'px';

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: colors,
                borderRadius: 8,
                borderSkipped: false,
                barThickness: 25
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            indexAxis: 'y',
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end',
                    align: 'right',
                    color: '#333',
                    font: { weight: 'bold', size: 11 },
                    formatter: (value) => value.toLocaleString(),
                    offset: 5
                }
            },
            scales: {
                x: {
                    beginAtZero: true,
                    grid: { color: 'rgba(0,0,0,0.05)' },
                    ticks: { callback: function(value) { return value.toLocaleString(); } }
                },
                y: {
                    grid: { display: false },
                    ticks: { font: { size: 11, weight: '500' }, autoSkip: false }
                }
            },
            onClick: (e, elements) => {
                if (elements.length > 0 && map) {
                    const district = visibleDistricts[elements[0].index];
                    map.flyTo([district.centerLat, district.centerLng], 16, { duration: 1.5 });
                }
            }
        }
    });
}

// بناء الدليل
function buildLegend() {
    const container = document.getElementById("legendBox");
    const quarter = document.getElementById("quarterFilter").value;

    const sorted = [...visibleDistricts].sort((a, b) => {
        const countA = quarter === "all" ? a.totalCount : a.quarters[quarter];
        const countB = quarter === "all" ? b.totalCount : b.quarters[quarter];
        return countB - countA;
    });

    container.innerHTML = sorted.slice(0, 20).map((d, i) => {
        const count = quarter === "all" ? d.totalCount : d.quarters[quarter];
        return `
            <div class="legend-item" onclick="highlightDistrict(${d.uniqueId})" title="${d.name}">
                <div class="legend-color-box" style="background:${d.color};">${i + 1}</div>
                <span class="legend-text">${d.name}</span>
                <span class="legend-count">${count}</span>
            </div>
        `;
    }).join("");
}

// تظليل حي
function highlightDistrict(uniqueId) {
    const district = visibleDistricts.find(d => d.uniqueId === uniqueId);
    if (district && map) {
        map.flyTo([district.centerLat, district.centerLng], 16, { duration: 1.5 });
        markersCluster.getLayers().forEach(layer => {
            const latLng = layer.getLatLng();
            if (Math.abs(latLng.lat - district.centerLat) < 0.0001 && Math.abs(latLng.lng - district.centerLng) < 0.0001) {
                layer.openPopup();
            }
        });
    }
}

// مقارنة الأرباع
function showQuarterComparison() {
    const section = document.getElementById("compareSection");
    const container = document.getElementById("quarterComparison");

    if (section.style.display === "none") {
        section.style.display = "block";

        const totals = { Q1: 0, Q2: 0, Q3: 0, Q4: 0 };
        rawData.forEach(d => {
            totals.Q1 += d.quarters.Q1;
            totals.Q2 += d.quarters.Q2;
            totals.Q3 += d.quarters.Q3;
            totals.Q4 += d.quarters.Q4;
        });

        const quarters = [
            { key: 'Q1', name: 'الربع الأول', color: '#e74c3c' },
            { key: 'Q2', name: 'الربع الثاني', color: '#f39c12' },
            { key: 'Q3', name: 'الربع الثالث', color: '#27ae60' },
            { key: 'Q4', name: 'الربع الرابع', color: '#3498db' }
        ];

        const maxTotal = Math.max(...Object.values(totals), 1);
        const months = ['يناير-مارس', 'أبريل-يونيو', 'يوليو-سبتمبر', 'أكتوبر-ديسمبر'];

        container.innerHTML = quarters.map((q, i) => {
            const total = totals[q.key];
            const prevTotal = i > 0 ? totals[quarters[i - 1].key] : total;
            const trend = total > prevTotal ? 'up' : total < prevTotal ? 'down' : 'same';

            return `
                <div class="quarter-card ${q.key.toLowerCase()}">
                    <div class="quarter-title">${q.name}</div>
                    <div style="color:#666;font-size:12px;margin-bottom:10px;">${months[i]}</div>
                    <div class="quarter-value" style="color:${q.color};">${total.toLocaleString()}</div>
                    <div style="margin:10px 0;background:#eee;height:8px;border-radius:4px;overflow:hidden;">
                        <div style="width:${(total / maxTotal * 100)}%;height:100%;background:${q.color};"></div>
                    </div>
                    <span class="quarter-trend ${trend === 'up' ? 'trend-up' : 'trend-down'}">
                        ${trend === 'up' ? '↑' : trend === 'down' ? '↓' : '→'} 
                        ${trend === 'up' ? 'ارتفاع' : trend === 'down' ? 'انخفاض' : 'ثبات'}
                    </span>
                </div>
            `;
        }).join('');

        section.scrollIntoView({ behavior: 'smooth' });
    } else {
        section.style.display = "none";
    }
}

// تصدير Excel
let exportRows = [];
function buildExport() {
    exportRows = [["الحي", "البلدية", "إجمالي التقارير", "Q1", "Q2", "Q3", "Q4", "التصنيفات"]];
    visibleDistricts.forEach(d => {
        exportRows.push([d.name, d.municipality, d.totalCount, d.quarters.Q1, d.quarters.Q2, d.quarters.Q3, d.quarters.Q4, [...d.categories].join(", ")]);
    });
}

function exportExcel() {
    if (exportRows.length <= 1) { alert('لا توجد بيانات'); return; }
    let ws = XLSX.utils.aoa_to_sheet(exportRows);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "الأحياء");
    XLSX.writeFile(wb, "تحليل_الأحياء_الربع_سنوي.xlsx");
}

// تصدير الصفحة
async function exportFullPage() {
    showNotification('⏳ جاري تصدير التقرير...');
    try {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.2.0/dom-to-image-more.min.js');
        const node = document.getElementById('captureArea');
        await new Promise(r => setTimeout(r, 1000));

        const dataUrl = await domtoimage.toPng(node, {
            quality: 1,
            bgcolor: '#1e3c72',
            width: node.offsetWidth,
            height: node.offsetHeight
        });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();

        img.onload = () => {
            const titleHeight = 120;
            canvas.width = img.width;
            canvas.height = img.height + titleHeight;

            const gradient = ctx.createLinearGradient(0, 0, 0, titleHeight);
            gradient.addColorStop(0, '#1e3c72');
            gradient.addColorStop(1, '#2a5298');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, titleHeight);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 45px "Segoe UI",Tahoma';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('📊 تقرير تحليل الأحياء', canvas.width / 2, titleHeight / 2 - 15);
            ctx.font = '22px "Segoe UI",Tahoma';
            ctx.fillText(`${document.getElementById("currentQuarterBadge").textContent} | ${new Date().toLocaleDateString('ar-SA')}`, canvas.width / 2, titleHeight / 2 + 30);
            ctx.drawImage(img, 0, titleHeight);

            canvas.toBlob(blob => {
                saveAs(blob, `تقرير_الأحياء_${new Date().toLocaleDateString('ar-SA')}.png`);
                showNotification('✅ تم تصدير التقرير!');
            });
        };
        img.src = dataUrl;
    } catch (err) {
        console.error(err);
        alert('حدث خطأ: ' + err.message);
    }
}

function loadScript(src) {
    return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
    });
}

function fitAll() {
    if (visibleDistricts.length === 0 || !map) return;
    const bounds = visibleDistricts.map(d => [d.centerLat, d.centerLng]);
    map.fitBounds(bounds, { padding: [50, 50] });
}

function clearAllData() {
    if (confirm('هل أنت متأكد؟')) location.reload();
}

function showNotification(message) {
    const notif = document.createElement('div');
    notif.style.cssText = 'position:fixed; top:90px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:15px 30px; border-radius:30px; font-weight:600; z-index:100001;';
    notif.textContent = message;
    document.body.appendChild(notif);
    setTimeout(() => { notif.style.opacity = '0'; setTimeout(() => notif.remove(), 300); }, 3000);
}
