<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل المواقع</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{margin:0;font-family:tahoma}

#map{height:100vh;width:100%}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
z-index:5;
background:#fff;
font-size:16px
}

.box{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="box">

المساحة: <span id="area">0</span> متر²
<br>
المساحة: <span id="areaKm">0</span> كم²
<br><br>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<button onclick="importExcel()">استيراد Excel</button>

<button onclick="exportPDF()">تصدير PDF</button>

</div>

<div id="map"></div>

<script>

let map;
let polygon=null;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{

center:{lat:21.4373,lng:40.5127},
zoom:13,
mapTypeId:"hybrid"

});


/* البحث */

const input=document.getElementById("searchBox");

const autocomplete=new google.maps.places.Autocomplete(input,{
componentRestrictions:{country:"sa"}
});

autocomplete.bindTo("bounds",map);

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace();

if(!place.geometry) return;

map.panTo(place.geometry.location);
map.setZoom(17);

});


/* الرسم اليدوي */

const drawingManager=new google.maps.drawing.DrawingManager({

drawingMode:null,

drawingControl:true,

drawingControlOptions:{
position:google.maps.ControlPosition.LEFT_CENTER,
drawingModes:["polygon"]
}

});

drawingManager.setMap(map);


google.maps.event.addListener(drawingManager,'overlaycomplete',function(e){

if(polygon) polygon.setMap(null);

polygon=e.overlay;

polygon.setOptions({

fillColor:"#00ff00",
fillOpacity:0.35,
strokeColor:"#008000",
strokeWeight:2

});

updateArea();

polygon.getPath().addListener("set_at",updateArea);
polygon.getPath().addListener("insert_at",updateArea);

});

}


/* حساب المساحة */

function updateArea(){

if(!polygon) return;

let area=google.maps.geometry.spherical.computeArea(
polygon.getPath()
);

document.getElementById("area").innerHTML=Math.round(area);
document.getElementById("areaKm").innerHTML=(area/1000000).toFixed(4);

}



/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0];

if(!file){
alert("اختر ملف Excel أولاً");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:"array"});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let rows=XLSX.utils.sheet_to_json(sheet,{header:1});

let points=[];

rows.forEach(r=>{

let lat=parseFloat(r[1]);
let lng=parseFloat(r[0]);

if(!isNaN(lat) && !isNaN(lng)){
points.push({lat:lat,lng:lng});
}

});

groupPoints(points);
zoomToPoints(points);

};

reader.readAsArrayBuffer(file);

}



/* تقريب الخريطة للنقاط */

function zoomToPoints(points){

let bounds=new google.maps.LatLngBounds();

points.forEach(p=>{
bounds.extend(new google.maps.LatLng(p.lat,p.lng));
});

map.fitBounds(bounds);

setTimeout(()=>{
if(map.getZoom()>19) map.setZoom(19);
},500);

}



/* حساب المسافة */

function getDistance(a,b){

let R=6371000;

let dLat=(b.lat-a.lat)*Math.PI/180;
let dLng=(b.lng-a.lng)*Math.PI/180;

let lat1=a.lat*Math.PI/180;
let lat2=b.lat*Math.PI/180;

let x=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.sin(dLng/2)*Math.sin(dLng/2)*Math.cos(lat1)*Math.cos(lat2);

let d=2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));

return R*d;

}



/* تجميع النقاط */

function groupPoints(points){

let groups=[];

points.forEach(p=>{

let added=false;

groups.forEach(g=>{

if(getDistance(p,g[0])<=100){
g.push(p);
added=true;
}

});

if(!added) groups.push([p]);

});

drawGroups(groups);

}



/* رسم المجموعات */

function drawGroups(groups){

let colors=[
"#00ff00",
"#ff0000",
"#0000ff",
"#ff9900",
"#ff00ff",
"#00ffff",
"#9900ff"
];

groups.forEach((g,i)=>{

let color=colors[i % colors.length];

let center=g[0];

/* رسم دائرة 100 متر */

new google.maps.Circle({

strokeColor:color,
strokeOpacity:0.8,
strokeWeight:2,

fillColor:color,
fillOpacity:0.2,

map:map,
center:center,
radius:100

});


/* رسم النقاط */

g.forEach(p=>{

new google.maps.Marker({

position:p,
map:map,
icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:6,
fillColor:color,
fillOpacity:1,
strokeColor:"#000",
strokeWeight:1
}

});

});

});

}



/* تصدير PDF */

async function exportPDF(){

const {jsPDF}=window.jspdf;

let pdf=new jsPDF('p','mm','a4');

let canvas=await html2canvas(document.getElementById("map"));

let img=canvas.toDataURL("image/png");

pdf.addImage(img,'PNG',0,0,210,297);

pdf.save("map_report.pdf");

}

</script>


<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places,drawing,geometry&callback=initMap">
</script>

</body>
</html>
