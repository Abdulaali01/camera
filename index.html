<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء + الأعمدة على الخريطة</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{
margin:0;
font-family:tahoma;
background:#f5f7fb
}

#map{
height:100vh;
width:100%
}

/* الشريط العلوي */
.topPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.18);
padding:10px 12px;
z-index:10;
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
min-width:320px;
max-width:95%
}

.topPanel .group{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap
}

.topPanel .titleMini{
font-size:12px;
font-weight:bold;
color:#333;
margin-inline:2px
}

#searchBox{
width:240px;
padding:10px 12px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
outline:none;
font-size:14px
}

.fileInput{
padding:8px;
border:1px solid #ddd;
border-radius:10px;
background:#fff;
font-size:13px;
max-width:180px
}

select{
padding:9px 10px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
font-size:13px;
min-width:150px;
outline:none
}

button{
padding:9px 14px;
border:none;
border-radius:10px;
background:#2d6cff;
color:#fff;
cursor:pointer;
font-size:13px;
font-weight:bold
}

button:hover{
opacity:.92
}

#printBtn{
background:#111
}

/* للجوال */
@media (max-width:900px){

.topPanel{
width:95%;
padding:10px
}

#searchBox{
width:100%
}

.topPanel .group{
width:100%
}

.fileInput,
select,
button{
width:100%
}

}

/* ===== الطباعة ===== */
@page{
size:A4 portrait;
margin:0
}

@media print{

html,body{
width:100%;
height:100%;
margin:0;
padding:0;
background:#fff !important;
-webkit-print-color-adjust:exact !important;
print-color-adjust:exact !important;
overflow:hidden !important
}

.topPanel{
display:none !important
}

#map{
position:fixed !important;
top:0 !important;
left:0 !important;
width:100vw !important;
height:100vh !important;
transform:none !important;
border-radius:0 !important;
box-shadow:none !important
}

}

/* تحسين إضافي عند وضع الطباعة قبل أمر print */
body.print-mode{
background:#fff !important
}

body.print-mode .topPanel{
display:none !important
}

body.print-mode #map{
position:fixed !important;
top:0 !important;
left:0 !important;
width:100vw !important;
height:100vh !important;
transform:none !important;
border-radius:0 !important;
box-shadow:none !important
}

</style>
</head>

<body>

<div class="topPanel">

<div class="group">
<input id="searchBox" placeholder="ابحث عن حي أو شارع">
</div>

<div class="group">
<span class="titleMini">الملف</span>
<input type="file" id="excelFile" class="fileInput" accept=".xlsx,.xls">
<button onclick="importExcel()">استيراد Excel</button>
</div>

<div class="group">
<span class="titleMini">الفلترة</span>
<select id="filterSelect" onchange="setFilter(this.value)">
<option value="all">عرض الكل</option>
<option value="top3">أعلى 3</option>
<option value="top3_2">ثاني أعلى 3</option>
<option value="top3_3">ثالث أعلى 3</option>
<option value="top3_4">رابع أعلى 3</option>
<option value="200">أكثر من 200</option>
<option value="100_200">من 100 إلى 200</option>
<option value="100">أقل من 100</option>
</select>
</div>

<div class="group">
<span class="titleMini">الأحياء</span>
<select id="districtList" onchange="selectDistrict(this.value)">
<option value="">كل الأحياء</option>
</select>
</div>

<div class="group">
<button id="printBtn" onclick="printMapView()">طباعة</button>
</div>

</div>

<div id="map"></div>

<script>

let map
let districts={}
let polygons=[]
let markers=[]
let pointMarkers=[]
let overlays=[]
let infoWindows=[]
let currentFilter="all"
let selectedDistrict=""
let rankedDistricts=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63",
"#795548",
"#3f51b5",
"#009688",
"#c2185b"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid",
gestureHandling:"greedy"
})

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

if(place.geometry.viewport){
map.fitBounds(place.geometry.viewport)
}else{
map.setCenter(place.geometry.location)
map.setZoom(16)
}

})

map.addListener("click",()=>{
closeAllInfoWindows()
})

}

function setFilter(type){
currentFilter=type
selectedDistrict=document.getElementById("districtList").value || ""
clearMap()
drawDistricts()
}

function selectDistrict(name){
selectedDistrict=name || ""
clearMap()
drawDistricts()
}

function closeAllInfoWindows(){
infoWindows.forEach(w=>w.close())
}

function clearMap(){

polygons.forEach(p=>p.setMap(null))
markers.forEach(m=>m.setMap(null))
pointMarkers.forEach(m=>m.setMap(null))
overlays.forEach(o=>o.setMap(null))
infoWindows.forEach(w=>w.close())

polygons=[]
markers=[]
pointMarkers=[]
overlays=[]
infoWindows=[]

}

function convexHull(points){

points=points.slice()

if(points.length<3)return points

points.sort((a,b)=>a.lng-b.lng||a.lat-b.lat)

const cross=(o,a,b)=>(
(a.lng-o.lng)*(b.lat-o.lat)-
(a.lat-o.lat)*(b.lng-o.lng)
)

let lower=[]

for(let p of points){
while(lower.length>=2 &&
cross(lower[lower.length-2],lower[lower.length-1],p)<=0){
lower.pop()
}
lower.push(p)
}

let upper=[]

for(let i=points.length-1;i>=0;i--){
let p=points[i]
while(upper.length>=2 &&
cross(upper[upper.length-2],upper[upper.length-1],p)<=0){
upper.pop()
}
upper.push(p)
}

upper.pop()
lower.pop()

return lower.concat(upper)

}

function importExcel(){

let file=document.getElementById("excelFile").files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)
let workbook=XLSX.read(data,{type:"array"})
let sheet=workbook.Sheets[workbook.SheetNames[0]]
let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

districts={}
clearMap()

let bounds=new google.maps.LatLngBounds()
let hasValidPoint=false

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])
let district=(rows[i][2]??"").toString().trim()
let third=(rows[i][3]??"بدون تصنيف").toString().trim()

if(isNaN(lat) || isNaN(lng) || !district) continue

bounds.extend({lat:lat,lng:lng})
hasValidPoint=true

if(!districts[district]){
districts[district]={
points:[],
third:{}
}
}

districts[district].points.push({lat,lng})

if(!districts[district].third[third]){
districts[district].third[third]=0
}

districts[district].third[third]++

}

if(hasValidPoint){
map.fitBounds(bounds)
}

prepareRanks()
fillDistrictList()
drawDistricts()

}

reader.readAsArrayBuffer(file)

}

function prepareRanks(){

let arr=[]

for(let d in districts){
arr.push({
name:d,
count:districts[d].points.length
})
}

arr.sort((a,b)=>b.count-a.count)
rankedDistricts=arr

}

function fillDistrictList(){

let sel=document.getElementById("districtList")
sel.innerHTML='<option value="">كل الأحياء</option>'

let names=Object.keys(districts).sort((a,b)=>a.localeCompare(b,'ar'))

for(let name of names){
let opt=document.createElement("option")
opt.value=name
opt.textContent=name
sel.appendChild(opt)
}

sel.value=selectedDistrict || ""

}

function getTopGroupNames(groupNumber){
let start=(groupNumber-1)*3
let end=start+3
return rankedDistricts.slice(start,end).map(x=>x.name)
}

function passesFilter(district,count){

if(selectedDistrict && district!==selectedDistrict) return false
if(currentFilter=="all") return true

if(currentFilter=="top3") return getTopGroupNames(1).includes(district)
if(currentFilter=="top3_2") return getTopGroupNames(2).includes(district)
if(currentFilter=="top3_3") return getTopGroupNames(3).includes(district)
if(currentFilter=="top3_4") return getTopGroupNames(4).includes(district)

if(currentFilter=="200" && count<=200) return false
if(currentFilter=="100_200" && (count<100 || count>200)) return false
if(currentFilter=="100" && count>=100) return false

return true

}

function getDistrictCenter(points){

let lat=0
let lng=0

for(let p of points){
lat+=p.lat
lng+=p.lng
}

return {
lat:lat/points.length,
lng:lng/points.length
}

}

function getColumnColor(count){
if(count>200) return "#ff3d00"
if(count>100) return "#ffc107"
return "#4caf50"
}

function getColumnHeight(count){

if(rankedDistricts.length===0) return 50

let maxCount=rankedDistricts[0]?.count || 1
let minHeight=30
let maxHeight=105

let h=minHeight + ((count/maxCount)*(maxHeight-minHeight))
return Math.max(minHeight,Math.min(maxHeight,h))

}

function hexToRgba(hex,alpha){

let c=hex.replace("#","")
if(c.length===3){
c=c.split("").map(x=>x+x).join("")
}

let r=parseInt(c.substring(0,2),16)
let g=parseInt(c.substring(2,4),16)
let b=parseInt(c.substring(4,6),16)

return `rgba(${r},${g},${b},${alpha})`

}

function createPointMarkers(points,color,isStrong){

for(let p of points){

let marker=new google.maps.Marker({
position:p,
map:map,
zIndex:isStrong ? 300 : 120,
icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:isStrong ? 5.5 : 4.2,
fillColor:color,
fillOpacity:1,
strokeColor:"#ffffff",
strokeWeight:isStrong ? 2.2 : 1.6
}
})

pointMarkers.push(marker)

}

}

function createDistrictInfoWindow(position,district,count,data,color){

let sortedThird=Object.entries(data.third).sort((a,b)=>b[1]-a[1])
let smallLines=""

for(let i=0;i<sortedThird.length && i<5;i++){
smallLines+=`<div style="margin-top:4px">${sortedThird[i][0]} : <b>${sortedThird[i][1]}</b></div>`
}

let html=
`
<div style="font-family:tahoma;min-width:180px;max-width:240px">
  <div style="font-weight:bold;font-size:14px;color:${color};margin-bottom:6px">${district}</div>
  <div>عدد البلاغات: <b>${count}</b></div>
  <div style="margin-top:8px;border-top:1px solid #eee;padding-top:6px">
    ${smallLines || "لا توجد تصنيفات"}
  </div>
</div>
`

let win=new google.maps.InfoWindow({
content:html,
position:position
})

infoWindows.push(win)
return win

}

function createElegantOverlay(position,count,district,color,infoWindow){

class ElegantOverlay extends google.maps.OverlayView{

onAdd(){

this.div=document.createElement("div")
this.div.style.position="absolute"
this.div.style.transform="translate(-50%,-100%)"
this.div.style.pointerEvents="auto"
this.div.style.display="flex"
this.div.style.flexDirection="column"
this.div.style.alignItems="center"
this.div.style.userSelect="none"
this.div.style.cursor="pointer"
this.div.style.zIndex="250"

this.countBadge=document.createElement("div")
this.countBadge.style.minWidth="42px"
this.countBadge.style.height="30px"
this.countBadge.style.padding="0 10px"
this.countBadge.style.borderRadius="999px"
this.countBadge.style.background="rgba(20,20,20,.82)"
this.countBadge.style.color="#fff"
this.countBadge.style.display="flex"
this.countBadge.style.alignItems="center"
this.countBadge.style.justifyContent="center"
this.countBadge.style.fontWeight="bold"
this.countBadge.style.fontSize="14px"
this.countBadge.style.boxShadow="0 4px 14px rgba(0,0,0,.28)"
this.countBadge.style.backdropFilter="blur(3px)"
this.countBadge.innerHTML=count

this.nameChip=document.createElement("div")
this.nameChip.style.marginTop="5px"
this.nameChip.style.padding="4px 10px"
this.nameChip.style.borderRadius="999px"
this.nameChip.style.background="rgba(255,255,255,.95)"
this.nameChip.style.color="#222"
this.nameChip.style.fontSize="11px"
this.nameChip.style.fontWeight="bold"
this.nameChip.style.boxShadow="0 3px 10px rgba(0,0,0,.18)"
this.nameChip.style.border=`2px solid ${color}`
this.nameChip.style.whiteSpace="nowrap"
this.nameChip.innerHTML=district

this.stem=document.createElement("div")
this.stem.style.width="2px"
this.stem.style.height="16px"
this.stem.style.background=color
this.stem.style.marginTop="3px"
this.stem.style.boxShadow="0 0 6px rgba(0,0,0,.25)"

this.dot=document.createElement("div")
this.dot.style.width="10px"
this.dot.style.height="10px"
this.dot.style.borderRadius="50%"
this.dot.style.background=color
this.dot.style.border="2px solid #fff"
this.dot.style.boxShadow="0 2px 8px rgba(0,0,0,.3)"
this.dot.style.marginTop="-1px"

this.div.appendChild(this.countBadge)
this.div.appendChild(this.nameChip)
this.div.appendChild(this.stem)
this.div.appendChild(this.dot)

this.div.addEventListener("click",(e)=>{
e.stopPropagation()
closeAllInfoWindows()
infoWindow.open({
map:map
})
})

this.getPanes().overlayMouseTarget.appendChild(this.div)

}

draw(){

let projection=this.getProjection()
let pos=projection.fromLatLngToDivPixel(
new google.maps.LatLng(position.lat,position.lng)
)

this.div.style.left=pos.x+"px"
this.div.style.top=pos.y+"px"

}

onRemove(){
if(this.div && this.div.parentNode){
this.div.parentNode.removeChild(this.div)
}
this.div=null
}

}

let overlay=new ElegantOverlay()
overlay.setMap(map)
overlays.push(overlay)

}

function drawDistricts(){

let index=0
let visibleBounds=new google.maps.LatLngBounds()
let hasVisible=false

for(let district in districts){

let data=districts[district]
let count=data.points.length

if(!passesFilter(district,count)) continue
if(count<1) continue

let baseColor=COLORS[index%COLORS.length]
let columnColor=getColumnColor(count)
let isSelected=(selectedDistrict && district===selectedDistrict)
let isFilteredView=(currentFilter!=="all" || selectedDistrict!=="")
index++

let polygonFillOpacity=isSelected ? 0.42 : (isFilteredView ? 0.34 : 0.22)
let polygonStrokeWeight=isSelected ? 5 : 3
let pointColor=isSelected ? "#00e5ff" : baseColor
let pointStrong=isSelected || isFilteredView

if(data.points.length>=3){

let hull=convexHull(data.points)

if(hull && hull.length>=3){

let polygon=new google.maps.Polygon({
paths:hull,
strokeColor:baseColor,
strokeOpacity:1,
strokeWeight:polygonStrokeWeight,
fillColor:baseColor,
fillOpacity:polygonFillOpacity,
map:map,
zIndex:isSelected ? 100 : 50
})

polygons.push(polygon)

polygon.addListener("click",(e)=>{
closeAllInfoWindows()
let infoWindow=createDistrictInfoWindow(
e.latLng || getDistrictCenter(data.points),
district,
count,
data,
baseColor
)
infoWindow.open({
map:map
})
})

hull.forEach(p=>{
visibleBounds.extend({lat:p.lat,lng:p.lng})
hasVisible=true
})

}

}else{

let center1=getDistrictCenter(data.points)

let marker=new google.maps.Marker({
position:center1,
map:map,
zIndex:110,
icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:7,
fillColor:baseColor,
fillOpacity:1,
strokeColor:"#fff",
strokeWeight:2
}
})

markers.push(marker)
visibleBounds.extend(center1)
hasVisible=true

}

createPointMarkers(data.points,pointColor,pointStrong)

let center=getDistrictCenter(data.points)
visibleBounds.extend(center)
hasVisible=true

let infoWindow=createDistrictInfoWindow(center,district,count,data,baseColor)
createElegantOverlay(center,count,district,columnColor,infoWindow)

}

if(hasVisible){
map.fitBounds(visibleBounds)
}

}

/* ===== زر الطباعة ===== */
function printMapView(){

closeAllInfoWindows()

document.body.classList.add("print-mode")

setTimeout(()=>{

google.maps.event.trigger(map,"resize")

let bounds=new google.maps.LatLngBounds()
let hasVisible=false

for(let district in districts){

let data=districts[district]
let count=data.points.length

if(!passesFilter(district,count)) continue
if(count<1) continue

for(let p of data.points){
bounds.extend(new google.maps.LatLng(p.lat,p.lng))
hasVisible=true
}
}

if(hasVisible){
map.fitBounds(bounds)
}

setTimeout(()=>{

google.maps.event.trigger(map,"resize")

setTimeout(()=>{

window.print()

},500)

},500)

},300)

}

window.onafterprint=function(){
document.body.classList.remove("print-mode")
setTimeout(()=>{
google.maps.event.trigger(map,"resize")
clearMap()
drawDistricts()
},300)
}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
