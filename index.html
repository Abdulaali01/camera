<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

html,body{
height:100%;
margin:0;
font-family:tahoma;
background:#f5f7fb
}

#map{
position:absolute;
top:0;
left:0;
width:100%;
height:100%
}

/* اللوحة العلوية */

.topPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.18);
padding:10px 12px;
z-index:10;
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
min-width:320px;
max-width:95%
}

.group{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap
}

.titleMini{
font-size:12px;
font-weight:bold
}

#searchBox{
width:230px;
padding:10px;
border-radius:10px;
border:1px solid #ccc
}

.fileInput{
padding:8px;
border-radius:8px;
border:1px solid #ddd
}

select{
padding:8px;
border-radius:8px;
border:1px solid #ccc
}

button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#2d6cff;
color:#fff;
font-weight:bold;
cursor:pointer
}

/* الرسم البياني */

#chartPanel{
position:absolute;
bottom:10px;
right:10px;
width:420px;
background:#111;
color:#fff;
padding:12px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.4);
z-index:20
}

#chartPanel h3{
margin:0 0 10px 0;
text-align:center;
font-size:14px
}

#chartBox{
background:#fff;
border-radius:10px;
padding:8px
}

</style>

</head>

<body>

<div class="topPanel">

<div class="group">
<input id="searchBox" placeholder="ابحث عن حي أو شارع">
</div>

<div class="group">
<span class="titleMini">الملف</span>
<input type="file" id="excelFile" class="fileInput">
<button onclick="importExcel()">استيراد Excel</button>
</div>

<div class="group">
<span class="titleMini">الفلترة</span>

<select id="filterSelect" onchange="setFilter(this.value)">

<option value="all">عرض الكل</option>
<option value="top3">أعلى 3</option>
<option value="200">أكثر من 200</option>
<option value="100_200">100 - 200</option>
<option value="100">أقل من 100</option>

</select>

</div>

<div class="group">
<span class="titleMini">الأحياء</span>
<select id="districtList" onchange="selectDistrict(this.value)">
<option value="">كل الأحياء</option>
</select>
</div>

<div class="group">
<button onclick="exportHDImage()">تصدير صورة HD</button>
</div>

</div>

<div id="map"></div>

<div id="chartPanel">

<h3>الرسم البياني للأحياء</h3>

<div id="chartBox">
<canvas id="chart"></canvas>
</div>

</div>

<script>

let map
let districts={}
let polygons=[]
let markers=[]
let rankedDistricts=[]
let chart=null
let currentFilter="all"
let selectedDistrict=""

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid"
})

}

function clearMap(){

polygons.forEach(p=>p.setMap(null))
markers.forEach(m=>m.setMap(null))

polygons=[]
markers=[]

}

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

districts={}

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])
let district=(rows[i][2]??"").trim()

if(isNaN(lat)||isNaN(lng)||!district)continue

if(!districts[district]){
districts[district]={
points:[]
}
}

districts[district].points.push({lat,lng})

}

prepareRanks()
fillDistrictList()
drawDistricts()
updateChart()

}

reader.readAsArrayBuffer(file)

}

function prepareRanks(){

let arr=[]

for(let d in districts){

arr.push({
name:d,
count:districts[d].points.length
})

}

arr.sort((a,b)=>b.count-a.count)

rankedDistricts=arr

}

function fillDistrictList(){

let sel=document.getElementById("districtList")

sel.innerHTML='<option value="">كل الأحياء</option>'

for(let d in districts){

let opt=document.createElement("option")
opt.value=d
opt.textContent=d

sel.appendChild(opt)

}

}

function passesFilter(district,count){

if(selectedDistrict && district!==selectedDistrict) return false

if(currentFilter=="200" && count<=200) return false

if(currentFilter=="100_200" && (count<100 || count>200)) return false

if(currentFilter=="100" && count>=100) return false

return true

}

function setFilter(v){

currentFilter=v

clearMap()
drawDistricts()
updateChart()

}

function selectDistrict(v){

selectedDistrict=v

clearMap()
drawDistricts()
updateChart()

}

function drawDistricts(){

let i=0

for(let district in districts){

let pts=districts[district].points

let count=pts.length

if(!passesFilter(district,count))continue

let color=COLORS[i%COLORS.length]

i++

let polygon=new google.maps.Polygon({

paths:pts,
strokeColor:color,
strokeWeight:3,
fillColor:color,
fillOpacity:0.35,
map:map

})

polygons.push(polygon)

let center=pts[0]

let marker=new google.maps.Marker({

position:center,
map:map,

icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:0
},

label:{
text:district+" ("+count+")",
color:"#000",
fontWeight:"bold",
fontSize:"18px"
}

})

markers.push(marker)

}

}

function updateChart(){

let labels=[]
let values=[]

for(let d in districts){

let c=districts[d].points.length

if(!passesFilter(d,c))continue

labels.push(d)
values.push(c)

}

if(chart){
chart.destroy()
}

chart=new Chart(

document.getElementById("chart"),

{

type:"bar",

data:{
labels:labels,
datasets:[{
data:values,
backgroundColor:COLORS
}]
},

options:{
plugins:{legend:{display:false}},
responsive:true
}

}

)

}

function exportHDImage(){

html2canvas(document.body,{scale:4}).then(canvas=>{

let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="map.png"
a.click()

})

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
