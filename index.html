<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>حساب المساحة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.geometryutil/0.10.2/leaflet.geometryutil.min.js"></script>

<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:tahoma
}

#map{
height:100vh
}

.box{

position:absolute;
top:20px;
right:20px;

background:#fff;

padding:12px;

border-radius:10px;

box-shadow:0 0 6px rgba(0,0,0,.3);

z-index:999;

}

button{

margin-top:8px;

padding:8px 12px;

border:none;

border-radius:6px;

background:#2d6cff;

color:#fff;

cursor:pointer;

}

</style>

</head>

<body>

<div class="box">

المساحة: <span id="area">0</span> متر²
<br>

المساحة: <span id="areaKm">0</span> كم²
<br>

<button onclick="exportExcel()">تصدير Excel</button>

</div>

<div id="map"></div>

<script>


var map=L.map('map').setView([21.4373,40.5127],13);


/* خريطة اقمار صناعية */

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:19,
attribution:'© Esri'
}).addTo(map);



/* مربع البحث */

L.Control.geocoder({

defaultMarkGeocode:true,

collapsed:false

}).addTo(map);



/* طبقة الرسم */

var drawnItems=new L.FeatureGroup();

map.addLayer(drawnItems);



/* أدوات الرسم */

var drawControl=new L.Control.Draw({

draw:{

polygon:true,

rectangle:true,

circle:false,

marker:false,

polyline:false

},

edit:{

featureGroup:drawnItems

}

});

map.addControl(drawControl);



var coords=[];



/* عند رسم الشكل */

map.on(L.Draw.Event.CREATED,function(e){

drawnItems.clearLayers();

var layer=e.layer;

drawnItems.addLayer(layer);

coords=layer.getLatLngs()[0];

updateArea();

});



/* حساب المساحة */

function updateArea(){

var area=L.GeometryUtil.geodesicArea(coords);

document.getElementById("area").innerHTML=Math.round(area);

document.getElementById("areaKm").innerHTML=(area/1000000).toFixed(4);

}



/* تصدير Excel */

function exportExcel(){

if(coords.length==0){

alert("ارسم المساحة أولاً");

return;

}

var data=[];

coords.forEach(function(p){

data.push({

Latitude:p.lat,

Longitude:p.lng

});

});

data.push({});

data.push({

Latitude:"المساحة متر²",

Longitude:document.getElementById("area").innerText

});

data.push({

Latitude:"المساحة كم²",

Longitude:document.getElementById("areaKm").innerText

});

var ws=XLSX.utils.json_to_sheet(data);

var wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Area");

XLSX.writeFile(wb,"area_result.xlsx");

}

</script>

</body>

</html>
