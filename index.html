<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل المواقع</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{margin:0;font-family:tahoma}

#map{height:100vh;width:100%}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
z-index:5;
background:#fff;
font-size:16px
}

.box{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="box">

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br>

<button onclick="importExcel()">استيراد Excel</button>
<button onclick="exportExcel()">تصدير Excel</button>

</div>

<div id="map"></div>

<script>

let map
let groups=[]
let markers=[]
let circles=[]
let drawnPoints=[]

let selectedStreet=""
let selectedDistrict=""

const COLORS=[
"#ff5722","#4caf50","#2196f3","#9c27b0",
"#ffc107","#00bcd4","#8bc34a","#e91e63"
]

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{

center:{lat:21.4373,lng:40.5127},
zoom:14,
mapTypeId:"hybrid"

})

/* البحث */

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(input,{
componentRestrictions:{country:"sa"}
})

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry) return

selectedStreet=place.name

place.address_components.forEach(c=>{

if(c.types.includes("sublocality") || c.types.includes("neighborhood")){
selectedDistrict=c.long_name
}

})

if(place.geometry.viewport){
map.fitBounds(place.geometry.viewport)
}else{
map.setCenter(place.geometry.location)
map.setZoom(16)
}

})

/* الرسم اليدوي */

const drawingManager=new google.maps.drawing.DrawingManager({

drawingMode:null,

drawingControl:true,

drawingControlOptions:{
position:google.maps.ControlPosition.LEFT_CENTER,
drawingModes:["polygon"]
}

})

drawingManager.setMap(map)

google.maps.event.addListener(drawingManager,'overlaycomplete',function(e){

let polygon=e.overlay

polygon.setOptions({
fillColor:"#00ff00",
fillOpacity:0.35,
strokeColor:"#008000",
strokeWeight:3
})

drawnPoints=[]

let path=polygon.getPath()

for(let i=0;i<path.getLength();i++){

let p=path.getAt(i)

drawnPoints.push({
lat:p.lat(),
lng:p.lng()
})

}

})

}

/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0]
if(!file) return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

let points=[]

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])

if(!isNaN(lat)&&!isNaN(lng)){
points.push({lat:lat,lng:lng})
}

}

groupPoints(points)

}

reader.readAsArrayBuffer(file)

}

/* حساب المسافة */

function distance(a,b){

const R=6371000

const dLat=(b.lat-a.lat)*Math.PI/180
const dLng=(b.lng-a.lng)*Math.PI/180

const lat1=a.lat*Math.PI/180
const lat2=b.lat*Math.PI/180

const x=Math.sin(dLat/2)**2+
Math.sin(dLng/2)**2*Math.cos(lat1)*Math.cos(lat2)

const c=2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))

return R*c

}

/* تجميع النقاط */

function groupPoints(points){

groups=[]

markers.forEach(m=>m.setMap(null))
circles.forEach(c=>c.setMap(null))

markers=[]
circles=[]

points.forEach(p=>{

let added=false

for(let g of groups){

if(distance(p,g.center)<=100){
g.points.push(p)
added=true
break
}

}

if(!added){
groups.push({center:p,points:[p]})
}

})

drawGroups()

}

/* رسم الدوائر */

function drawGroups(){

groups.forEach((g,i)=>{

let color=COLORS[i%COLORS.length]

g.points.forEach(p=>{

let m=new google.maps.Marker({
position:p,
map:map
})

markers.push(m)

})

let c=new google.maps.Circle({

strokeColor:color,
strokeOpacity:0.9,
strokeWeight:2,
fillColor:color,
fillOpacity:0.25,
map:map,
center:g.center,
radius:100

})

circles.push(c)

})

}

/* تصدير Excel */

function exportExcel(){

let data=[]

data.push(["Group","Latitude","Longitude","Street","District"])

groups.forEach((g,i)=>{

g.points.forEach(p=>{

data.push([
i+1,
p.lat,
p.lng,
selectedStreet,
selectedDistrict
])

})

})

drawnPoints.forEach(p=>{

data.push([
"Drawing",
p.lat,
p.lng,
selectedStreet,
selectedDistrict
])

})

let ws=XLSX.utils.aoa_to_sheet(data)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Map")

XLSX.writeFile(wb,"map_report.xlsx")

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places,geometry,drawing&callback=initMap">
</script>

</body>
</html>
