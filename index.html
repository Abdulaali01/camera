</div>

<!-- ===== أزرار عائمة ===== -->
<div class="fabWrap">
  <button class="fabBtn" id="drawToggleBtn" type="button">✏️ رسم حي</button>
  <button class="fabBtn gray" id="renameLastBtn" type="button">📝 اسم/رقم</button>
  <button class="fabBtn green" id="centerLastBtn" type="button">🎯 توسيط الاسم</button>
  <button class="fabBtn stop" id="deleteLastBtn" type="button">🗑️ حذف آخر</button>
</div>

<script>
let map
let districts={}
let polygons=[]
let markers=[]
let pointMarkers=[]
let overlays=[]
let infoWindows=[]
let currentFilter="all"
let selectedDistrict=""
let selectedMunicipality=""
let sideChart=null

let drawingManager=null
let isDrawingMode=false
let manualZones=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63",
"#795548",
"#3f51b5",
"#009688",
"#c2185b"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid",
gestureHandling:"greedy"
})

initDrawingTools()

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){
const place=autocomplete.getPlace()
if(!place.geometry)return

if(place.geometry.viewport){
map.fitBounds(place.geometry.viewport)
}else{
map.setCenter(place.geometry.location)
map.setZoom(16)
}
})

map.addListener("click",()=>{
closeAllInfoWindows()
updatePanelForCurrentView()
})

bindFloatingButtons()
}

/* ===== الرسم اليدوي ===== */
function initDrawingTools(){

drawingManager=new google.maps.drawing.DrawingManager({
drawingControl:false,
drawingModes:['polygon'],
polygonOptions:{
fillColor:'#2196f3',
fillOpacity:0.28,
strokeColor:'#1a73e8',
strokeWeight:3,
editable:true,
draggable:true,
clickable:true,
zIndex:1500
}
})

drawingManager.setMap(map)

google.maps.event.addListener(drawingManager,'overlaycomplete',function(event){

if(event.type!=="polygon") return

const polygon=event.overlay
polygon.setEditable(true)
polygon.setDraggable(true)

const center=getPolygonCenterFromPath(polygon.getPath())
const zoneIndex=manualZones.length+1

const zone=createManualZone(
polygon,
center,
"حي جديد",
String(zoneIndex)
)

manualZones.push(zone)
attachPolygonSync(zone)

drawingManager.setDrawingMode(null)
isDrawingMode=false
updateDrawButtonUI()
})
}

function bindFloatingButtons(){

document.getElementById("drawToggleBtn").onclick=function(){
isDrawingMode=!isDrawingMode
drawingManager.setDrawingMode(
isDrawingMode ? google.maps.drawing.OverlayType.POLYGON : null
)
updateDrawButtonUI()
}

document.getElementById("renameLastBtn").onclick=function(){
const zone=getLastManualZone()
if(!zone){
alert("لا يوجد حي مرسوم.")
return
}
const newName=prompt("اكتب اسم الحي:",zone.label.nameText)
if(newName!==null && newName.trim()!==""){
zone.label.nameText=newName.trim()
zone.label.refresh()
}
const newNum=prompt("اكتب الرقم:",zone.label.countText)
if(newNum!==null && newNum.trim()!==""){
zone.label.countText=newNum.trim()
zone.label.refresh()
}
}

document.getElementById("centerLastBtn").onclick=function(){
const zone=getLastManualZone()
if(!zone){
alert("لا يوجد حي مرسوم.")
return
}
const center=getPolygonCenterFromPath(zone.polygon.getPath())
zone.label.setPosition(center)
zone.label.wasMovedManually=false
}

document.getElementById("deleteLastBtn").onclick=function(){
const zone=getLastManualZone()
if(!zone){
alert("لا يوجد حي مرسوم.")
return
}
zone.polygon.setMap(null)
zone.label.setMap(null)
manualZones.pop()
renumberManualZones()
}
}

function updateDrawButtonUI(){
const btn=document.getElementById("drawToggleBtn")
if(isDrawingMode){
btn.classList.add("stop")
btn.textContent="⛔ إيقاف الرسم"
}else{
btn.classList.remove("stop")
btn.textContent="✏️ رسم حي"
}
}

function getLastManualZone(){
if(!manualZones.length) return null
return manualZones[manualZones.length-1]
}

function renumberManualZones(){
manualZones.forEach((zone,i)=>{
zone.label.countText=String(i+1)
zone.label.refresh()
})
}

function getPolygonCenterFromPath(path){
const bounds=new google.maps.LatLngBounds()
for(let i=0;i<path.getLength();i++){
bounds.extend(path.getAt(i))
}
return bounds.getCenter()
}

function attachPolygonSync(zone){
const syncCenter=()=>{
const center=getPolygonCenterFromPath(zone.polygon.getPath())
if(!zone.label.wasMovedManually){
zone.label.setPosition(center)
}
}

google.maps.event.addListener(zone.polygon.getPath(),"set_at",syncCenter)
google.maps.event.addListener(zone.polygon.getPath(),"insert_at",syncCenter)
google.maps.event.addListener(zone.polygon.getPath(),"remove_at",syncCenter)

google.maps.event.addListener(zone.polygon,"dragend",()=>{
const center=getPolygonCenterFromPath(zone.polygon.getPath())
if(!zone.label.wasMovedManually){
zone.label.setPosition(center)
}
})
}

function createManualZone(polygon,position,nameText,countText){
const label=new ManualLabelOverlay(position,nameText,countText)
label.setMap(map)
return {polygon:polygon,label:label}
}

class ManualLabelOverlay extends google.maps.OverlayView{
constructor(position,nameText,countText){
super()
this.position=position
this.nameText=nameText || "حي جديد"
this.countText=countText || "1"
this.wasMovedManually=false
this.div=null
this.isDragging=false
this.pointerId=null
this.pointerOffsetX=0
this.pointerOffsetY=0
}

onAdd(){

this.div=document.createElement("div")
this.div.className="manualLabel"

this.countEl=document.createElement("div")
this.countEl.className="manualCount"
this.countEl.textContent=this.countText

this.nameEl=document.createElement("div")
this.nameEl.className="manualName"
this.nameEl.textContent=this.nameText

this.div.appendChild(this.countEl)
this.div.appendChild(this.nameEl)

this.div.addEventListener("dblclick",(e)=>{
e.stopPropagation()
})

this.nameEl.addEventListener("dblclick",(e)=>{
e.stopPropagation()
const v=prompt("اسم الحي:",this.nameText)
if(v!==null && v.trim()!==""){
this.nameText=v.trim()
this.refresh()
}
})

this.countEl.addEventListener("dblclick",(e)=>{
e.stopPropagation()
const v=prompt("الرقم:",this.countText)
if(v!==null && v.trim()!==""){
this.countText=v.trim()
this.refresh()
}
})

this.div.addEventListener("pointerdown",(e)=>{
e.preventDefault()
e.stopPropagation()
this.isDragging=true
this.pointerId=e.pointerId
this.div.setPointerCapture(e.pointerId)
this.div.classList.add("dragging")
const rect=this.div.getBoundingClientRect()
this.pointerOffsetX=e.clientX-rect.left
this.pointerOffsetY=e.clientY-rect.top
})

this.div.addEventListener("pointermove",(e)=>{
if(!this.isDragging) return
e.preventDefault()
e.stopPropagation()

const mapRect=document.getElementById("map").getBoundingClientRect()
const x=e.clientX-mapRect.left-this.pointerOffsetX+(this.div.offsetWidth/2)
const y=e.clientY-mapRect.top-this.pointerOffsetY+(this.div.offsetHeight/2)

const projection=this.getProjection()
if(!projection) return

const latLng=projection.fromDivPixelToLatLng(new google.maps.Point(x,y))
if(!latLng) return

this.position=latLng
this.wasMovedManually=true
this.draw()
})

const stopDrag=(e)=>{
if(!this.isDragging) return
e.preventDefault()
e.stopPropagation()
this.isDragging=false
this.div.classList.remove("dragging")
try{
this.div.releasePointerCapture(this.pointerId)
}catch(err){}
}

this.div.addEventListener("pointerup",stopDrag)
this.div.addEventListener("pointercancel",stopDrag)

this.getPanes().overlayMouseTarget.appendChild(this.div)
this.refresh()
}

refresh(){
if(this.countEl) this.countEl.textContent=this.countText
if(this.nameEl) this.nameEl.textContent=this.nameText
}

setPosition(pos){
this.position=pos
this.draw()
}

draw(){
if(!this.div) return
const projection=this.getProjection()
if(!projection) return
const point=projection.fromLatLngToDivPixel(this.position)
if(!point) return
this.div.style.left=point.x+"px"
this.div.style.top=point.y+"px"
}

onRemove(){
if(this.div && this.div.parentNode){
this.div.parentNode.removeChild(this.div)
}
this.div=null
}
}

/* ===== أدوات البيانات ===== */
function normalizeHeader(v){
return (v ?? "")
.toString()
.trim()
.replace(/\s+/g,"")
.replace(/[أإآ]/g,"ا")
.replace(/ة/g,"ه")
.toLowerCase()
}

function findColumnIndex(headers,candidates,fallbackIndex){
for(let candidate of candidates){
const idx=headers.findIndex(h=>h.includes(candidate))
if(idx!==-1) return idx
}
return fallbackIndex
}

function makeDistrictKey(municipality,district){
return municipality + "|||" + district
}

/* ===== استيراد Excel ===== */
function importExcel(){

let file=document.getElementById("excelFile").files[0]
if(!file){
alert("اختر ملف Excel أولاً")
return
}

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)
let workbook=XLSX.read(data,{type:"array"})
let sheet=workbook.Sheets[workbook.SheetNames[0]]
let rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""})

if(!rows || !rows.length){
alert("الملف فارغ")
return
}

let headerRow=rows[0].map(normalizeHeader)

let latCol=findColumnIndex(headerRow,["lat","latitude","خطالعرض","الاحداثيx","y"],0)
let lngCol=findColumnIndex(headerRow,["lng","lon","longitude","خطالطول","الاحداثيy","x"],1)
let districtCol=findColumnIndex(headerRow,["الحي","اسمالحي","district","neighborhood"],2)
let thirdCol=findColumnIndex(headerRow,["التصنيف","التصنيفالتخصصي","العمودالرابع","category","third"],3)
let municipalityCol=findColumnIndex(headerRow,["البلديهالفرعيه","بلديهفرعيه","البلديه","بلديه","municipality","submunicipality"],4)

districts={}
clearMap()
resetPanel()

let bounds=new google.maps.LatLngBounds()
let hasValidPoint=false

for(let i=1;i<rows.length;i++){

let row=rows[i]

let lat=parseFloat(row[latCol])
let lng=parseFloat(row[lngCol])
let district=(row[districtCol]??"").toString().trim()
let third=(row[thirdCol]??"بدون تصنيف").toString().trim() || "بدون تصنيف"
let municipality=(row[municipalityCol]??"غير محددة").toString().trim() || "غير محددة"

if(isNaN(lat) || isNaN(lng) || !district) continue

let key=makeDistrictKey(municipality,district)

bounds.extend({lat:lat,lng:lng})
hasValidPoint=true

if(!districts[key]){
districts[key]={
key:key,
name:district,
municipality:municipality,
points:[],
third:{}
}
}

districts[key].points.push({lat,lng})

if(!districts[key].third[third]){
districts[key].third[third]=0
}

districts[key].third[third]++
}

if(hasValidPoint){
map.fitBounds(bounds)
}

selectedDistrict=""
selectedMunicipality=""

currentFilter="all"

fillMunicipalityList()
fillDistrictList()
drawDistricts()
updatePanelForCurrentView()
}

reader.readAsArrayBuffer(file)
}

/* ===== هندسة الرسم ===== */
function convexHull(points){
points=points.slice()
if(points.length<3)return points

points.sort((a,b)=>a.lng-b.lng||a.lat-b.lat)

const cross=(o,a,b)=>(
(a.lng-o.lng)*(b.lat-o.lat)-
(a.lat-o.lat)*(b.lng-o.lng)
)

let lower=[]
for(let p of points){
while(lower.length>=2 && cross(lower[lower.length-2],lower[lower.length-1],p)<=0){
lower.pop()
}
lower.push(p)
}

let upper=[]
for(let i=points.length-1;i>=0;i--){
let p=points[i]
while(upper.length>=2 && cross(upper[upper.length-2],upper[upper.length-1],p)<=0){
upper.pop()
}
upper.push(p)
}

upper.pop()
lower.pop()
return lower.concat(upper)
}

function getRankedDistrictKeysScoped(){
let arr=Object.values(districts)
.filter(d=>!selectedMunicipality || d.municipality===selectedMunicipality)
.map(d=>({key:d.key,count:d.points.length}))
.sort((a,b)=>b.count-a.count)

return arr.map(x=>x.key)
}

function getTopGroupKeys(groupNumber){
let ranked=getRankedDistrictKeysScoped()
let start=(groupNumber-1)*3
let end=start+3
return ranked.slice(start,end)
}

function passesFilter(districtKey,count){
let data=districts[districtKey]
if(!data) return false

if(selectedMunicipality && data.municipality!==selectedMunicipality) return false
if(selectedDistrict && districtKey!==selectedDistrict) return false
if(currentFilter=="all") return true

if(currentFilter=="top3") return getTopGroupKeys(1).includes(districtKey)
if(currentFilter=="top3_2") return getTopGroupKeys(2).includes(districtKey)
if(currentFilter=="top3_3") return getTopGroupKeys(3).includes(districtKey)
if(currentFilter=="top3_4") return getTopGroupKeys(4).includes(districtKey)

if(currentFilter=="200" && count<=200) return false
if(currentFilter=="100_200" && (count<100 || count>200)) return false
if(currentFilter=="100" && count>=100) return false

return true
}

function getDistrictCenter(points){
let lat=0
let lng=0

for(let p of points){
lat+=p.lat
lng+=p.lng
}

return {
lat:lat/points.length,
lng:lng/points.length
}
}

function getColumnColor(count){
if(count>200) return "#ff3d00"
if(count>100) return "#ffc107"
return "#4caf50"
}

function getRenderableDistrictData(districtKey){
return districts[districtKey]
}

function getCurrentVisibleDistrictKeys(){
return Object.keys(districts).filter(key=>{
const data=districts[key]
return passesFilter(key,data.points.length)
})
}

function getTopCategory(thirdObj){
let entries=Object.entries(thirdObj || {}).sort((a,b)=>b[1]-a[1])
if(!entries.length){
return {name:"-",count:0,total:0}
}
let total=entries.reduce((s,x)=>s+x[1],0)
return {
name:entries[0][0],
count:entries[0][1],
total:total
}
}

function getCurrentReportRows(){
let rows=[]

getCurrentVisibleDistrictKeys().forEach(key=>{
const data=districts[key]
const top=getTopCategory(data.third)
rows.push({
municipality:data.municipality,
district:data.name,
count:data.points.length,
topCategory:top.name,
topCount:top.count,
totalTypes:top.total
})
})

rows.sort((a,b)=>b.count-a.count || a.district.localeCompare(b.district,'ar'))
return rows
}

function renderScreenTable(){
const body=document.getElementById("screenTableBody")
const rows=getCurrentReportRows()

if(!rows.length){
body.innerHTML='<tr><td colspan="5">لا توجد بيانات مطابقة للفلترة الحالية.</td></tr>'

body.innerHTML=rows.map(r=>`

<td>${r.topCount}</td>
</tr>
`).join("")
}

/* ===== تنسيق الأوفرلاي ===== */
function adjustOverlays(){
let used=[]

overlays.forEach(o=>{
if(!o.div || !o.getProjection || !o.position) return

let projection=o.getProjection()
if(!projection) return

let pos=projection.fromLatLngToDivPixel(
new google.maps.LatLng(o.position.lat,o.position.lng)
)

if(!pos) return

for(let u of used){
let dx=pos.x-u.x
let dy=pos.y-u.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<70){
pos.x+=42
pos.y+=20
}
}

used.push({x:pos.x,y:pos.y})

o.div.style.left=pos.x+"px"
o.div.style.top=pos.y+"px"
})
}

/* ===== تنعيم المضلع ===== */
function densifyClosedPath(points,segmentsPerEdge=10){
if(!points || points.length<3) return points || []

let dense=[]

for(let i=0;i<points.length;i++){
let p0=points[i]
let p1=points[(i+1)%points.length]

dense.push({lat:p0.lat,lng:p0.lng})

for(let s=1;s<segmentsPerEdge;s++){
let t=s/segmentsPerEdge
dense.push({
lat:p0.lat+(p1.lat-p0.lat)*t,
lng:p0.lng+(p1.lng-p0.lng)*t
})
}
}

return dense
}

function chaikinSmoothClosed(points,iterations=4){
if(!points || points.length<3) return points || []

let result=points.slice()

for(let iter=0;iter<iterations;iter++){
let newPoints=[]

for(let i=0;i<result.length;i++){
let p0=result[i]
let p1=result[(i+1)%result.length]

let q={
lat:0.75*p0.lat+0.25*p1.lat,
lng:0.75*p0.lng+0.25*p1.lng
}

let r={
lat:0.25*p0.lat+0.75*p1.lat,
lng:0.25*p0.lng+0.75*p1.lng
}

newPoints.push(q,r)
}

result=newPoints
}

return result
}

function expandClosedPath(points,factor=1.16){
if(!points || points.length<3) return points || []

const center=getDistrictCenter(points)

return points.map(p=>{
return {
lat:center.lat+(p.lat-center.lat)*factor,
lng:center.lng+(p.lng-center.lng)*factor
}
})
}

function createSmoothBoundary(points){

if(!points || points.length===0) return []

if(points.length===1){
let p=points[0]
let off=0.0015
return [
{lat:p.lat-off,lng:p.lng-off},
{lat:p.lat-off,lng:p.lng+off},
{lat:p.lat+off,lng:p.lng+off},
{lat:p.lat+off,lng:p.lng-off}
]
}

if(points.length===2){
const p1=points[0]
const p2=points[1]
const dx=p2.lng-p1.lng
const dy=p2.lat-p1.lat
const len=Math.sqrt(dx*dx+dy*dy) || 0.0001
const nx=-dy/len
const ny=dx/len
const off=0.0025

return [
{lat:p1.lat+ny*off,lng:p1.lng+nx*off},
{lat:p2.lat+ny*off,lng:p2.lng+nx*off},
{lat:p2.lat-ny*off,lng:p2.lng-nx*off},
{lat:p1.lat-ny*off,lng:p1.lng-nx*off}
]
}

let hull=convexHull(points)

if(!hull || hull.length<3){
return points
}

let dense=densifyClosedPath(hull,10)
let expanded=expandClosedPath(dense,1.16)
let smooth=chaikinSmoothClosed(expanded,4)

return smooth
}

function createElegantOverlay(position,count,districtKey,color,infoWindow){

onAdd(){

this.div=document.createElement("div")

this.div.style.zIndex="250"

this.countBadge=document.createElement("div")
this.countBadge.style.minWidth="42px"
this.countBadge.style.height="30px"

this.countBadge.style.borderRadius="999px"

this.countBadge.style.display="flex"

this.countBadge.style.justifyContent="center"

this.countBadge.style.fontSize="14px"
this.countBadge.style.boxShadow="0 4px 14px rgba(0,0,0,.28)"
this.countBadge.style.backdropFilter="blur(3px)"
this.countBadge.innerHTML=count

this.nameChip=document.createElement("div")
this.nameChip.style.marginTop="5px"

this.nameChip.style.borderRadius="999px"
this.nameChip.style.background="rgba(255,255,255,.95)"

this.nameChip.style.fontSize="11px"
this.nameChip.style.fontWeight="bold"
this.nameChip.style.boxShadow="0 3px 10px rgba(0,0,0,.18)"
this.nameChip.style.border=`2px solid ${color}`
this.nameChip.style.whiteSpace="nowrap"

this.stem=document.createElement("div")
this.stem.style.width="2px"
this.stem.style.height="16px"
this.stem.style.background=color

this.stem.style.boxShadow="0 0 6px rgba(0,0,0,.25)"

this.dot=document.createElement("div")
this.dot.style.width="10px"
this.dot.style.height="10px"
this.dot.style.borderRadius="50%"
this.dot.style.background=color
this.dot.style.border="2px solid #fff"

this.dot.style.marginTop="-1px"

this.div.appendChild(this.countBadge)
this.div.appendChild(this.nameChip)
this.div.appendChild(this.stem)
this.div.appendChild(this.dot)

this.div.addEventListener("click",(e)=>{
e.stopPropagation()
closeAllInfoWindows()
infoWindow.open({map:map})
updatePanelDistrict(districtKey,districts[districtKey])
})

this.getPanes().overlayMouseTarget.appendChild(this.div)
}

draw(){
let projection=this.getProjection()
if(!projection || !this.div) return

let pos=projection.fromLatLngToDivPixel(
new google.maps.LatLng(this.position.lat,this.position.lng)
)

if(!pos) return

this.div.style.left=pos.x+"px"
this.div.style.top=pos.y+"px"
}

onRemove(){
if(this.div && this.div.parentNode){
this.div.parentNode.removeChild(this.div)
}
this.div=null
}
}

overlay.setMap(map)
overlays.push(overlay)
}

function drawDistricts(){

let index=0
let visibleBounds=new google.maps.LatLngBounds()
let hasVisible=false

for(let districtKey in districts){

let originalData=districts[districtKey]
let count=originalData.points.length

if(!passesFilter(districtKey,count)) continue
if(count<1) continue

let data=districts[districtKey]

let baseColor=COLORS[index%COLORS.length]
let columnColor=getColumnColor(count)
let isSelected=(selectedDistrict && districtKey===selectedDistrict)
let isFilteredView=(currentFilter!=="all" || selectedDistrict!=="" || selectedMunicipality!=="")
index++

let polygonFillOpacity=(isSelected ? 0.42 : (isFilteredView ? 0.34 : 0.22))
let polygonStrokeWeight=(isSelected ? 5 : 3)
let pointColor=isSelected ? "#00e5ff" : baseColor
let pointStrong=isSelected || isFilteredView

let smoothBoundary=createSmoothBoundary(data.points)

if(smoothBoundary && smoothBoundary.length>=3){

let polygon=new google.maps.Polygon({
paths:smoothBoundary,
strokeColor:baseColor,
strokeOpacity:1,
strokeWeight:polygonStrokeWeight,
fillColor:baseColor,
fillOpacity:polygonFillOpacity,
map:map,
zIndex:isSelected ? 100 : 50
})

polygons.push(polygon)

polygon.addListener("click",(e)=>{
closeAllInfoWindows()
let infoWindow=createDistrictInfoWindow(
e.latLng || getDistrictCenter(data.points),
originalData.name,
count,
originalData,
baseColor
)
infoWindow.open({map:map})
updatePanelDistrict(districtKey,originalData)
})

smoothBoundary.forEach(p=>{
visibleBounds.extend({lat:p.lat,lng:p.lng})
hasVisible=true
})
}

createPointMarkers(data.points,pointColor,pointStrong)

let center=getDistrictCenter(data.points)
visibleBounds.extend(center)
hasVisible=true

let infoWindow=createDistrictInfoWindow(center,originalData.name,count,originalData,baseColor)
createElegantOverlay(center,count,districtKey,columnColor,infoWindow)
}

if(hasVisible){
map.fitBounds(visibleBounds)
setTimeout(adjustOverlays,300)
}
}

function updatePanelDistrict(key,data){

if(!key || !data){
resetPanel()

}

let count=data.points.length
let entries=Object.entries(data.third).sort((a,b)=>b[1]-a[1])

let total=0
let labels=[]
let values=[]
let html=""

entries.forEach(([k,v],i)=>{
total+=v
html+=`
<div class="summaryRow">
  <div class="summaryName">${escapeHtml(k)}</div>
  <div class="summaryVal">${v}</div>
</div>
`
if(i<10){
labels.push(k)
values.push(v)
}
})

document.getElementById("panelTitle").textContent=data.name
document.getElementById("panelSubTitle").textContent=`البلدية: ${data.municipality}`

document.getElementById("totalTypes").textContent=total
document.getElementById("detailsList").innerHTML=html || '<div class="emptyBox">لا توجد بيانات.</div>'

drawSideChart(labels,values)
renderScreenTable()
}

function updatePanelSummary(){

let totalCount=0
let totalTypes=0
let merged={}
let districtCounter=0

for(let districtKey in districts){

let data=districts[districtKey]
let count=data.points.length

if(!passesFilter(districtKey,count)) continue
districtCounter++
totalCount+=count

for(let key in data.third){
merged[key]=(merged[key] || 0) + data.third[key]
}
}

let entries=Object.entries(merged).sort((a,b)=>b[1]-a[1])
let labels=[]
let values=[]
let html=""

entries.forEach(([k,v],i)=>{
totalTypes+=v
html+=`
<div class="summaryRow">
  <div class="summaryName">${escapeHtml(k)}</div>
  <div class="summaryVal">${v}</div>
</div>
`
if(i<10){
labels.push(k)
values.push(v)
}
})

let filterText=document.getElementById("filterSelect").options[document.getElementById("filterSelect").selectedIndex].text
let municipalityText=selectedMunicipality || "كل البلديات"

document.getElementById("panelTitle").textContent="ملخص حسب الفلتر"
document.getElementById("panelSubTitle").textContent=`البلدية: ${municipalityText} | الأحياء المعروضة: ${districtCounter} | الفلترة: ${filterText}`
document.getElementById("totalCount").textContent=totalCount
document.getElementById("totalTypes").textContent=totalTypes
document.getElementById("detailsList").innerHTML=html || '<div class="emptyBox">لا توجد بيانات مطابقة للفلترة الحالية.</div>'

drawSideChart(labels,values)
renderScreenTable()
}

function escapeHtml(value){
return String(value ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;")
}
