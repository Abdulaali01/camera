
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حساب مساحة حي</title>

<style>
body{font-family:tahoma;background:#f2f2f2;padding:20px;text-align:center}
#map{height:500px;width:100%;border-radius:10px;margin-top:10px}
button{padding:10px 20px;border:none;border-radius:8px;background:#007bff;color:#fff;font-size:15px;cursor:pointer}
.box{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
</style>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=geometry"></script>

</head>

<body>

<div class="box">
<h3>📐 حساب مساحة الحي</h3>
<p>اضغط على الخريطة لرسم حدود الحي</p>

<button onclick="calculateArea()">حساب المساحة</button>
<button onclick="clearMap()">مسح</button>

<h3 id="result"></h3>
</div>

<div id="map"></div>

<script>

let map;
let points=[];
let polygon;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:21.2700,lng:40.4150},
zoom:13
});

map.addListener("click",(e)=>{

points.push(e.latLng);

if(polygon){
polygon.setMap(null);
}

polygon=new google.maps.Polygon({
paths:points,
strokeColor:"#FF0000",
fillColor:"#FF0000",
fillOpacity:0.3
});

polygon.setMap(map);

});

}

function calculateArea(){

if(points.length<3){
alert("حدد على الأقل 3 نقاط");
return;
}

let area=google.maps.geometry.spherical.computeArea(points);

let km=area/1000000;

document.getElementById("result").innerHTML=
"المساحة: "+area.toFixed(0)+" متر مربع<br>"+
"المساحة: "+km.toFixed(2)+" كم²";

}

function clearMap(){

points=[];
if(polygon){
polygon.setMap(null);
}

document.getElementById("result").innerHTML="";

}

window.onload=initMap;

</script>

</body>
</html>
