<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{margin:0;font-family:tahoma}

#map{height:100vh;width:100%}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
background:#fff;
font-size:16px;
z-index:5
}

.panel{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="panel">

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br>

<button onclick="importExcel()">استيراد Excel</button>

<button onclick="exportExcel()">تصدير Excel</button>

</div>

<div id="map"></div>

<script>

let map
let groups={}
let charts=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:14,
mapTypeId:"hybrid"
})

/* البحث */

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

map.fitBounds(place.geometry.viewport)

})

}

/* جلب اسم الحي */

async function getDistrict(lat,lng){

let url=
"https://maps.googleapis.com/maps/api/geocode/json?latlng="
+lat+","+lng+
"&key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y"

let r=await fetch(url)

let data=await r.json()

let district="غير معروف"

if(data.results.length){

data.results[0].address_components.forEach(c=>{

if(
c.types.includes("sublocality") ||
c.types.includes("neighborhood")
){
district=c.long_name
}

})

}

return district

}

/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[
workbook.SheetNames[0]
]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

let points=[]

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])

if(!isNaN(lat)&&!isNaN(lng)){

points.push({lat:lat,lng:lng})

}

}

groupByDistrict(points)

}

reader.readAsArrayBuffer(file)

}

/* التجميع حسب الحي */

async function groupByDistrict(points){

groups={}
charts.forEach(c=>c.setMap(null))
charts=[]

for(let p of points){

let district=await getDistrict(p.lat,p.lng)

if(!groups[district]){

groups[district]={
center:p,
points:[]
}

}

groups[district].points.push(p)

}

drawGroups()

}

/* رسم دائرة لكل حي */

function drawGroups(){

Object.keys(groups).forEach((d,i)=>{

let g=groups[d]

let color=COLORS[i%COLORS.length]

let count=g.points.length

let center=g.center

let size=120

let svg=`
<svg xmlns="http://www.w3.org/2000/svg"
width="${size}" height="${size}" viewBox="0 0 100 100">

<circle cx="50" cy="50" r="45"
fill="${color}"
fill-opacity="0.25"
stroke="${color}"
stroke-width="4"/>

<text x="50" y="50"
text-anchor="middle"
font-size="22"
font-weight="bold"
fill="${color}">
${count}
</text>

</svg>
`

let marker=new google.maps.Marker({

position:center,

map:map,

title:d,

icon:{
url:"data:image/svg+xml;charset=UTF-8,"+
encodeURIComponent(svg),
scaledSize:new google.maps.Size(size,size)
}

})

charts.push(marker)

})

}

/* تصدير Excel */

async function exportExcel(){

let workbook=new ExcelJS.Workbook()

let sheet=workbook.addWorksheet("Districts")

sheet.columns=[
{header:"District",key:"district",width:25},
{header:"Count",key:"count",width:10}
]

Object.keys(groups).forEach(d=>{

sheet.addRow({
district:d,
count:groups[d].points.length
})

})

const buffer=await workbook.xlsx.writeBuffer()

let link=document.createElement("a")

link.href=URL.createObjectURL(new Blob([buffer]))

link.download="district_report.xlsx"

link.click()

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
