<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء + الرسم البياني</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{
margin:0;
font-family:tahoma
}

#map{
height:100vh;
width:100%
}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:300px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
background:#fff;
z-index:5
}

.panel{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

.countBox{
background:#000;
color:#fff;
padding:6px 12px;
border-radius:8px;
font-weight:bold;
font-size:16px;
text-align:center;
line-height:1.3;
min-width:110px
}

.countNumber{
font-size:18px;
font-weight:bold
}

.countDistrict{
font-size:13px;
margin-top:2px
}

.stats{
font-size:12px;
margin-top:6px;
line-height:1.2
}

.statRow{
display:flex;
align-items:center;
gap:4px;
margin-top:2px
}

.bar{
display:flex;
gap:1px
}

.bar span{
width:6px;
height:6px;
background:#fff;
display:inline-block
}

.label{
min-width:45px;
text-align:right;
font-size:11px
}

.count{
font-size:11px
}

</style>
</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="panel">

<input type="file" id="excelFile">
<br>
<button onclick="importExcel()">استيراد Excel</button>

<br><br>

<label><input type="radio" name="filter" onclick="setFilter('all')" checked> عرض الكل</label><br>
<label><input type="radio" name="filter" onclick="setFilter('top3')"> عرض أعلى 3</label><br>
<label><input type="radio" name="filter" onclick="setFilter('200')"> أكثر من 200</label><br>
<label><input type="radio" name="filter" onclick="setFilter('100_200')"> من 100 إلى 200</label><br>
<label><input type="radio" name="filter" onclick="setFilter('100')"> أقل من 100</label>

</div>

<div id="map"></div>

<script>

let map
let districts={}
let polygons=[]
let markers=[]
let overlays=[]
let currentFilter="all"
let topDistricts=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid"
})

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

map.fitBounds(place.geometry.viewport)

})

}

function setFilter(type){

currentFilter=type

polygons.forEach(p=>p.setMap(null))
markers.forEach(m=>m.setMap(null))
overlays.forEach(o=>o.setMap(null))

polygons=[]
markers=[]
overlays=[]

drawDistricts()

}

function convexHull(points){

points=points.slice()

points.sort((a,b)=>a.lng-b.lng||a.lat-b.lat)

const cross=(o,a,b)=>(
(a.lng-o.lng)*(b.lat-o.lat)-
(a.lat-o.lat)*(b.lng-o.lng)
)

let lower=[]

for(let p of points){

while(lower.length>=2 &&
cross(lower[lower.length-2],lower[lower.length-1],p)<=0){

lower.pop()

}

lower.push(p)

}

let upper=[]

for(let i=points.length-1;i>=0;i--){

let p=points[i]

while(upper.length>=2 &&
cross(upper[upper.length-2],upper[upper.length-1],p)<=0){

upper.pop()

}

upper.push(p)

}

upper.pop()
lower.pop()

return lower.concat(upper)

}

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

districts={}
polygons.forEach(p=>p.setMap(null))
overlays.forEach(o=>o.setMap(null))

polygons=[]
overlays=[]

let bounds=new google.maps.LatLngBounds()

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])
let district=rows[i][2]
let third=rows[i][3]

bounds.extend({lat:lat,lng:lng})

if(!districts[district]){

districts[district]={
points:[],
third:{}
}

}

districts[district].points.push({lat,lng})

if(!districts[district].third[third]){
districts[district].third[third]=0
}

districts[district].third[third]++

}

map.fitBounds(bounds)

let arr=[]

for(let d in districts){

arr.push({
name:d,
count:districts[d].points.length
})

}

arr.sort((a,b)=>b.count-a.count)

topDistricts=arr.slice(0,3).map(d=>d.name)

drawDistricts()

}

reader.readAsArrayBuffer(file)

}

function createCountOverlay(position,count,district,data){

class CustomOverlay extends google.maps.OverlayView{

onAdd(){

this.div=document.createElement("div")
this.div.className="countBox"

let statsHTML=""

let max=0

for(let t in data.third){
if(data.third[t]>max) max=data.third[t]
}

for(let t in data.third){

let val=data.third[t]

let squares=Math.round((val/max)*10)

let bar=""

for(let i=0;i<squares;i++){
bar+="<span></span>"
}

statsHTML+=`
<div class="statRow">
<div class="label">${t}</div>
<div class="bar">${bar}</div>
<div class="count">${val}</div>
</div>
`

}

this.div.innerHTML=
'<div class="countNumber">'+count+'</div>'+
'<div class="countDistrict">'+district+'</div>'+
'<div class="stats">'+statsHTML+'</div>'

this.getPanes().overlayMouseTarget.appendChild(this.div)

}

draw(){

let projection=this.getProjection()
let pos=projection.fromLatLngToDivPixel(
new google.maps.LatLng(position.lat,position.lng)
)

this.div.style.position="absolute"
this.div.style.left=pos.x-45+"px"
this.div.style.top=pos.y-15+"px"

}

onRemove(){

this.div.parentNode.removeChild(this.div)
this.div=null

}

}

let overlay=new CustomOverlay()

overlay.setMap(map)

overlays.push(overlay)

}

function drawDistricts(){

let index=0

for(let district in districts){

let data=districts[district]
let count=data.points.length

if(currentFilter=="top3" && !topDistricts.includes(district)) continue
if(currentFilter=="200" && count<=200) continue
if(currentFilter=="100_200" && (count<100 || count>200)) continue
if(currentFilter=="100" && count>=100) continue

if(count<3) continue

let color=COLORS[index%COLORS.length]

index++

let hull=convexHull(data.points)

let polygon=new google.maps.Polygon({

paths:hull,
strokeColor:color,
strokeWeight:4,
fillColor:color,
fillOpacity:0.35,
map:map

})

polygons.push(polygon)

let lat=0
let lng=0

hull.forEach(p=>{
lat+=p.lat
lng+=p.lng
})

let center={
lat:lat/hull.length,
lng:lng/hull.length
}

createCountOverlay(center,count,district,data)

}

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
