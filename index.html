<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء + الأعمدة على الخريطة</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{
margin:0;
font-family:tahoma;
background:#f5f7fb
}

#map{
height:100vh;
width:100%
}

/* الشريط العلوي */
.topPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.18);
padding:10px 12px;
z-index:10;
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
min-width:320px;
max-width:95%
}

.topPanel .group{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap
}

.topPanel .titleMini{
font-size:12px;
font-weight:bold;
color:#333;
margin-inline:2px
}

#searchBox{
width:240px;
padding:10px 12px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
outline:none;
font-size:14px
}

.fileInput{
padding:8px;
border:1px solid #ddd;
border-radius:10px;
background:#fff;
font-size:13px;
max-width:180px
}

select{
padding:9px 10px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
font-size:13px;
min-width:150px;
outline:none
}

button{
padding:9px 14px;
border:none;
border-radius:10px;
background:#2d6cff;
color:#fff;
cursor:pointer;
font-size:13px;
font-weight:bold
}

button:hover{
opacity:.92
}

/* للجوال */
@media (max-width:900px){

.topPanel{
width:95%;
padding:10px
}

#searchBox{
width:100%
}

.topPanel .group{
width:100%
}

.fileInput,
select,
button{
width:100%
}

}

</style>
</head>

<body>

<div class="topPanel">

<div class="group">
<input id="searchBox" placeholder="ابحث عن حي أو شارع">
</div>

<div class="group">
<span class="titleMini">الملف</span>
<input type="file" id="excelFile" class="fileInput" accept=".xlsx,.xls">
<button onclick="importExcel()">استيراد Excel</button>
</div>

<div class="group">
<span class="titleMini">الفلترة</span>
<select id="filterSelect" onchange="setFilter(this.value)">
<option value="all">عرض الكل</option>
<option value="top3">أعلى 3</option>
<option value="top3_2">ثاني أعلى 3</option>
<option value="top3_3">ثالث أعلى 3</option>
<option value="top3_4">رابع أعلى 3</option>
<option value="200">أكثر من 200</option>
<option value="100_200">من 100 إلى 200</option>
<option value="100">أقل من 100</option>
</select>
</div>

<div class="group">
<span class="titleMini">الأحياء</span>
<select id="districtList" onchange="selectDistrict(this.value)">
<option value="">كل الأحياء</option>
</select>
</div>

</div>

<div id="map"></div>

<script>

let map
let districts={}
let polygons=[]
let markers=[]
let overlays=[]
let currentFilter="all"
let selectedDistrict=""
let rankedDistricts=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid",
gestureHandling:"greedy"
})

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

if(place.geometry.viewport){
map.fitBounds(place.geometry.viewport)
}else{
map.setCenter(place.geometry.location)
map.setZoom(16)
}

})

}

function setFilter(type){

currentFilter=type
selectedDistrict=document.getElementById("districtList").value || ""

clearMap()
drawDistricts()

}

function selectDistrict(name){

selectedDistrict=name || ""

clearMap()
drawDistricts()

}

function clearMap(){

polygons.forEach(p=>p.setMap(null))
markers.forEach(m=>m.setMap(null))
overlays.forEach(o=>o.setMap(null))

polygons=[]
markers=[]
overlays=[]

}

function convexHull(points){

points=points.slice()

points.sort((a,b)=>a.lng-b.lng||a.lat-b.lat)

const cross=(o,a,b)=>(
(a.lng-o.lng)*(b.lat-o.lat)-
(a.lat-o.lat)*(b.lng-o.lng)
)

let lower=[]

for(let p of points){

while(lower.length>=2 &&
cross(lower[lower.length-2],lower[lower.length-1],p)<=0){
lower.pop()
}

lower.push(p)

}

let upper=[]

for(let i=points.length-1;i>=0;i--){

let p=points[i]

while(upper.length>=2 &&
cross(upper[upper.length-2],upper[upper.length-1],p)<=0){
upper.pop()
}

upper.push(p)

}

upper.pop()
lower.pop()

return lower.concat(upper)

}

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

districts={}
clearMap()

let bounds=new google.maps.LatLngBounds()
let hasValidPoint=false

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])
let district=(rows[i][2]??"").toString().trim()
let third=(rows[i][3]??"بدون تصنيف").toString().trim()

if(isNaN(lat) || isNaN(lng) || !district) continue

bounds.extend({lat:lat,lng:lng})
hasValidPoint=true

if(!districts[district]){

districts[district]={
points:[],
third:{}
}

}

districts[district].points.push({lat,lng})

if(!districts[district].third[third]){
districts[district].third[third]=0
}

districts[district].third[third]++

}

if(hasValidPoint){
map.fitBounds(bounds)
}

prepareRanks()
fillDistrictList()
drawDistricts()

}

reader.readAsArrayBuffer(file)

}

function prepareRanks(){

let arr=[]

for(let d in districts){

arr.push({
name:d,
count:districts[d].points.length
})

}

arr.sort((a,b)=>b.count-a.count)
rankedDistricts=arr

}

function fillDistrictList(){

let sel=document.getElementById("districtList")
sel.innerHTML='<option value="">كل الأحياء</option>'

let names=Object.keys(districts).sort((a,b)=>a.localeCompare(b,'ar'))

for(let name of names){

let opt=document.createElement("option")
opt.value=name
opt.textContent=name
sel.appendChild(opt)

}

sel.value=selectedDistrict || ""

}

function getTopGroupNames(groupNumber){

let start=(groupNumber-1)*3
let end=start+3

return rankedDistricts.slice(start,end).map(x=>x.name)

}

function passesFilter(district,count){

if(selectedDistrict && district!==selectedDistrict) return false

if(currentFilter=="all") return true

if(currentFilter=="top3"){
return getTopGroupNames(1).includes(district)
}

if(currentFilter=="top3_2"){
return getTopGroupNames(2).includes(district)
}

if(currentFilter=="top3_3"){
return getTopGroupNames(3).includes(district)
}

if(currentFilter=="top3_4"){
return getTopGroupNames(4).includes(district)
}

if(currentFilter=="200" && count<=200) return false
if(currentFilter=="100_200" && (count<100 || count>200)) return false
if(currentFilter=="100" && count>=100) return false

return true

}

function getDistrictCenter(points){

let lat=0
let lng=0

for(let p of points){
lat+=p.lat
lng+=p.lng
}

return {
lat:lat/points.length,
lng:lng/points.length
}

}

function getColumnColor(count){

if(count>200) return "#ff3d00"
if(count>100) return "#ffc107"
return "#4caf50"

}

function getColumnHeight(count){

if(rankedDistricts.length===0) return 50

let maxCount=rankedDistricts[0]?.count || 1
let minHeight=35
let maxHeight=130

let h=minHeight + ((count/maxCount)*(maxHeight-minHeight))
return Math.max(minHeight,Math.min(maxHeight,h))

}

function createColumnOverlay(position,count,district,color,data){

class ColumnOverlay extends google.maps.OverlayView{

onAdd(){

this.div=document.createElement("div")
this.div.style.position="absolute"
this.div.style.transform="translate(-50%,-100%)"
this.div.style.pointerEvents="auto"
this.div.style.display="flex"
this.div.style.flexDirection="column"
this.div.style.alignItems="center"
this.div.style.userSelect="none"

this.label=document.createElement("div")
this.label.style.background="rgba(0,0,0,.78)"
this.label.style.color="#fff"
this.label.style.borderRadius="10px"
this.label.style.padding="6px 8px"
this.label.style.fontFamily="tahoma"
this.label.style.fontSize="12px"
this.label.style.fontWeight="bold"
this.label.style.boxShadow="0 2px 8px rgba(0,0,0,.25)"
this.label.style.marginBottom="4px"
this.label.style.textAlign="center"
this.label.style.lineHeight="1.4"
this.label.style.minWidth="78px"

this.columnWrap=document.createElement("div")
this.columnWrap.style.position="relative"
this.columnWrap.style.width="36px"
this.columnWrap.style.height="150px"
this.columnWrap.style.display="flex"
this.columnWrap.style.alignItems="flex-end"
this.columnWrap.style.justifyContent="center"

this.column=document.createElement("div")
this.column.style.width="18px"
this.column.style.borderRadius="8px 8px 0 0"
this.column.style.background=`linear-gradient(to top, ${color}, #ffd54f)`
this.column.style.boxShadow="0 4px 12px rgba(0,0,0,.35)"
this.column.style.border="1px solid rgba(255,255,255,.35)"
this.column.style.position="relative"

this.side=document.createElement("div")
this.side.style.position="absolute"
this.side.style.right="-5px"
this.side.style.top="0"
this.side.style.width="5px"
this.side.style.height="100%"
this.side.style.background="rgba(0,0,0,.18)"
this.side.style.borderRadius="0 6px 0 0"

this.column.appendChild(this.side)

this.base=document.createElement("div")
this.base.style.position="absolute"
this.base.style.bottom="-2px"
this.base.style.left="-10px"
this.base.style.width="38px"
this.base.style.height="4px"
this.base.style.background="rgba(255,255,255,.75)"
this.base.style.borderRadius="50%"
this.base.style.boxShadow="0 0 6px rgba(0,0,0,.4)"

this.tip=document.createElement("div")
this.tip.style.position="absolute"
this.tip.style.bottom="0"
this.tip.style.left="50%"
this.tip.style.transform="translateX(-50%)"
this.tip.style.background="rgba(255,255,255,.97)"
this.tip.style.color="#000"
this.tip.style.border="1px solid #ddd"
this.tip.style.borderRadius="12px"
this.tip.style.padding="8px 10px"
this.tip.style.minWidth="170px"
this.tip.style.maxWidth="220px"
this.tip.style.fontSize="12px"
this.tip.style.lineHeight="1.5"
this.tip.style.boxShadow="0 6px 16px rgba(0,0,0,.22)"
this.tip.style.display="none"
this.tip.style.zIndex="9999"

this.div.appendChild(this.label)
this.columnWrap.appendChild(this.column)
this.columnWrap.appendChild(this.base)
this.div.appendChild(this.columnWrap)
this.div.appendChild(this.tip)

this.getPanes().overlayMouseTarget.appendChild(this.div)

this.renderContent()

this.div.addEventListener("click",()=>{
this.tip.style.display=this.tip.style.display==="none" ? "block" : "none"
})

}

renderContent(){

let sortedThird=Object.entries(data.third).sort((a,b)=>b[1]-a[1])

let smallLines=""
for(let i=0;i<sortedThird.length && i<5;i++){
smallLines+=`<div>${sortedThird[i][0]} : <b>${sortedThird[i][1]}</b></div>`
}

this.label.innerHTML=
`<div style="font-size:16px">${count}</div>
<div style="font-size:11px;white-space:nowrap">${district}</div>`

this.tip.innerHTML=
`<div style="font-weight:bold;font-size:13px;margin-bottom:4px">${district}</div>
<div>عدد البلاغات: <b>${count}</b></div>
<div style="margin-top:6px">${smallLines || "لا توجد تصنيفات"}</div>`

let h=getColumnHeight(count)
this.column.style.height=h+"px"

}

draw(){

let projection=this.getProjection()
let pos=projection.fromLatLngToDivPixel(
new google.maps.LatLng(position.lat,position.lng)
)

this.div.style.left=pos.x+"px"
this.div.style.top=pos.y+"px"

}

onRemove(){

if(this.div && this.div.parentNode){
this.div.parentNode.removeChild(this.div)
}
this.div=null

}

}

let overlay=new ColumnOverlay()
overlay.setMap(map)
overlays.push(overlay)

}

function drawDistricts(){

let index=0
let visibleBounds=new google.maps.LatLngBounds()
let hasVisible=false

for(let district in districts){

let data=districts[district]
let count=data.points.length

if(!passesFilter(district,count)) continue
if(count<1) continue

let color=COLORS[index%COLORS.length]
let columnColor=getColumnColor(count)
index++

if(data.points.length>=3){

let hull=convexHull(data.points)

if(hull && hull.length>=3){

let polygon=new google.maps.Polygon({
paths:hull,
strokeColor:color,
strokeWeight:4,
fillColor:color,
fillOpacity:0.28,
map:map
})

polygons.push(polygon)

hull.forEach(p=>{
visibleBounds.extend({lat:p.lat,lng:p.lng})
hasVisible=true
})

}

}else{

let center1=getDistrictCenter(data.points)

let marker=new google.maps.Marker({
position:center1,
map:map,
icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:6,
fillColor:color,
fillOpacity:1,
strokeColor:"#fff",
strokeWeight:2
}
})

markers.push(marker)
visibleBounds.extend(center1)
hasVisible=true

}

let center=getDistrictCenter(data.points)
visibleBounds.extend(center)
hasVisible=true

createColumnOverlay(center,count,district,columnColor,data)

}

if(hasVisible){
map.fitBounds(visibleBounds)
}

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
