<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء + الرسم البياني</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{
margin:0;
font-family:tahoma
}

#map{
height:100vh;
width:100%
}

/* الشريط العلوي */

.topBar{

position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:10px 14px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
display:flex;
gap:10px;
align-items:center;
z-index:10;
flex-wrap:wrap

}

#searchBox{
width:220px;
padding:8px;
border-radius:6px;
border:1px solid #ccc
}

select,input[type=file]{
padding:6px
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

.countBox{
background:#000;
color:#fff;
padding:6px 12px;
border-radius:8px;
font-weight:bold;
font-size:16px;
text-align:center;
line-height:1.3;
min-width:110px
}

.countNumber{
font-size:18px;
font-weight:bold
}

.countDistrict{
font-size:13px;
margin-top:2px
}

.stats{
font-size:12px;
margin-top:6px;
line-height:1.2
}

.statRow{
display:flex;
align-items:center;
gap:4px;
margin-top:2px
}

.bar{
display:flex;
gap:1px
}

.bar span{
width:6px;
height:6px;
background:#fff;
display:inline-block
}

.label{
min-width:45px;
text-align:right;
font-size:11px
}

.count{
font-size:11px
}

</style>
</head>

<body>

<div class="topBar">

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<input type="file" id="excelFile">

<button onclick="importExcel()">استيراد</button>

<select id="districtSelect" onchange="showDistrict()">
<option value="">اختر حي</option>
</select>

<select onchange="setFilter(this.value)">
<option value="all">عرض الكل</option>
<option value="top3">أعلى 3</option>
<option value="top6">ثاني أعلى 3</option>
<option value="top9">ثالث أعلى 3</option>
<option value="top12">رابع أعلى 3</option>
<option value="200">أكثر من 200</option>
<option value="100_200">100 الى 200</option>
<option value="100">أقل من 100</option>
</select>

</div>

<div id="map"></div>

<script>

let map
let districts={}
let polygons=[]
let overlays=[]
let currentFilter="all"

let top3=[]
let top6=[]
let top9=[]
let top12=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid"
})

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

map.fitBounds(place.geometry.viewport)

})

}

function setFilter(type){

currentFilter=type

clearMap()

drawDistricts()

}

function clearMap(){

polygons.forEach(p=>p.setMap(null))
overlays.forEach(o=>o.setMap(null))

polygons=[]
overlays=[]

}

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

districts={}

let bounds=new google.maps.LatLngBounds()

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])
let district=rows[i][2]

bounds.extend({lat,lng})

if(!districts[district]){

districts[district]={
points:[]
}

}

districts[district].points.push({lat,lng})

}

map.fitBounds(bounds)

prepareRanking()

fillDistrictList()

drawDistricts()

}

reader.readAsArrayBuffer(file)

}

function prepareRanking(){

let arr=[]

for(let d in districts){

arr.push({
name:d,
count:districts[d].points.length
})

}

arr.sort((a,b)=>b.count-a.count)

top3=arr.slice(0,3).map(d=>d.name)
top6=arr.slice(3,6).map(d=>d.name)
top9=arr.slice(6,9).map(d=>d.name)
top12=arr.slice(9,12).map(d=>d.name)

}

function fillDistrictList(){

let select=document.getElementById("districtSelect")

select.innerHTML='<option value="">اختر حي</option>'

for(let d in districts){

let opt=document.createElement("option")

opt.value=d
opt.textContent=d

select.appendChild(opt)

}

}

function showDistrict(){

let name=document.getElementById("districtSelect").value

clearMap()

if(!name)return

drawOneDistrict(name)

}

function drawDistricts(){

clearMap()

for(let district in districts){

let count=districts[district].points.length

if(currentFilter=="top3" && !top3.includes(district)) continue
if(currentFilter=="top6" && !top6.includes(district)) continue
if(currentFilter=="top9" && !top9.includes(district)) continue
if(currentFilter=="top12" && !top12.includes(district)) continue

if(currentFilter=="200" && count<=200) continue
if(currentFilter=="100_200" && (count<100 || count>200)) continue
if(currentFilter=="100" && count>=100) continue

drawOneDistrict(district)

}

}

function drawOneDistrict(district){

let data=districts[district]

if(data.points.length<3)return

let color=COLORS[Math.floor(Math.random()*COLORS.length)]

let polygon=new google.maps.Polygon({

paths:data.points,
strokeColor:color,
strokeWeight:4,
fillColor:color,
fillOpacity:0.35,
map:map

})

polygons.push(polygon)

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
