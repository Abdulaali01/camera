<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>خريطة الطائف</title>

<style>

body{
font-family:tahoma;
background:#f5f5f5;
text-align:center;
padding:20px;
}

#map{
height:550px;
border-radius:12px;
margin-top:10px;
}

input{
padding:10px;
width:260px;
border-radius:8px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<h3>البحث عن حي أو شارع</h3>

<input id="searchBox" placeholder="اكتب اسم الحي أو الشارع">

<div id="map"></div>

<script>

let map;
let marker;
let geocoder;

function initMap(){

map = new google.maps.Map(document.getElementById("map"),{

center:{lat:21.2703,lng:40.4158},
zoom:14,
mapTypeId:"satellite"

});

geocoder = new google.maps.Geocoder();

const input = document.getElementById("searchBox");

const autocomplete = new google.maps.places.Autocomplete(input,{
componentRestrictions:{country:"sa"}
});

autocomplete.bindTo("bounds",map);

autocomplete.addListener("place_changed",()=>{

const place = autocomplete.getPlace();

if(!place.geometry)return;

map.setCenter(place.geometry.location);
map.setZoom(17);

});

map.addListener("click",(e)=>{

const lat=e.latLng.lat();
const lng=e.latLng.lng();

if(marker)marker.setMap(null);

marker=new google.maps.Marker({
position:e.latLng,
map:map
});

geocoder.geocode({
location:{lat:lat,lng:lng}
}).then((response)=>{

if(response.results[0]){

const address=response.results[0].formatted_address;

const info=new google.maps.InfoWindow({
content:
"📍 الموقع:<br>"+
address+
"<br><br>"+
"Lat: "+lat+
"<br>"+
"Lng: "+lng
});

info.open(map,marker);

}

});

});

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap" async defer></script>

</body>
</html>
