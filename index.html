<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل المواقع</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{
margin:0;
font-family:tahoma
}

#map{
height:100vh;
width:100%
}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
background:#fff;
font-size:16px;
z-index:5
}

.panel{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="panel">

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br>

<button onclick="importExcel()">استيراد Excel</button>

<button onclick="exportExcel()">تصدير Excel</button>

</div>

<div id="map"></div>

<script>

let map
let groups=[]
let markers=[]
let circles=[]
let drawnPoints=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:15,
mapTypeId:"hybrid"
})

/* البحث */

const input=document.getElementById("searchBox")

const autocomplete=
new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

map.fitBounds(place.geometry.viewport)

})

/* الرسم اليدوي */

const drawingManager=
new google.maps.drawing.DrawingManager({

drawingMode:null,

drawingControl:true,

drawingControlOptions:{
position:
google.maps.ControlPosition.LEFT_CENTER,
drawingModes:["polygon"]
}

})

drawingManager.setMap(map)

google.maps.event.addListener(
drawingManager,
'overlaycomplete',
function(e){

let polygon=e.overlay

polygon.setOptions({
fillColor:"#00ff00",
strokeColor:"#008000",
strokeWeight:3
})

drawnPoints=[]

let path=polygon.getPath()

for(let i=0;i<path.getLength();i++){

let p=path.getAt(i)

drawnPoints.push({
lat:p.lat(),
lng:p.lng()
})

}

let area=
google.maps.geometry.spherical.computeArea(path)

alert(
"المساحة: "+
Math.round(area)+
" متر مربع"
)

})

}

/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=
XLSX.read(data,{type:"array"})

let sheet=
workbook.Sheets[
workbook.SheetNames[0]
]

let rows=
XLSX.utils.sheet_to_json(
sheet,
{header:1}
)

let points=[]

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])

if(!isNaN(lat)&&!isNaN(lng)){

points.push({
lat:lat,
lng:lng
})

}

}

groupPoints(points)

}

reader.readAsArrayBuffer(file)

}

/* حساب المسافة */

function distance(a,b){

const R=6371000

const dLat=(b.lat-a.lat)*Math.PI/180
const dLng=(b.lng-a.lng)*Math.PI/180

const lat1=a.lat*Math.PI/180
const lat2=b.lat*Math.PI/180

const x=
Math.sin(dLat/2)**2+
Math.sin(dLng/2)**2*
Math.cos(lat1)*
Math.cos(lat2)

const c=
2*Math.atan2(
Math.sqrt(x),
Math.sqrt(1-x)
)

return R*c

}

/* تجميع النقاط */

function groupPoints(points){

groups=[]

markers.forEach(m=>m.setMap(null))
circles.forEach(c=>c.setMap(null))

markers=[]
circles=[]

points.forEach(p=>{

let added=false

for(let g of groups){

if(distance(p,g.center)<=100){

g.points.push(p)

added=true

break

}

}

if(!added){

groups.push({
center:p,
points:[p]
})

}

})

drawGroups()

}

/* رسم الدوائر الكبيرة */

function drawGroups(){

groups.forEach((g,i)=>{

let color=COLORS[i%COLORS.length]
let count=g.points.length
let center=g.center

g.points.forEach(p=>{

let m=
new google.maps.Marker({
position:p,
map:map
})

markers.push(m)

})

let svg=`
<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140">
<circle cx="70" cy="70" r="55"
fill="${color}"
fill-opacity="0.25"
stroke="${color}"
stroke-width="5"/>
<circle cx="70" cy="70" r="38" fill="white"/>
<text x="70" y="80"
font-size="32"
text-anchor="middle"
fill="${color}"
font-weight="bold">${count}</text>
</svg>
`

let marker=new google.maps.Marker({

position:center,

map:map,

icon:{
url:"data:image/svg+xml;charset=UTF-8,"+
encodeURIComponent(svg),
scaledSize:new google.maps.Size(140,140)
}

})

circles.push(marker)

})

}

/* استخراج اسم الشارع والحي */

async function getAddress(lat,lng){

let url=
"https://maps.googleapis.com/maps/api/geocode/json?latlng="
+lat+","+lng+
"&key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y"

let r=await fetch(url)

let data=await r.json()

let street=""
let district=""

if(data.results.length){

data.results.forEach(res=>{

res.address_components.forEach(c=>{

if(
c.types.includes("route") &&
street==""
){
street=c.long_name
}

if(
c.types.includes("sublocality") ||
c.types.includes("neighborhood")
){
district=c.long_name
}

if(
c.types.includes("locality") &&
district==""
){
district=c.long_name
}

})

})

}

if(street=="")street=district

return{
street:street,
district:district
}

}

/* تصدير Excel */

async function exportExcel(){

let workbook=
new ExcelJS.Workbook()

let sheet=
workbook.addWorksheet("Map")

sheet.columns=[

{header:"Group",key:"group",width:10},
{header:"Latitude",key:"lat",width:18},
{header:"Longitude",key:"lng",width:18},
{header:"Street",key:"street",width:30},
{header:"District",key:"district",width:30}

]

for(let i=0;i<groups.length;i++){

let g=groups[i]

let color=
COLORS[i%COLORS.length]
.replace("#","")

for(let p of g.points){

let addr=
await getAddress(p.lat,p.lng)

let row=
sheet.addRow({

group:i+1,
lat:p.lat,
lng:p.lng,
street:addr.street,
district:addr.district

})

row.eachCell(cell=>{

cell.fill={
type:'pattern',
pattern:'solid',
fgColor:{argb:"55"+color}
}

})

}

}

for(let p of drawnPoints){

let addr=
await getAddress(p.lat,p.lng)

sheet.addRow({

group:"Drawing",
lat:p.lat,
lng:p.lng,
street:addr.street,
district:addr.district

})

}

const buffer=
await workbook.xlsx.writeBuffer()

let link=document.createElement("a")

link.href=
URL.createObjectURL(
new Blob([buffer])
)

link.download="map_report.xlsx"

link.click()

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places,geometry,drawing&callback=initMap">
</script>

</body>
</html>
