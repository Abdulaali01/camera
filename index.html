<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تقرير تحليل الأحياء</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

/* الحاوية الرئيسية */
.reportContainer {
  max-width: 1400px;
  margin: 0 auto;
  background: white;
  border-radius: 20px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  overflow: hidden;
}

/* رأس التقرير */
.reportHeader {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: white;
  padding: 30px;
  text-align: center;
}

.reportHeader h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.reportHeader .subtitle {
  font-size: 16px;
  opacity: 0.9;
}

.reportDate {
  margin-top: 15px;
  font-size: 14px;
  background: rgba(255,255,255,0.2);
  display: inline-block;
  padding: 8px 20px;
  border-radius: 20px;
}

/* لوحة التحكم */
.controlPanel {
  background: #f8fafc;
  padding: 20px 30px;
  border-bottom: 2px solid #e2e8f0;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  align-items: center;
}

.controlPanel input, .controlPanel select {
  padding: 12px 16px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
}

.controlPanel input:focus, .controlPanel select:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.controlPanel button {
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}

.controlPanel button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.controlPanel button.secondary {
  background: linear-gradient(135deg, #0b8f55 0%, #0a7a48 100%);
}

/* المحتوى */
.reportContent {
  padding: 30px;
}

/* قسم الخريطة */
.mapSection {
  margin-bottom: 30px;
}

.sectionTitle {
  font-size: 20px;
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sectionTitle::before {
  content: "";
  width: 4px;
  height: 24px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 2px;
}

#map {
  width: 100%;
  height: 500px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* قسم الإحصائيات */
.statsGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.statCard {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
}

.statCard h3 {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 10px;
}

.statCard .number {
  font-size: 36px;
  font-weight: 800;
}

/* الجدول */
.tableSection {
  margin-bottom: 30px;
}

.dataTable {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.dataTable thead {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: white;
}

.dataTable th {
  padding: 16px;
  text-align: center;
  font-weight: 700;
  font-size: 14px;
}

.dataTable td {
  padding: 14px 16px;
  text-align: center;
  border-bottom: 1px solid #e2e8f0;
  font-size: 14px;
}

.dataTable tr:hover {
  background: #f8fafc;
}

.dataTable tr:nth-child(even) {
  background: #f1f5f9;
}

.rank {
  display: inline-block;
  width: 32px;
  height: 32px;
  line-height: 32px;
  border-radius: 50%;
  font-weight: 700;
  color: white;
}

.rank.gold { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
.rank.silver { background: linear-gradient(135deg, #64748b 0%, #475569 100%); }
.rank.bronze { background: linear-gradient(135deg, #b45309 0%, #92400e 100%); }
.rank.normal { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

.countBadge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
}

.countBadge.high { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); }
.countBadge.medium { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }

/* الرسم البياني */
.chartContainer {
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  margin-bottom: 30px;
}

.chartWrapper {
  max-width: 500px;
  margin: 0 auto;
}

/* للطباعة */
@media print {
  body { background: white; }
  .reportContainer { box-shadow: none; }
  .controlPanel { display: none; }
  #map { height: 400px; }
}

/* تحميل */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  font-size: 18px;
  color: #667eea;
  font-weight: 700;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #e0e7ff;
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-left: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<div id="loading" class="loading" style="display: none;">جاري التحميل...<div class="spinner"></div></div>

<div class="reportContainer">
  <!-- رأس التقرير -->
  <div class="reportHeader">
    <h1>📊 تقرير تحليل الأحياء</h1>
    <div class="subtitle">تقرير شامل يوضح توزيع البلاغات حسب الأحياء</div>
    <div class="reportDate" id="reportDate"></div>
  </div>

  <!-- لوحة التحكم -->
  <div class="controlPanel">
    <input type="file" id="excelFile" accept=".xlsx,.xls" style="flex: 1; min-width: 200px;">
    <button onclick="importExcel()">📥 استيراد البيانات</button>

    <select id="filterCount" onchange="updateReport()">
      <option value="5">أعلى 5 أحياء</option>
      <option value="10">أعلى 10 أحياء</option>
      <option value="15">أعلى 15 حي</option>
      <option value="20">أعلى 20 حي</option>
      <option value="all">جميع الأحياء</option>
    </select>

    <button onclick="exportReport()" class="secondary">📤 تصدير التقرير</button>
    <button onclick="window.print()">🖨️ طباعة</button>
  </div>

  <!-- المحتوى -->
  <div class="reportContent">
    <!-- الإحصائيات -->
    <div class="statsGrid">
      <div class="statCard">
        <h3>إجمالي البلاغات</h3>
        <div class="number" id="totalReports">0</div>
      </div>
      <div class="statCard">
        <h3>عدد الأحياء</h3>
        <div class="number" id="totalDistricts">0</div>
      </div>
      <div class="statCard">
        <h3>أعلى حي</h3>
        <div class="number" id="topDistrict">-</div>
      </div>
    </div>

    <!-- الخريطة -->
    <div class="mapSection">
      <h2 class="sectionTitle">الخريطة التفاعلية</h2>
      <div id="map"></div>
    </div>

    <!-- الرسم البياني -->
    <div class="chartContainer">
      <h2 class="sectionTitle">توزيع البلاغات</h2>
      <div class="chartWrapper">
        <canvas id="chartCanvas"></canvas>
      </div>
    </div>

    <!-- الجدول -->
    <div class="tableSection">
      <h2 class="sectionTitle">تفاصيل الأحياء</h2>
      <table class="dataTable">
        <thead>
          <tr>
            <th>الترتيب</th>
            <th>الحي</th>
            <th>البلدية</th>
            <th>عدد البلاغات</th>
            <th>النسبة</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let map, districts = [], chart = null;
const COLORS = ["#667eea", "#764ba2", "#f093fb", "#f5576c", "#4facfe", "#00f2fe", "#43e97b", "#38f9d7", "#fa709a", "#fee140"];

// تحديد التاريخ
const today = new Date();
document.getElementById("reportDate").textContent = today.toLocaleDateString("ar-SA", { year: 'numeric', month: 'long', day: 'numeric' });

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 24.7136, lng: 46.6753 },
    zoom: 11,
    mapTypeId: "hybrid",
    mapTypeControl: true,
    fullscreenControl: true
  });
}

function importExcel() {
  const file = document.getElementById("excelFile").files[0];
  if (!file) { alert("اختر ملف Excel أولاً"); return; }

  document.getElementById("loading").style.display = "flex";

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

      processData(rows);
      document.getElementById("loading").style.display = "none";
      alert("تم استيراد البيانات بنجاح!");
    } catch (err) {
      document.getElementById("loading").style.display = "none";
      alert("خطأ في قراءة الملف");
    }
  };
  reader.readAsArrayBuffer(file);
}

function processData(rows) {
  districts = [];

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 3) continue;

    const lat = parseFloat(row[0]);
    const lng = parseFloat(row[1]);
    const name = String(row[2] || "").trim();
    const municipality = String(row[4] || "غير محددة").trim();

    if (isNaN(lat) || isNaN(lng) || !name) continue;

    // تجميع حسب الحي
    const existing = districts.find(d => d.name === name && d.municipality === municipality);
    if (existing) {
      existing.count++;
      existing.points.push({ lat, lng });
    } else {
      districts.push({
        name: name,
        municipality: municipality,
        count: 1,
        points: [{ lat, lng }],
        lat: lat,
        lng: lng
      });
    }
  }

  // ترتيب تنازلي
  districts.sort((a, b) => b.count - a.count);

  updateReport();
}

function updateReport() {
  const filterCount = document.getElementById("filterCount").value;
  let filtered = districts;

  if (filterCount !== "all") {
    filtered = districts.slice(0, parseInt(filterCount));
  }

  // تحديث الإحصائيات
  const total = filtered.reduce((sum, d) => sum + d.count, 0);
  document.getElementById("totalReports").textContent = total.toLocaleString();
  document.getElementById("totalDistricts").textContent = filtered.length;
  document.getElementById("topDistrict").textContent = filtered[0] ? filtered[0].name : "-";

  // تحديث الخريطة
  updateMap(filtered);

  // تحديث الجدول
  updateTable(filtered, total);

  // تحديث الرسم البياني
  updateChart(filtered);
}

function updateMap(data) {
  // مسح العلامات القديمة
  map.setZoom(11);

  const bounds = new google.maps.LatLngBounds();

  data.forEach((d, index) => {
    const color = COLORS[index % COLORS.length];

    // دائرة
    const circle = new google.maps.Circle({
      center: { lat: d.lat, lng: d.lng },
      radius: 500 + (d.count * 50),
      fillColor: color,
      fillOpacity: 0.5,
      strokeColor: color,
      strokeWeight: 2,
      map: map
    });

    // نافذة معلومات
    const info = new google.maps.InfoWindow({
      content: `<div style="text-align:center;padding:10px;"><h3>${d.name}</h3><p>البلدية: ${d.municipality}</p><p style="font-size:24px;font-weight:bold;color:${color};">${d.count}</p></div>`
    });

    circle.addListener('click', () => info.open(map, circle));
    bounds.extend({ lat: d.lat, lng: d.lng });
  });

  if (data.length > 0) map.fitBounds(bounds);
}

function updateTable(data, total) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach((d, index) => {
    const percentage = total > 0 ? ((d.count / total) * 100).toFixed(1) : 0;
    const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : 'normal';
    const countClass = d.count > 100 ? 'high' : d.count > 50 ? 'medium' : '';

    const row = `
      <tr>
        <td><span class="rank ${rankClass}">${index + 1}</span></td>
        <td>${d.name}</td>
        <td>${d.municipality}</td>
        <td><span class="countBadge ${countClass}">${d.count}</span></td>
        <td>${percentage}%</td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

function updateChart(data) {
  const ctx = document.getElementById("chartCanvas").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: data.map(d => d.name),
      datasets: [{
        data: data.map(d => d.count),
        backgroundColor: COLORS.slice(0, data.length),
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 } } }
      }
    }
  });
}

function exportReport() {
  document.getElementById("loading").style.display = "flex";

  setTimeout(() => {
    html2canvas(document.querySelector(".reportContainer"), {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff"
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = `تقرير_الأحياء_${new Date().toLocaleDateString('ar-SA')}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();

      document.getElementById("loading").style.display = "none";
    });
  }, 500);
}
</script>

<!-- 🔑 مفتاح Google Maps API - استبدل YOUR_API_KEY بمفتاحك -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=geometry&callback=initMap&language=ar&region=SA" async defer></script>

</body>
</html>
