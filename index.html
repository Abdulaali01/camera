<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء + الرسم البياني</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:tahoma;
background:#f5f7fb
}

#map{
height:100vh;
width:100%
}

.topPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.18);
padding:10px 12px;
z-index:10;
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
min-width:320px;
max-width:95%
}

.topPanel .group{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap
}

.topPanel .titleMini{
font-size:12px;
font-weight:bold;
color:#333
}

#searchBox{
width:240px;
padding:10px 12px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px
}

.fileInput{
padding:8px;
border:1px solid #ddd;
border-radius:10px;
background:#fff;
font-size:13px;
max-width:180px
}

select{
padding:9px 10px;
border-radius:10px;
border:1px solid #ccc;
font-size:13px;
min-width:150px
}

button{
padding:9px 14px;
border:none;
border-radius:10px;
background:#2d6cff;
color:#fff;
cursor:pointer;
font-size:13px;
font-weight:bold
}

</style>
</head>

<body>

<div class="topPanel">

<div class="group">
<input id="searchBox" placeholder="ابحث عن حي أو شارع">
</div>

<div class="group">
<span class="titleMini">الملف</span>
<input type="file" id="excelFile" class="fileInput" accept=".xlsx,.xls">
<button onclick="importExcel()">استيراد Excel</button>
</div>

<div class="group">
<span class="titleMini">الفلترة</span>
<select id="filterSelect" onchange="setFilter(this.value)">
<option value="all">عرض الكل</option>
<option value="top3">أعلى 3</option>
<option value="top3_2">ثاني أعلى 3</option>
<option value="top3_3">ثالث أعلى 3</option>
<option value="top3_4">رابع أعلى 3</option>
<option value="200">أكثر من 200</option>
<option value="100_200">من 100 إلى 200</option>
<option value="100">أقل من 100</option>
</select>
</div>

<div class="group">
<span class="titleMini">الأحياء</span>
<select id="districtList" onchange="selectDistrict(this.value)">
<option value="">كل الأحياء</option>
</select>
</div>

<div class="group">
<span class="titleMini">شكل الصندوق</span>
<select id="boxStyle">
<option value="square">الصندوق الحالي</option>
<option value="bars">الصندوق البياني</option>
</select>
</div>

<div class="group">
<button onclick="exportHDImage()">تصدير صورة HD</button>
</div>

</div>

<div id="map"></div>

<script>

let map
let districts={}
let polygons=[]
let overlays=[]
let currentFilter="all"
let selectedDistrict=""
let rankedDistricts=[]
let boxStyle="square"

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid"
})

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

if(place.geometry.viewport){
map.fitBounds(place.geometry.viewport)
}else{
map.setCenter(place.geometry.location)
map.setZoom(16)
}

})

}

function setFilter(type){

currentFilter=type
selectedDistrict=document.getElementById("districtList").value || ""

clearMap()
drawDistricts()

}

function selectDistrict(name){

selectedDistrict=name || ""
clearMap()
drawDistricts()

}

function clearMap(){

polygons.forEach(p=>p.setMap(null))
overlays.forEach(o=>o.setMap(null))

polygons=[]
overlays=[]

}

function convexHull(points){

points=points.slice()

points.sort((a,b)=>a.lng-b.lng||a.lat-b.lat)

const cross=(o,a,b)=>(
(a.lng-o.lng)*(b.lat-o.lat)-
(a.lat-o.lat)*(b.lng-o.lng)
)

let lower=[]

for(let p of points){

while(lower.length>=2 &&
cross(lower[lower.length-2],lower[lower.length-1],p)<=0){

lower.pop()

}

lower.push(p)

}

let upper=[]

for(let i=points.length-1;i>=0;i--){

let p=points[i]

while(upper.length>=2 &&
cross(upper[upper.length-2],upper[upper.length-1],p)<=0){

upper.pop()

}

upper.push(p)

}

upper.pop()
lower.pop()

return lower.concat(upper)

}

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

districts={}
clearMap()

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])
let district=(rows[i][2]??"").toString().trim()
let third=(rows[i][3]??"بدون تصنيف").toString().trim()

if(isNaN(lat) || isNaN(lng) || !district) continue

if(!districts[district]){

districts[district]={
points:[],
third:{}
}

}

districts[district].points.push({lat,lng})

if(!districts[district].third[third]){
districts[district].third[third]=0
}

districts[district].third[third]++

}

prepareRanks()
fillDistrictList()
drawDistricts()

}

reader.readAsArrayBuffer(file)

}

function prepareRanks(){

let arr=[]

for(let d in districts){

arr.push({
name:d,
count:districts[d].points.length
})

}

arr.sort((a,b)=>b.count-a.count)

rankedDistricts=arr

}

function fillDistrictList(){

let sel=document.getElementById("districtList")
sel.innerHTML='<option value="">كل الأحياء</option>'

let names=Object.keys(districts).sort((a,b)=>a.localeCompare(b,'ar'))

for(let name of names){

let opt=document.createElement("option")
opt.value=name
opt.textContent=name
sel.appendChild(opt)

}

}

function passesFilter(district,count){

if(selectedDistrict && district!==selectedDistrict) return false
if(currentFilter=="all") return true
if(currentFilter=="200" && count<=200) return false
if(currentFilter=="100_200" && (count<100 || count>200)) return false
if(currentFilter=="100" && count>=100) return false

return true

}

function createCountOverlay(position,count,district,data){

class CustomOverlay extends google.maps.OverlayView{

onAdd(){

this.div=document.createElement("div")

this.div.style.position="absolute"
this.div.style.background="#000"
this.div.style.color="#fff"
this.div.style.padding="8px 12px"
this.div.style.borderRadius="10px"
this.div.style.fontSize="12px"
this.div.style.textAlign="center"

let statsHTML=""
let max=0

for(let t in data.third){
if(data.third[t]>max) max=data.third[t]
}

if(boxStyle=="square"){

for(let t in data.third){

let val=data.third[t]
let squares=Math.round((val/max)*10)
let bar=""

for(let i=0;i<squares;i++){
bar+="<span style='width:6px;height:6px;background:#fff;display:inline-block;margin:1px'></span>"
}

statsHTML+=`
<div style="display:flex;align-items:center;gap:4px;justify-content:center">
<div style="min-width:45px">${t}</div>
<div>${bar}</div>
<div>${val}</div>
</div>
`

}

}else{

for(let t in data.third){

let val=data.third[t]
let height=Math.round((val/max)*60)

statsHTML+=`
<div style="display:inline-block;margin:0 4px">
<div style="height:${height}px;width:14px;background:#4caf50"></div>
<div>${val}</div>
<div>${t}</div>
</div>
`

}

}

this.div.innerHTML=
"<div style='font-size:18px;font-weight:bold'>"+count+"</div>"+
"<div style='font-size:13px;margin-top:2px'>"+district+"</div>"+
"<div>"+statsHTML+"</div>"

this.getPanes().overlayMouseTarget.appendChild(this.div)

}

draw(){

let projection=this.getProjection()

let pos=projection.fromLatLngToDivPixel(
new google.maps.LatLng(position.lat,position.lng)
)

this.div.style.left=(pos.x-60)+"px"
this.div.style.top=(pos.y-140)+"px"

}

}

let overlay=new CustomOverlay()
overlay.setMap(map)
overlays.push(overlay)

}

function drawDistricts(){

let index=0

for(let district in districts){

let data=districts[district]
let count=data.points.length

if(!passesFilter(district,count)) continue
if(count<3) continue

let color=COLORS[index%COLORS.length]
index++

let hull=convexHull(data.points)

if(!hull || hull.length<3) continue

let polygon=new google.maps.Polygon({
paths:hull,
strokeColor:"#ffffff",
strokeWeight:8,
fillColor:color,
fillOpacity:0.35,
map:map
})

polygons.push(polygon)

let lat=0
let lng=0

hull.forEach(p=>{
lat+=p.lat
lng+=p.lng
})

let center={
lat:lat/hull.length,
lng:lng/hull.length
}

createCountOverlay(center,count,district,data)

}

}

function exportHDImage(){

boxStyle=document.getElementById("boxStyle").value

clearMap()
drawDistricts()

setTimeout(function(){

html2canvas(document.getElementById("map"),{
scale:4,
useCORS:true
}).then(canvas=>{

let link=document.createElement("a")
link.download="map_hd.png"
link.href=canvas.toDataURL("image/png")
link.click()

})

},400)

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
