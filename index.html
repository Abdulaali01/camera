<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حساب مساحة الحي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:tahoma;
background:#f2f2f2;
text-align:center;
padding:20px;
}

#map{
height:500px;
border-radius:10px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
}

.box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="box">

<h3>📐 حساب مساحة الحي</h3>

<button onclick="calc()">حساب المساحة</button>
<button onclick="clearMap()">مسح</button>

<h3 id="result"></h3>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map=L.map('map').setView([21.2700,40.4150],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var points=[];
var polygon;

map.on('click',function(e){

points.push([e.latlng.lat,e.latlng.lng]);

if(polygon){
map.removeLayer(polygon);
}

polygon=L.polygon(points,{color:'red'}).addTo(map);

});

function calc(){

if(points.length<3){
alert("حدد 3 نقاط على الأقل");
return;
}

var area=0;

for(var i=0;i<points.length;i++){

var j=(i+1)%points.length;

area+=points[i][1]*points[j][0];
area-=points[j][1]*points[i][0];

}

area=Math.abs(area/2)*12300000000;

var km=area/1000000;

document.getElementById("result").innerHTML=
"المساحة: "+area.toFixed(0)+" متر مربع<br>"+
"المساحة: "+km.toFixed(2)+" كم²";

}

function clearMap(){

points=[];

if(polygon){
map.removeLayer(polygon);
}

document.getElementById("result").innerHTML="";

}

</script>

</body>
</html>
