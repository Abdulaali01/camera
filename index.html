<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{margin:0;font-family:tahoma}

#map{height:100vh;width:100%}

.panel{
position:absolute;
top:20px;
right:20px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<div class="panel">

<input type="file" id="excelFile" accept=".xlsx,.xls">
<br>

<button onclick="importExcel()">استيراد Excel</button>
<button onclick="exportExcel()">تصدير Excel</button>

</div>

<div id="map"></div>

<script>

let map
let groups={}
let circles=[]
let labels=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid"
})

}

/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

let points=[]

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])

if(!isNaN(lat)&&!isNaN(lng)){

points.push({lat:lat,lng:lng})

}

}

zoomToPoints(points)

groupByDistrict(points)

}

reader.readAsArrayBuffer(file)

}

/* تقريب الخريطة */

function zoomToPoints(points){

let bounds=new google.maps.LatLngBounds()

points.forEach(p=>{
bounds.extend(p)
})

map.fitBounds(bounds)

}

/* جلب اسم الحي */

async function getDistrict(lat,lng){

let url=
"https://maps.googleapis.com/maps/api/geocode/json?latlng="
+lat+","+lng+
"&key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y"

let r=await fetch(url)

let data=await r.json()

let district="غير معروف"

if(data.results.length){

data.results[0].address_components.forEach(c=>{

if(
c.types.includes("sublocality") ||
c.types.includes("neighborhood")
){
district=c.long_name
}

})

}

return district

}

/* تجميع حسب الحي */

async function groupByDistrict(points){

groups={}

circles.forEach(c=>c.setMap(null))
labels.forEach(l=>l.setMap(null))

circles=[]
labels=[]

for(let p of points){

let district=await getDistrict(p.lat,p.lng)

if(!groups[district]){

groups[district]={
center:p,
points:[]
}

}

groups[district].points.push(p)

}

drawDistricts()

}

/* رسم الدوائر */

function drawDistricts(){

let total=0

Object.values(groups).forEach(g=>{
total+=g.points.length
})

Object.keys(groups).forEach((name,i)=>{

let g=groups[name]

let color=COLORS[i%COLORS.length]

let percent=Math.round((g.points.length/total)*100)

let radius=150+g.points.length*40

let circle=new google.maps.Circle({

strokeColor:color,
fillColor:color,
fillOpacity:0.35,
map:map,
center:g.center,
radius:radius

})

circles.push(circle)

/* النص داخل الدائرة */

let label=new google.maps.Marker({

position:g.center,

map:map,

icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:0
},

label:{
text:
name+"\n"+
g.points.length+"\n"+
percent+"%",
color:"#000",
fontSize:"14px",
fontWeight:"bold"
}

})

labels.push(label)

})

}

/* تصدير Excel */

async function exportExcel(){

let workbook=new ExcelJS.Workbook()

let sheet=workbook.addWorksheet("Districts")

sheet.columns=[

{header:"District",key:"district",width:25},
{header:"Count",key:"count",width:10}

]

Object.keys(groups).forEach(name=>{

sheet.addRow({
district:name,
count:groups[name].points.length
})

})

const buffer=await workbook.xlsx.writeBuffer()

let link=document.createElement("a")

link.href=URL.createObjectURL(new Blob([buffer]))

link.download="district_report.xlsx"

link.click()

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=geometry&callback=initMap">
</script>

</body>
</html>
