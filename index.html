<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء + الرسم البياني</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

html,body{
height:100%;
margin:0;
font-family:tahoma;
background:#f5f7fb
}

body{
overflow:hidden
}

#map{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1
}

/* الشريط العلوي */
.topPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.18);
padding:10px 12px;
z-index:30;
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
min-width:320px;
max-width:95%
}

.topPanel .group{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap
}

.topPanel .titleMini{
font-size:12px;
font-weight:bold;
color:#333;
margin-inline:2px
}

#searchBox{
width:240px;
padding:10px 12px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
outline:none;
font-size:14px
}

.fileInput{
padding:8px;
border:1px solid #ddd;
border-radius:10px;
background:#fff;
font-size:13px;
max-width:180px
}

select{
padding:9px 10px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
font-size:13px;
min-width:150px;
outline:none
}

button{
padding:9px 14px;
border:none;
border-radius:10px;
background:#2d6cff;
color:#fff;
cursor:pointer;
font-size:13px;
font-weight:bold
}

button:hover{
opacity:.92
}

/* صندوق الرسم البياني */
#globalChartPanel{
position:absolute;
left:10px;
bottom:10px;
width:460px;
height:360px;
max-height:80vh;
background:rgba(0,0,0,.90);
color:#fff;
border-radius:16px;
box-shadow:0 10px 28px rgba(0,0,0,.35);
padding:14px;
z-index:25;
resize:both;
overflow:auto;
cursor:move;
touch-action:none;
box-sizing:border-box
}

#globalChartPanel h3{
margin:0 0 10px 0;
font-size:15px;
text-align:center
}

#globalChartWrap{
background:#fff;
border-radius:12px;
padding:10px
}

#globalChart{
width:100% !important;
height:260px !important
}

#globalStats{
margin-top:10px;
display:flex;
flex-direction:column;
gap:6px
}

.globalRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
padding:6px 8px;
background:rgba(255,255,255,.08);
border-radius:8px;
font-size:12px
}

.globalRow .name{
font-weight:bold;
flex:1;
white-space:normal;
line-height:1.5
}

.globalRow .value{
font-weight:bold;
min-width:38px;
text-align:center
}

.globalRow .barWrap{
flex:1.4;
height:10px;
background:rgba(255,255,255,.15);
border-radius:999px;
overflow:hidden
}

.globalRow .barFill{
height:100%;
border-radius:999px
}

/* صندوق جدول الأحياء */
#districtPanel{
position:absolute;
right:10px;
bottom:10px;
width:380px;
height:360px;
max-height:80vh;
background:rgba(0,0,0,.90);
color:#fff;
border-radius:16px;
box-shadow:0 10px 28px rgba(0,0,0,.35);
padding:14px;
z-index:25;
resize:both;
overflow:auto;
cursor:move;
touch-action:none;
box-sizing:border-box
}

#districtPanel h3{
margin:0 0 10px 0;
font-size:15px;
text-align:center
}

#districtTable{
background:#fff;
border-radius:12px;
overflow:hidden;
color:#000
}

#districtTable table{
width:100%;
border-collapse:collapse
}

#districtTable th{
background:#2d6cff;
color:#fff;
padding:8px 6px;
font-size:12px;
position:sticky;
top:0;
z-index:1
}

#districtTable td{
padding:7px 6px;
border-bottom:1px solid #eee;
text-align:center;
font-size:12px
}

.colorBox{
width:18px;
height:18px;
border-radius:4px;
margin:auto;
border:1px solid rgba(0,0,0,.15)
}

/* للجوال */
@media (max-width:900px){

.topPanel{
width:95%;
padding:10px;
top:8px
}

#searchBox{
width:100%
}

.topPanel .group{
width:100%
}

.fileInput,
select,
button{
width:100%
}

#globalChartPanel{
left:8px;
right:8px;
width:auto;
bottom:8px;
max-height:38vh;
padding:10px
}

#districtPanel{
left:8px;
right:8px;
width:auto;
top:8px;
bottom:auto;
max-height:34vh;
padding:10px
}

#globalChart{
height:220px !important
}

}
</style>
</head>

<body>

<div class="topPanel">

<div class="group">
<input id="searchBox" placeholder="ابحث عن حي أو شارع">
</div>

<div class="group">
<span class="titleMini">الملف</span>
<input type="file" id="excelFile" class="fileInput" accept=".xlsx,.xls">
<button onclick="importExcel()">استيراد Excel</button>
</div>

<div class="group">
<span class="titleMini">الفلترة</span>
<select id="filterSelect" onchange="setFilter(this.value)">
<option value="all">عرض الكل</option>
<option value="top3">أعلى 3</option>
<option value="top3_2">ثاني أعلى 3</option>
<option value="top3_3">ثالث أعلى 3</option>
<option value="top3_4">رابع أعلى 3</option>
<option value="200">أكثر من 200</option>
<option value="100_200">من 100 إلى 200</option>
<option value="100">أقل من 100</option>
</select>
</div>

<div class="group">
<span class="titleMini">الأحياء</span>
<select id="districtList" onchange="selectDistrict(this.value)">
<option value="">كل الأحياء</option>
</select>
</div>

<div class="group">
<button onclick="exportHDImage()">تصدير صورة HD</button>
</div>

</div>

<div id="map"></div>

<div id="globalChartPanel">
<h3>الرسم البياني لتصنيفات العمود الرابع</h3>
<div id="globalChartWrap">
<canvas id="globalChart"></canvas>
</div>
<div id="globalStats"></div>
</div>

<div id="districtPanel">
<h3>جدول الأحياء</h3>
<div id="districtTable"></div>
</div>

<script>

let map
let districts={}
let polygons=[]
let currentFilter="all"
let selectedDistrict=""
let rankedDistricts=[]
let globalChart=null
let districtColorMap={}

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a",
"#e91e63",
"#795548",
"#673ab7",
"#3f51b5",
"#009688",
"#ff9800",
"#607d8b",
"#cddc39",
"#f44336"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid",
gestureHandling:"greedy"
})

const input=document.getElementById("searchBox")

const autocomplete=new google.maps.places.Autocomplete(
input,
{componentRestrictions:{country:"sa"}}
)

autocomplete.bindTo("bounds",map)

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace()

if(!place.geometry)return

if(place.geometry.viewport){
map.fitBounds(place.geometry.viewport)
}else{
map.setCenter(place.geometry.location)
map.setZoom(16)
}

})

}

function setFilter(type){
currentFilter=type
selectedDistrict=document.getElementById("districtList").value || ""
clearMap()
drawDistricts()
updateGlobalChart()
updateDistrictTable()
}

function selectDistrict(name){
selectedDistrict=name || ""
clearMap()
drawDistricts()
updateGlobalChart()
updateDistrictTable()
}

function clearMap(){
polygons.forEach(p=>p.setMap(null))
polygons=[]
}

function convexHull(points){

points=points.slice()

if(points.length < 3) return points

points.sort((a,b)=>a.lng-b.lng||a.lat-b.lat)

const cross=(o,a,b)=>(
(a.lng-o.lng)*(b.lat-o.lat)-
(a.lat-o.lat)*(b.lng-o.lng)
)

let lower=[]

for(let p of points){
while(lower.length>=2 &&
cross(lower[lower.length-2],lower[lower.length-1],p)<=0){
lower.pop()
}
lower.push(p)
}

let upper=[]

for(let i=points.length-1;i>=0;i--){
let p=points[i]
while(upper.length>=2 &&
cross(upper[upper.length-2],upper[upper.length-1],p)<=0){
upper.pop()
}
upper.push(p)
}

upper.pop()
lower.pop()

return lower.concat(upper)
}

function importExcel(){

let file=document.getElementById("excelFile").files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)
let workbook=XLSX.read(data,{type:"array"})
let sheet=workbook.Sheets[workbook.SheetNames[0]]
let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

districts={}
districtColorMap={}
clearMap()

let bounds=new google.maps.LatLngBounds()
let hasValidPoint=false

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])
let district=(rows[i][2]??"").toString().trim()

let category=rows[i][3]
if(!category || category.toString().trim()==""){
category="بدون تصنيف"
}else{
category=category.toString().trim()
}

if(isNaN(lat) || isNaN(lng) || !district) continue

bounds.extend({lat:lat,lng:lng})
hasValidPoint=true

if(!districts[district]){
districts[district]={
points:[],
third:{}
}
}

districts[district].points.push({lat,lng})

if(!districts[district].third[category]){
districts[district].third[category]=0
}

districts[district].third[category]++
}

prepareRanks()
assignDistrictColors()
fillDistrictList()
drawDistricts()
updateGlobalChart()
updateDistrictTable()

if(hasValidPoint){
map.fitBounds(bounds)
}

}

reader.readAsArrayBuffer(file)
}

function prepareRanks(){

let arr=[]

for(let d in districts){
arr.push({
name:d,
count:districts[d].points.length
})
}

arr.sort((a,b)=>b.count-a.count)
rankedDistricts=arr
}

function assignDistrictColors(){

let names=Object.keys(districts).sort((a,b)=>a.localeCompare(b,'ar'))

names.forEach((name,index)=>{
districtColorMap[name]=COLORS[index % COLORS.length]
})
}

function fillDistrictList(){

let sel=document.getElementById("districtList")
sel.innerHTML='<option value="">كل الأحياء</option>'

let names=Object.keys(districts).sort((a,b)=>a.localeCompare(b,'ar'))

for(let name of names){
let opt=document.createElement("option")
opt.value=name
opt.textContent=name
sel.appendChild(opt)
}

sel.value=selectedDistrict || ""
}

function getTopGroupNames(groupNumber){
let start=(groupNumber-1)*3
let end=start+3
return rankedDistricts.slice(start,end).map(x=>x.name)
}

function passesFilter(district,count){

if(selectedDistrict && district!==selectedDistrict) return false

if(currentFilter=="all") return true

if(currentFilter=="top3"){
return getTopGroupNames(1).includes(district)
}

if(currentFilter=="top3_2"){
return getTopGroupNames(2).includes(district)
}

if(currentFilter=="top3_3"){
return getTopGroupNames(3).includes(district)
}

if(currentFilter=="top3_4"){
return getTopGroupNames(4).includes(district)
}

if(currentFilter=="200" && count<=200) return false
if(currentFilter=="100_200" && (count<100 || count>200)) return false
if(currentFilter=="100" && count>=100) return false

return true
}

function drawDistricts(){

let visibleBounds=new google.maps.LatLngBounds()
let hasVisible=false

for(let district in districts){

let data=districts[district]
let count=data.points.length

if(!passesFilter(district,count)) continue
if(count<1) continue

let color=districtColorMap[district] || COLORS[0]
let hull=data.points.length >= 3 ? convexHull(data.points) : data.points.slice()

if(!hull || hull.length===0) continue

if(hull.length >= 3){

let polygonWhite=new google.maps.Polygon({
paths:hull,
strokeColor:"#ffffff",
strokeWeight:8,
fillColor:color,
fillOpacity:0.35,
map:map
})
polygons.push(polygonWhite)

let polygonColor=new google.maps.Polygon({
paths:hull,
strokeColor:color,
strokeWeight:4,
fillOpacity:0,
map:map
})
polygons.push(polygonColor)

}else if(hull.length===2){

let line=new google.maps.Polyline({
path:hull,
strokeColor:color,
strokeWeight:5,
map:map
})
polygons.push(line)

}else if(hull.length===1){

let circle=new google.maps.Circle({
strokeColor:color,
strokeWeight:3,
fillColor:color,
fillOpacity:0.35,
map:map,
center:hull[0],
radius:20
})
polygons.push(circle)

}

hull.forEach(p=>{
visibleBounds.extend({lat:p.lat,lng:p.lng})
hasVisible=true
})
}

if(hasVisible){
map.fitBounds(visibleBounds)
}
}

function getVisibleCategoryEntries(){

let categoryCount={}

for(let district in districts){

let data=districts[district]
let count=data.points.length

if(!passesFilter(district,count)) continue

for(let cat in data.third){
if(!categoryCount[cat]){
categoryCount[cat]=0
}
categoryCount[cat]+=data.third[cat]
}

}

let arr=[]

for(let k in categoryCount){
arr.push({
name:k,
count:categoryCount[k]
})
}

arr.sort((a,b)=>b.count-a.count)
return arr
}

function updateGlobalChart(){

let entries=getVisibleCategoryEntries()
let labels=entries.map(x=>x.name)
let values=entries.map(x=>x.count)

let canvas=document.getElementById("globalChart")
let statsBox=document.getElementById("globalStats")

if(globalChart){
globalChart.destroy()
globalChart=null
}

if(entries.length===0){
statsBox.innerHTML='<div class="globalRow"><div class="name">لا توجد بيانات مطابقة للفلترة</div></div>'
return
}

globalChart=new Chart(canvas,{
type:"bar",
data:{
labels:labels.map(t=>t.split(" ")),
datasets:[{
label:"عدد البلاغات",
data:values,
backgroundColor:labels.map((_,i)=>COLORS[i%COLORS.length]),
borderRadius:6
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
display:false
},
tooltip:{
rtl:true,
bodyFont:{family:"Tahoma"},
titleFont:{family:"Tahoma"}
}
},
scales:{
x:{
ticks:{
color:"#000",
font:{family:"Tahoma",size:11},
maxRotation:45,
minRotation:30
},
grid:{
display:false
}
},
y:{
beginAtZero:true,
ticks:{
color:"#000",
font:{family:"Tahoma",size:11}
}
}
}
}
})

let max=Math.max(...values)
let html=""

for(let i=0;i<entries.length;i++){

let item=entries[i]
let percent=max>0 ? (item.count/max)*100 : 0
let color=COLORS[i%COLORS.length]

html+=`
<div class="globalRow">
<div class="name">${item.name}</div>
<div class="barWrap">
<div class="barFill" style="width:${percent}%;background:${color}"></div>
</div>
<div class="value">${item.count}</div>
</div>
`
}

statsBox.innerHTML=html
}

function updateDistrictTable(){

let html=`
<table>
<tr>
<th>اللون</th>
<th>اسم الحي</th>
<th>عدد البلاغات</th>
</tr>
`

let visibleList=[]

for(let district in districts){

let count=districts[district].points.length

if(!passesFilter(district,count)) continue

visibleList.push({
name:district,
count:count,
color:districtColorMap[district] || COLORS[0]
})
}

visibleList.sort((a,b)=>b.count-a.count)

for(let item of visibleList){
html+=`
<tr>
<td><div class="colorBox" style="background:${item.color}"></div></td>
<td>${item.name}</td>
<td>${item.count}</td>
</tr>
`
}

html+=`</table>`

document.getElementById("districtTable").innerHTML=html
}

function exportHDImage(){

clearMap()
drawDistricts()
updateGlobalChart()
updateDistrictTable()

setTimeout(function(){

html2canvas(document.body,{
scale:4,
useCORS:true,
backgroundColor:null
}).then(canvas=>{

let link=document.createElement("a")
link.download="map_hd.png"
link.href=canvas.toDataURL("image/png")
link.click()

})

},600)
}

function makePanelDraggable(panelId){

let panel=document.getElementById(panelId)
let dragging=false
let offsetX=0
let offsetY=0

panel.addEventListener("mousedown",function(e){
dragging=true
offsetX=e.clientX-panel.offsetLeft
offsetY=e.clientY-panel.offsetTop
})

document.addEventListener("mousemove",function(e){
if(!dragging)return
panel.style.left=(e.clientX-offsetX)+"px"
panel.style.top=(e.clientY-offsetY)+"px"
panel.style.right="auto"
panel.style.bottom="auto"
})

document.addEventListener("mouseup",function(){
dragging=false
})

panel.addEventListener("touchstart",function(e){
dragging=true
let touch=e.touches[0]
offsetX=touch.clientX-panel.offsetLeft
offsetY=touch.clientY-panel.offsetTop
e.preventDefault()
},{passive:false})

document.addEventListener("touchmove",function(e){
if(!dragging)return
let touch=e.touches[0]
panel.style.left=(touch.clientX-offsetX)+"px"
panel.style.top=(touch.clientY-offsetY)+"px"
panel.style.right="auto"
panel.style.bottom="auto"
e.preventDefault()
},{passive:false})

document.addEventListener("touchend",function(){
dragging=false
})
}

makePanelDraggable("globalChartPanel")
makePanelDraggable("districtPanel")

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places&callback=initMap">
</script>

</body>
</html>
