<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل الأحياء - أعمدة</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{
margin:0;
font-family:tahoma;
background:#f5f7fb
}

#map{
height:100vh;
width:100%
}

.topPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.18);
padding:10px;
z-index:10;
display:flex;
gap:6px;
flex-wrap:wrap;
}

input,select,button{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
font-size:13px
}

button{
background:#2d6cff;
color:#fff;
border:none;
cursor:pointer
}

</style>
</head>

<body>

<div class="topPanel">

<input type="file" id="excelFile" accept=".xlsx,.xls">
<button onclick="importExcel()">استيراد</button>

<select id="filterSelect" onchange="setFilter(this.value)">
<option value="all">الكل</option>
<option value="200">أكثر من 200</option>
<option value="100_200">100 - 200</option>
<option value="100">أقل من 100</option>
</select>

</div>

<div id="map"></div>

<script>

let map
let districts={}
let overlays=[]
let currentFilter="all"

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:21.4373,lng:40.5127},
zoom:12,
mapTypeId:"hybrid"
})

}

function setFilter(type){
currentFilter=type
clearMap()
drawDistricts()
}

function clearMap(){
overlays.forEach(o=>o.setMap(null))
overlays=[]
}

function importExcel(){

let file=document.getElementById("excelFile").files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)
let workbook=XLSX.read(data,{type:"array"})
let sheet=workbook.Sheets[workbook.SheetNames[0]]
let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

districts={}

let bounds=new google.maps.LatLngBounds()

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])
let district=(rows[i][2]||"").toString().trim()

if(isNaN(lat)||isNaN(lng)||!district) continue

bounds.extend({lat,lng})

if(!districts[district]){
districts[district]={points:[]}
}

districts[district].points.push({lat,lng})

}

map.fitBounds(bounds)
drawDistricts()

}

reader.readAsArrayBuffer(file)

}

function passesFilter(count){

if(currentFilter=="all") return true
if(currentFilter=="200" && count<=200) return false
if(currentFilter=="100_200" && (count<100 || count>200)) return false
if(currentFilter=="100" && count>=100) return false

return true
}

function createColumn(position,count){

class ColumnOverlay extends google.maps.OverlayView{

onAdd(){

this.canvas=document.createElement("canvas")
this.canvas.width=40
this.canvas.height=120

this.ctx=this.canvas.getContext("2d")

this.getPanes().overlayLayer.appendChild(this.canvas)

}

draw(){

let projection=this.getProjection()
let pos=projection.fromLatLngToDivPixel(
new google.maps.LatLng(position.lat,position.lng)
)

// 🔥 ضبط الارتفاع بشكل ذكي
let maxHeight=100
let height=Math.min(maxHeight, count)

// 🔥 لون حسب الكثافة
let color="#4caf50"
if(count>100) color="#ffc107"
if(count>200) color="#ff5722"

this.ctx.clearRect(0,0,40,120)

// العمود
this.ctx.fillStyle=color
this.ctx.fillRect(15,120-height,12,height)

// ظل
this.ctx.fillStyle="rgba(0,0,0,.2)"
this.ctx.fillRect(27,120-height,5,height)

// رقم فوق العمود
this.ctx.fillStyle="#000"
this.ctx.font="bold 12px Tahoma"
this.ctx.textAlign="center"
this.ctx.fillText(count,20,120-height-5)

this.canvas.style.position="absolute"
this.canvas.style.left=(pos.x-20)+"px"
this.canvas.style.top=(pos.y-120)+"px"

}

onRemove(){

if(this.canvas){
this.canvas.remove()
this.canvas=null
}

}

}

let overlay=new ColumnOverlay()
overlay.setMap(map)
overlays.push(overlay)

}

function drawDistricts(){

let bounds=new google.maps.LatLngBounds()
let has=false

for(let district in districts){

let points=districts[district].points
let count=points.length

if(!passesFilter(count)) continue

let lat=0,lng=0

points.forEach(p=>{
lat+=p.lat
lng+=p.lng
bounds.extend(p)
has=true
})

let center={
lat:lat/points.length,
lng:lng/points.length
}

// 🔥 رسم العمود
createColumn(center,count)

}

if(has){
map.fitBounds(bounds)
}

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&callback=initMap">
</script>

</body>
</html>
