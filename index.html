<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل المواقع</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>

body{margin:0;font-family:tahoma}

#map{height:100vh;width:100%}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
background:#fff;
font-size:16px;
z-index:5
}

.panel{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="panel">

<input type="file" id="excelFile" accept=".xlsx,.xls">
<br>

<button onclick="importExcel()">استيراد Excel</button>
<button onclick="exportExcel()">تصدير Excel</button>

</div>

<div id="map"></div>

<script>

let map
let groups=[]
let markers=[]
let circles=[]

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a"
]

function initMap(){

map=new google.maps.Map(
document.getElementById("map"),
{
center:{lat:21.4373,lng:40.5127},
zoom:13,
mapTypeId:"hybrid"
})

}

/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

let points=[]

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0])
let lng=parseFloat(rows[i][1])

if(!isNaN(lat)&&!isNaN(lng)){
points.push({lat:lat,lng:lng})
}

}

/* التقريب التلقائي */

zoomToPoints(points)

groupPoints(points)

}

reader.readAsArrayBuffer(file)

}

/* تقريب الخريطة */

function zoomToPoints(points){

let bounds=new google.maps.LatLngBounds()

points.forEach(p=>{
bounds.extend(p)
})

map.fitBounds(bounds)

}

/* حساب المسافة */

function distance(a,b){

const R=6371000

const dLat=(b.lat-a.lat)*Math.PI/180
const dLng=(b.lng-a.lng)*Math.PI/180

const lat1=a.lat*Math.PI/180
const lat2=b.lat*Math.PI/180

const x=Math.sin(dLat/2)**2+
Math.sin(dLng/2)**2*Math.cos(lat1)*Math.cos(lat2)

const c=2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))

return R*c

}

/* التجميع */

function groupPoints(points){

groups=[]

markers.forEach(m=>m.setMap(null))
circles.forEach(c=>c.setMap(null))

markers=[]
circles=[]

points.forEach(p=>{

let added=false

for(let g of groups){

if(distance(p,g.center)<=100){
g.points.push(p)
added=true
break
}

}

if(!added){
groups.push({
center:p,
points:[p]
})
}

})

drawGroups()

}

/* رسم الدوائر */

function drawGroups(){

let totalPoints=0

groups.forEach(g=>{
totalPoints+=g.points.length
})

groups.forEach((g,i)=>{

let color=COLORS[i%COLORS.length]

/* النقاط */

g.points.forEach(p=>{

let m=new google.maps.Marker({
position:p,
map:map
})

markers.push(m)

})

/* الدائرة */

let c=new google.maps.Circle({

strokeColor:color,
fillColor:color,
fillOpacity:.25,
map:map,
center:g.center,
radius:100

})

circles.push(c)

/* النسبة */

let percent=Math.round((g.points.length/totalPoints)*100)

/* النص داخل الدائرة */

let labelMarker=new google.maps.Marker({

position:g.center,

map:map,

label:{
text:g.points.length+" ("+percent+"%)",
color:"#000",
fontSize:"12px",
fontWeight:"bold"
}

})

markers.push(labelMarker)

})

}

/* تصدير Excel */

async function exportExcel(){

let workbook=new ExcelJS.Workbook()
let sheet=workbook.addWorksheet("Map")

sheet.columns=[
{header:"Group",key:"group",width:10},
{header:"Latitude",key:"lat",width:18},
{header:"Longitude",key:"lng",width:18}
]

for(let i=0;i<groups.length;i++){

let g=groups[i]

for(let p of g.points){

sheet.addRow({
group:i+1,
lat:p.lat,
lng:p.lng
})

}

}

const buffer=await workbook.xlsx.writeBuffer()

let link=document.createElement("a")

link.href=URL.createObjectURL(new Blob([buffer]))

link.download="map_report.xlsx"

link.click()

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places,geometry&callback=initMap">
</script>

</body>
</html>
