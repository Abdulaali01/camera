<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>حساب المساحة</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:tahoma
}

#map{
height:100vh;
width:100%;
}

#searchBox{

position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
z-index:5;
background:#fff;
font-size:16px

}

.box{

position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5

}

button{

margin-top:8px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer

}

</style>

</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="box">

المساحة: <span id="area">0</span> متر²
<br>

المساحة: <span id="areaKm">0</span> كم²
<br>

<button onclick="exportExcel()">تصدير Excel</button>

</div>

<div id="map"></div>


<script>

let map;
let polygon=null;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{

center:{lat:21.4373,lng:40.5127},
zoom:13,
mapTypeId:"satellite"

});


/* البحث */

const input=document.getElementById("searchBox");

const autocomplete=new google.maps.places.Autocomplete(input,{
componentRestrictions:{country:"sa"}
});

autocomplete.bindTo("bounds",map);

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace();

if(!place.geometry) return;

map.panTo(place.geometry.location);
map.setZoom(17);

});


/* الرسم */

const drawingManager=new google.maps.drawing.DrawingManager({

drawingMode:null,

drawingControl:true,

drawingControlOptions:{
position:google.maps.ControlPosition.LEFT_CENTER,
drawingModes:["polygon"]
}

});

drawingManager.setMap(map);


google.maps.event.addListener(drawingManager,'overlaycomplete',function(e){

if(polygon) polygon.setMap(null);

polygon=e.overlay;

updateArea();

polygon.getPath().addListener("set_at",updateArea);
polygon.getPath().addListener("insert_at",updateArea);

});

}


/* حساب المساحة */

function updateArea(){

if(!polygon) return;

let area=google.maps.geometry.spherical.computeArea(
polygon.getPath()
);

document.getElementById("area").innerHTML=Math.round(area);

document.getElementById("areaKm").innerHTML=(area/1000000).toFixed(4);

}


/* تصدير Excel */

function exportExcel(){

if(!polygon) return alert("ارسم المساحة أولاً");

let path=polygon.getPath();

let data=[];

for(let i=0;i<path.getLength();i++){

let point=path.getAt(i);

data.push({
Latitude:point.lat(),
Longitude:point.lng()
});

}

let area=document.getElementById("area").innerText;
let areaKm=document.getElementById("areaKm").innerText;

data.push({});
data.push({Latitude:"المساحة متر²",Longitude:area});
data.push({Latitude:"المساحة كم²",Longitude:areaKm});

let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Area");

XLSX.writeFile(wb,"area_result.xlsx");

}

</script>


<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places,drawing,geometry&callback=initMap">
</script>


</body>
</html>
