<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تحليل البلاغات الجغرافية</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{margin:0;font-family:tahoma}

#map{height:100vh;width:100%}

#searchBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
z-index:5;
background:#fff;
font-size:16px
}

.box{
position:absolute;
top:60px;
right:10px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,.3);
z-index:5
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2d6cff;
color:#fff;
cursor:pointer
}

</style>

</head>

<body>

<input id="searchBox" placeholder="ابحث عن حي أو شارع">

<div class="box">

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br>

<button onclick="importExcel()">استيراد Excel</button>

<button onclick="exportPDF()">تصدير PDF</button>

</div>

<div id="map"></div>

<script>

let map;

let groups=[];

const COLORS=[
"#ff5722",
"#4caf50",
"#2196f3",
"#9c27b0",
"#ffc107",
"#00bcd4",
"#8bc34a"
];

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{

center:{lat:21.4373,lng:40.5127},
zoom:13,
mapTypeId:"hybrid"

});


/* البحث */

const input=document.getElementById("searchBox");

const autocomplete=new google.maps.places.Autocomplete(input,{
componentRestrictions:{country:"sa"}
});

autocomplete.bindTo("bounds",map);

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace();

if(!place.geometry) return;

map.panTo(place.geometry.location);
map.setZoom(17);

});

}


/* استيراد Excel */

function importExcel(){

let file=document.getElementById("excelFile").files[0];

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:"array"});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let rows=XLSX.utils.sheet_to_json(sheet,{header:1});

let points=[];

for(let i=1;i<rows.length;i++){

let lat=parseFloat(rows[i][0]);
let lng=parseFloat(rows[i][1]);

if(!isNaN(lat)&&!isNaN(lng)){

points.push({lat:lat,lng:lng});

}

}

groupPoints(points);

};

reader.readAsArrayBuffer(file);

}


/* حساب المسافة */

function distance(a,b){

const R=6371000;

const dLat=(b.lat-a.lat)*Math.PI/180;
const dLng=(b.lng-a.lng)*Math.PI/180;

const lat1=a.lat*Math.PI/180;
const lat2=b.lat*Math.PI/180;

const x=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.sin(dLng/2)*Math.sin(dLng/2)*Math.cos(lat1)*Math.cos(lat2);

const c=2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));

return R*c;

}


/* التجميع */

function groupPoints(points){

groups=[];

points.forEach(p=>{

let added=false;

for(let g of groups){

if(distance(p,g.center)<=100){

g.points.push(p);
added=true;
break;

}

}

if(!added){

groups.push({center:p,points:[p]});

}

});


drawGroups();

}


/* رسم المجموعات */

function drawGroups(){

groups.forEach((g,i)=>{

let color=COLORS[i%COLORS.length];

g.points.forEach(p=>{

new google.maps.Marker({
position:p,
map:map,
icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:6,
fillColor:color,
fillOpacity:1,
strokeWeight:1
}
});

});


new google.maps.Circle({

strokeColor:color,
strokeOpacity:0.9,
strokeWeight:2,
fillColor:color,
fillOpacity:0.25,
map:map,
center:g.center,
radius:100

});


/* رقم المجموعة */

new google.maps.Marker({

position:g.center,
map:map,
label:{
text:String(i+1),
color:"#fff",
fontSize:"14px",
fontWeight:"bold"
}

});


/* اسم الحي */

let geocoder=new google.maps.Geocoder();

geocoder.geocode({location:g.center},function(res){

if(res[0]){

new google.maps.InfoWindow({
content:"المجموعة "+(i+1)+"<br>"+res[0].formatted_address,
position:g.center
}).open(map);

}

});

});

}


/* تصدير PDF */

async function exportPDF(){

const {jsPDF}=window.jspdf;

let center=map.getCenter();
let zoom=map.getZoom();

let url="https://maps.googleapis.com/maps/api/staticmap"+
"?center="+center.lat()+","+center.lng()+
"&zoom="+zoom+
"&size=1000x1000"+
"&maptype=hybrid"+
"&key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y";

let img=new Image();

img.onload=function(){

let canvas=document.createElement("canvas");

canvas.width=img.width;
canvas.height=img.height;

let ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0);

let pdf=new jsPDF("p","mm","a4");

let width=210;
let height=(canvas.height*width)/canvas.width;

pdf.addImage(canvas.toDataURL("image/png"),"PNG",0,0,width,height);


/* جدول المجموعات */

pdf.addPage();

let y=20;

groups.forEach((g,i)=>{

pdf.text("المجموعة "+(i+1),10,y);
y+=8;

g.points.forEach(p=>{

pdf.text(p.lat.toFixed(6)+" , "+p.lng.toFixed(6),10,y);

y+=6;

});

y+=6;

});

pdf.save("map_groups.pdf");

};

img.src=url;

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places,geometry&callback=initMap">
</script>

</body>

</html>
