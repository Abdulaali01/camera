<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بحث + حساب المساحة</title>

<style>
body{font-family:Tahoma;margin:0}

#map{
height:100vh;
width:100%;
}

.box{
position:absolute;
top:10px;
right:10px;
background:#fff;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.3);
font-size:16px
}

.search{
position:absolute;
top:10px;
left:10px;
background:#fff;
padding:8px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.3)
}

.search input{
width:220px;
padding:6px;
border:1px solid #ccc;
border-radius:5px
}
</style>
</head>

<body>

<div class="box">
المساحة: <span id="area">0</span> متر²
</div>

<div class="search">
<input id="searchBox" placeholder="ابحث عن حي أو شارع">
</div>

<div id="map"></div>

<script>

let map;
let polygon;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:21.4373,lng:40.5127},
zoom:13,
mapTypeId:"satellite"
});


/* البحث */

const input=document.getElementById("searchBox");

const autocomplete=new google.maps.places.Autocomplete(input,{
componentRestrictions:{country:"sa"}
});

autocomplete.bindTo("bounds",map);

autocomplete.addListener("place_changed",function(){

const place=autocomplete.getPlace();

if(!place.geometry) return;

map.panTo(place.geometry.location);
map.setZoom(16);

});


/* رسم المساحة */

const drawingManager=new google.maps.drawing.DrawingManager({
drawingMode:google.maps.drawing.OverlayType.POLYGON,
drawingControl:true,
drawingControlOptions:{
position:google.maps.ControlPosition.TOP_CENTER,
drawingModes:["polygon"]
}
});

drawingManager.setMap(map);

google.maps.event.addListener(drawingManager,'overlaycomplete',function(e){

if(polygon) polygon.setMap(null);

polygon=e.overlay;

let area=google.maps.geometry.spherical.computeArea(
polygon.getPath()
);

document.getElementById("area").innerHTML=area.toFixed(2);

});

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKAdhnhp11pzOQXn8rQxcA-dB5HpSZx0Y&libraries=places,drawing,geometry&callback=initMap" async defer></script>

</body>
</html>
